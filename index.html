<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Manecraft - Versão Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        body {
            font-family: 'Press Start 2P', Arial, sans-serif;
            background: linear-gradient(#1a1a2e, #16213e);
            color: #fff;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        
        h1 {
            color: #4ade80;
            text-shadow: 3px 3px #000;
            font-size: 2.1rem;
            margin: 5px 0 3px;
        }
        
        .version {
            background: #166534;
            color: #86efac;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        #game-container {
            display: inline-block;
            background: #0f172a;
            padding: 12px;
            border: 6px solid #334155;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        
        canvas {
            border: 4px solid #1e2937;
            background: #5dade2;
            image-rendering: pixelated;
            cursor: crosshair;
        }
        
        #hotbar {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            padding: 8px;
            background: #1e2937;
            border: 4px solid #334155;
            border-radius: 6px;
        }
        
        .hotbar-slot {
            width: 56px;
            height: 56px;
            border: 3px solid #475569;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 8px;
        }
        
        .hotbar-slot.selected {
            border-color: #fbbf24;
            box-shadow: 0 0 12px #fbbf24;
            transform: scale(1.05);
        }
        
        .info {
            margin-top: 10px;
            font-size: 0.7rem;
            color: #94a3b8;
            line-height: 1.5;
        }
        
        button {
            font-family: 'Press Start 2P', Arial, sans-serif;
            background: #334155;
            color: #fff;
            border: 3px solid #475569;
            padding: 7px 12px;
            font-size: 0.65rem;
            cursor: pointer;
            margin: 3px;
        }
        
        button:hover {
            background: #475569;
        }
        
        .footer {
            margin-top: 12px;
            font-size: 0.6rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <h1>MINI MANECRAFT</h1>
    <div class="version">VERSÃO FINAL - Completa</div>
    
    <div id="game-container">
        <canvas id="game" width="800" height="592"></canvas>
        <div id="hotbar"></div>
    </div>
    
    <div class="info">
        <strong>Mover:</strong> A D &nbsp;&nbsp; 
        <strong>Pular / Wall Jump:</strong> ESPAÇO &nbsp;&nbsp; 
        <strong>Quebrar:</strong> Clique Esquerdo &nbsp;&nbsp; 
        <strong>Colocar:</strong> Clique Direito<br>
        <strong>1-5</strong> = Trocar bloco &nbsp;&nbsp; <strong>G</strong> = Novo mundo &nbsp;&nbsp; <strong>S</strong> = Salvar
    </div>
    
    <div>
        <button onclick="generateWorld(); resetPlayer(); draw();">🌍 Novo Mundo</button>
        <button onclick="saveWorld()">💾 Salvar</button>
        <button onclick="loadWorld()">📂 Carregar</button>
    </div>
    
    <div class="footer">
        Jogo completo • Perlin Noise + Física + Wall Jump + Construção
    </div>

    <script>
        // ==================== CONFIGURAÇÕES ====================
        const COLS = 50;
        const ROWS = 37;
        const BLOCK_SIZE = 16;
        const GRAVITY = 0.65;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 3.8;
        const WALL_JUMP_X = 7.5;
        const WALL_JUMP_Y = -11;
        
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let world = [];
        let currentBlock = 1;
        let mouseX = 0, mouseY = 0;
        let keys = {};
        let particles = [];
        
        // ==================== PLAYER ====================
        let player = {
            x: 400,
            y: 200,
            vx: 0,
            vy: 0,
            width: 12,
            height: 20,
            onGround: false,
            touchingWall: 0
        };
        
        // ==================== PERLIN NOISE ====================
        class PerlinNoise {
            constructor(seed = Date.now()) {
                this.seed = seed;
                this.permutation = new Array(512);
                this.init();
            }
            init() {
                const p = Array.from({length:256}, (_,i) => i);
                let n = this.seed;
                for (let i = 255; i > 0; i--) {
                    n = (n * 16807) % 2147483647;
                    const j = Math.floor((n / 2147483647) * (i + 1));
                    [p[i], p[j]] = [p[j], p[i]];
                }
                for (let i = 0; i < 256; i++) {
                    this.permutation[i] = p[i];
                    this.permutation[i + 256] = p[i];
                }
            }
            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            lerp(t, a, b) { return a + t * (b - a); }
            grad(h, x) {
                const g = 1 + (h & 7);
                return (h & 8 ? -g : g) * x;
            }
            noise(x) {
                const X = Math.floor(x) & 255;
                x -= Math.floor(x);
                const u = this.fade(x);
                const a = this.permutation[X];
                const b = this.permutation[X + 1];
                return this.lerp(u, this.grad(a, x), this.grad(b, x - 1)) / 2 + 0.5;
            }
            octaveNoise(x, octaves = 5, persistence = 0.5) {
                let total = 0, frequency = 1, amplitude = 1, maxValue = 0;
                for (let i = 0; i < octaves; i++) {
                    total += this.noise(x * frequency) * amplitude;
                    maxValue += amplitude;
                    amplitude *= persistence;
                    frequency *= 2;
                }
                return total / maxValue;
            }
        }
        
        let perlin = new PerlinNoise();
        
        // ==================== MUNDO ====================
        function initWorld() {
            world = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        }
        
        function generateWorld() {
            initWorld();
            perlin = new PerlinNoise(Date.now());
            const baseHeight = ROWS - 12;
            
            for (let x = 0; x < COLS; x++) {
                const noiseValue = perlin.octaveNoise(x * 0.033, 5, 0.5);
                let height = Math.floor(baseHeight + (noiseValue - 0.5) * 16);
                height = Math.max(5, Math.min(height, ROWS - 4));
                
                for (let y = height; y < ROWS; y++) {
                    if (y === height) world[y][x] = 2;
                    else if (y < height + 5) world[y][x] = 1;
                    else world[y][x] = 3;
                }
                
                // Árvores
                if (Math.random() < 0.09 && height > 6) {
                    const trunkHeight = 3 + Math.floor(Math.random() * 2);
                    for (let t = 1; t <= trunkHeight; t++) {
                        if (height - t >= 0) world[height - t][x] = 4;
                    }
                    const leafY = height - trunkHeight - 1;
                    if (leafY >= 0) {
                        for (let lx = x - 2; lx <= x + 2; lx++) {
                            if (lx >= 0 && lx < COLS) {
                                if (leafY >= 0) world[leafY][lx] = 5;
                                if (leafY - 1 >= 0 && Math.abs(lx - x) <= 1) world[leafY - 1][lx] = 5;
                            }
                        }
                    }
                }
            }
            resetPlayer();
        }
        
        function resetPlayer() {
            for (let y = 6; y < ROWS - 3; y++) {
                for (let x = 8; x < COLS - 8; x++) {
                    if (world[y][x] === 0 && world[y + 1][x] > 0) {
                        player.x = x * BLOCK_SIZE + 2;
                        player.y = y * BLOCK_SIZE - player.height;
                        player.vx = 0;
                        player.vy = 0;
                        player.onGround = false;
                        player.touchingWall = 0;
                        return;
                    }
                }
            }
            player.x = 200;
            player.y = 150;
            player.vx = 0;
            player.vy = 0;
            player.touchingWall = 0;
        }
        
        // ==================== COLISÃO ====================
        function isSolid(x, y) {
            const gx = Math.floor(x / BLOCK_SIZE);
            const gy = Math.floor(y / BLOCK_SIZE);
            if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return true;
            return world[gy][gx] > 0;
        }
        
        function updateWallTouch() {
            player.touchingWall = 0;
            const left = isSolid(player.x - 1, player.y + 2) || isSolid(player.x - 1, player.y + player.height - 3);
            const right = isSolid(player.x + player.width + 1, player.y + 2) || isSolid(player.x + player.width + 1, player.y + player.height - 3);
            
            if (left) player.touchingWall = -1;
            else if (right) player.touchingWall = 1;
        }
        
        function checkCollision(nx, ny) {
            return isSolid(nx, ny) || 
                   isSolid(nx + player.width, ny) ||
                   isSolid(nx, ny + player.height) ||
                   isSolid(nx + player.width, ny + player.height);
        }
        
        // ==================== FÍSICA ====================
        function updatePhysics() {
            // Movimento horizontal
            let moveX = 0;
            if (keys['a'] || keys['arrowleft']) moveX = -MOVE_SPEED;
            if (keys['d'] || keys['arrowright']) moveX = MOVE_SPEED;
            
            player.vx = moveX;
            
            let newX = player.x + player.vx;
            if (!checkCollision(newX, player.y)) {
                player.x = newX;
            } else {
                player.vx = 0;
            }
            
            // Gravidade
            player.vy += GRAVITY;
            
            let newY = player.y + player.vy;
            if (!checkCollision(player.x, newY)) {
                player.y = newY;
                player.onGround = false;
            } else {
                if (player.vy > 0) player.onGround = true;
                player.vy = 0;
                if (player.vy >= 0) {
                    player.y = Math.floor((player.y + player.height) / BLOCK_SIZE) * BLOCK_SIZE - player.height;
                }
            }
            
            updateWallTouch();
            
            // Limites
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
        }
        
        // ==================== PULO + WALL JUMP ====================
        function jump() {
            if (player.onGround) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
            } 
            else if (player.touchingWall !== 0) {
                // Wall Jump
                player.vy = WALL_JUMP_Y;
                player.vx = player.touchingWall * -WALL_JUMP_X;
                player.onGround = false;
                player.touchingWall = 0;
                createWallJumpParticles();
            }
        }
        
        function createWallJumpParticles() {
            const dir = player.touchingWall;
            for (let i = 0; i < 7; i++) {
                particles.push({
                    x: player.x + (dir === 1 ? player.width : 0),
                    y: player.y + player.height * 0.5,
                    vx: dir * (1.8 + Math.random() * 2.2),
                    vy: -1.2 - Math.random() * 2,
                    life: 20 + Math.random() * 10
                });
            }
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.18;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function drawParticles() {
            ctx.fillStyle = '#fed7aa';
            for (const p of particles) {
                ctx.globalAlpha = Math.max(0, p.life / 28);
                ctx.fillRect(p.x, p.y, 3, 3);
            }
            ctx.globalAlpha = 1;
        }
        
        // ==================== DESENHO ====================
        function draw() {
            // Céu
            ctx.fillStyle = '#5dade2';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Blocos
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const b = world[y][x];
                    if (b > 0) {
                        const px = x * BLOCK_SIZE;
                        const py = y * BLOCK_SIZE;
                        ctx.fillStyle = b === 1 ? '#8B4513' : 
                                        b === 2 ? '#228B22' : 
                                        b === 3 ? '#696969' : 
                                        b === 4 ? '#D2691E' : '#32CD32';
                        ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                        ctx.strokeRect(px + 0.5, py + 0.5, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    }
                }
            }
            
            // Player
            const px = player.x;
            const py = player.y;
            
            // Sombra
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(px + 1, py + player.height - 1, player.width - 2, 3);
            
            // Cabeça
            ctx.fillStyle = '#f5cba7';
            ctx.fillRect(px + 2, py + 2, 8, 8);
            ctx.strokeStyle = '#000';
            ctx.strokeRect(px + 2, py + 2, 8, 8);
            
            // Olhos
            ctx.fillStyle = '#000';
            ctx.fillRect(px + 4, py + 4, 2, 2);
            ctx.fillRect(px + 8, py + 4, 2, 2);
            
            // Corpo
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(px + 1, py + 10, 10, 8);
            
            // Braços
            ctx.fillStyle = '#f5cba7';
            ctx.fillRect(px - 1, py + 10, 3, 6);
            ctx.fillRect(px + 10, py + 10, 3, 6);
            
            // Pernas
            ctx.fillStyle = '#1e40af';
            ctx.fillRect(px + 2, py + 18, 3, 5);
            ctx.fillRect(px + 7, py + 18, 3, 5);
            
            // Efeito wall touch
            if (player.touchingWall !== 0 && !player.onGround) {
                ctx.fillStyle = 'rgba(251, 191, 36, 0.5)';
                if (player.touchingWall === -1) {
                    ctx.fillRect(px - 2, py + 5, 3, player.height - 10);
                } else {
                    ctx.fillRect(px + player.width - 1, py + 5, 3, player.height - 10);
                }
            }
            
            // Partículas
            drawParticles();
            
            // Mouse highlight
            const gx = Math.floor(mouseX / BLOCK_SIZE);
            const gy = Math.floor(mouseY / BLOCK_SIZE);
            if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 2;
                ctx.strokeRect(gx * BLOCK_SIZE + 1, gy * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            }
        }
        
        // ==================== HOTBAR ====================
        function createHotbar() {
            const hotbar = document.getElementById('hotbar');
            hotbar.innerHTML = '';
            const blocks = [
                {id:1, name:'Terra', color:'#8B4513'},
                {id:2, name:'Grama', color:'#228B22'},
                {id:3, name:'Pedra', color:'#696969'},
                {id:4, name:'Madeira', color:'#D2691E'},
                {id:5, name:'Folhas', color:'#32CD32'}
            ];
            
            blocks.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = 'hotbar-slot';
                div.style.backgroundColor = b.color;
                if (i === 0) div.classList.add('selected');
                
                div.innerHTML = `<div style="color:white; font-size:7px; text-shadow:1px 1px black; text-align:center;">${b.name}<br><span style="font-size:6px;">${i+1}</span></div>`;
                
                div.onclick = () => {
                    currentBlock = b.id;
                    document.querySelectorAll('.hotbar-slot').forEach(d => d.classList.remove('selected'));
                    div.classList.add('selected');
                };
                hotbar.appendChild(div);
            });
        }
        
        // ==================== INPUT ====================
        function setupInput() {
            document.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    jump();
                }
                
                if (e.key.toLowerCase() === 'g') {
                    generateWorld();
                    draw();
                }
                
                if (e.key.toLowerCase() === 's') {
                    saveWorld();
                }
                
                if (e.key >= '1' && e.key <= '5') {
                    currentBlock = parseInt(e.key);
                    document.querySelectorAll('.hotbar-slot').forEach((d, i) => {
                        d.classList.toggle('selected', i + 1 === currentBlock);
                    });
                }
            });
            
            document.addEventListener('keyup', e => {
                keys[e.key.toLowerCase()] = false;
            });
            
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                mouseY = e.clientY - rect.top;
            });
            
            canvas.addEventListener('mousedown', e => {
                const rect = canvas.getBoundingClientRect();
                const gx = Math.floor((e.clientX - rect.left) / BLOCK_SIZE);
                const gy = Math.floor((e.clientY - rect.top) / BLOCK_SIZE);
                
                if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return;
                
                if (e.button === 0 && world[gy][gx] > 0) {
                    world[gy][gx] = 0;
                }
                if (e.button === 2 && world[gy][gx] === 0) {
                    world[gy][gx] = currentBlock;
                }
                draw();
            });
            
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }
        
        // ==================== GAME LOOP ====================
        function gameLoop() {
            updatePhysics();
            updateParticles();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ==================== SALVAR / CARREGAR ====================
        function saveWorld() {
            try {
                const saveData = {
                    world: world,
                    player: {
                        x: player.x,
                        y: player.y
                    }
                };
                localStorage.setItem('miniManecraftFinal', JSON.stringify(saveData));
                alert('✅ Jogo salvo com sucesso!');
            } catch (e) {
                alert('Erro ao salvar');
            }
        }
        
        function loadWorld() {
            try {
                const data = JSON.parse(localStorage.getItem('miniManecraftFinal'));
                if (data) {
                    world = data.world;
                    if (data.player) {
                        player.x = data.player.x;
                        player.y = data.player.y;
                    }
                    draw();
                    alert('✅ Jogo carregado!');
                }
            } catch (e) {
                alert('Nenhum save encontrado');
            }
        }
        
        // ==================== INICIALIZAÇÃO ====================
        function initGame() {
            initWorld();
            generateWorld();
            createHotbar();
            setupInput();
            draw();
            gameLoop();
            
            // Mensagem de boas-vindas
            setTimeout(() => {
                const msg = document.createElement('div');
                msg.style.cssText = 'position:fixed; bottom:25px; left:50%; transform:translateX(-50%); background:#166534; color:#86efac; padding:8px 16px; border-radius:6px; font-size:0.7rem;';
                msg.innerHTML = 'Use <strong>ESPAÇO</strong> para pular e fazer <strong>Wall Jump</strong>!';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 3200);
            }, 1000);
            
            console.log('%c[Mini Manecraft Final] Jogo completo iniciado!', 'color:#4ade80');
        }
        
        window.onload = initGame;
    </script>
</body>
</html>
