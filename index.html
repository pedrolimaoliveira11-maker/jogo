<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grau na Favela: O Jogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Impact', sans-serif;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        .game-wrapper {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 20px #ffcc00;
            border: 4px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #4a75a0;
        }

        .instrucoes {
            color: #fff;
            margin-top: 15px;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px #000;
            max-width: 800px;
            line-height: 1.5;
        }

        .instrucoes span {
            color: #ffcc00;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <div class="instrucoes">
        <span>W / S / A / D</span> ou <span>Setas</span> = Move a Moto para os Lados, Cima e Baixo<br>
        Segure <span>ESPAÇO</span> = DÁ GRAU 🏍️💨
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Estado do Jogo
        let jogoAtivo = true;
        let pontuacao = 0;
        let velocidadeCenario = 4;

        // Configuração da Moto do Jogador (Agora com movimentos livres)
        const moto = {
            x: 100,
            y: 340, // Posição inicial na rua
            largura: 70,
            altura: 45,
            velocidade: 5, // Velocidade de movimento do jogador
            estaEmpinando: false,
            anguloGrau: 0
        };

        // Objeto para monitorar quais teclas estão pressionadas simultaneamente
        const teclas = {
            KeyW: false, ArrowUp: false,
            KeyS: false, ArrowDown: false,
            KeyA: false, ArrowLeft: false,
            KeyD: false, ArrowRight: false,
            Space: false
        };

        // Obstáculos da favela
        let obstaculos = [];
        let tempoProximoObstaculo = 0;

        // Loop Principal do Jogo
        function loop() {
            if (!jogoAtivo) {
                desenharGameOver();
                return;
            }

            atualizar();
            desenhar();

            requestAnimationFrame(loop);
        }

        // Lógica de Movimentos e Colisões
        function atualizar() {
            // Pontuação e velocidade progressiva
            pontuacao += moto.estaEmpinando ? 2 : 1;
            velocidadeCenario = 4 + Math.floor(pontuacao / 600);

            // --- MOVIMENTAÇÃO DA MOTO PELO TECLADO ---
            
            // Mover para Cima (Limite superior da rua)
            if (teclas.KeyW || teclas.ArrowUp) {
                if (moto.y > 300) moto.y -= moto.velocidade;
            }
            // Mover para Baixo (Limite inferior da rua)
            if (teclas.KeyS || teclas.ArrowDown) {
                if (moto.y < 365) moto.y += moto.velocidade;
            }
            // Mover para Trás / Frear
            if (teclas.KeyA || teclas.ArrowLeft) {
                if (moto.x > 30) moto.x -= moto.velocidade;
            }
            // Mover para Frente / Acelerar rápido
            if (teclas.KeyD || teclas.ArrowRight) {
                if (moto.x < canvas.width - 100) moto.x += moto.velocidade;
            }

            // Controle do Grau (Espaço)
            if (teclas.Space) {
                moto.estaEmpinando = true;
                if (moto.anguloGrau < 0.5) moto.anguloGrau += 0.06;
            } else {
                moto.estaEmpinando = false;
                if (moto.anguloGrau > 0) moto.anguloGrau -= 0.06;
            }

            // --- GERADOR DE OBSTÁCULOS ---
            tempoProximoObstaculo++;
            if (tempoProximoObstaculo > Math.random() * 60 + 40) {
                // Sorteia uma altura na rua para o obstáculo aparecer
                let yObstaculo = 300 + Math.random() * 65;
                obstaculos.push({
                    x: canvas.width,
                    y: yObstaculo,
                    largura: 30,
                    altura: 30,
                    tipo: Math.random() > 0.5 ? '📦' : '🗑️'
                });
                tempoProximoObstaculo = 0;
            }

            // Movimentar obstáculos e checar colisão
            for (let i = obstaculos.length - 1; i >= 0; i--) {
                obstaculos[i].x -= velocidadeCenario;

                // Ajuste fino da Hitbox (Caixa de colisão) do emoji
                let motoHitboxX = moto.x + 10;
                let motoHitboxY = moto.y + 10;

                if (
                    motoHitboxX < obstaculos[i].x + obstaculos[i].largura &&
                    motoHitboxX + (moto.largura - 20) > obstaculos[i].x &&
                    motoHitboxY < obstaculos[i].y + obstaculos[i].altura &&
                    motoHitboxY + (moto.altura - 15) > obstaculos[i].y
                ) {
                    jogoAtivo = false; // Bateu, game over!
                }

                // Limpa os obstáculos antigos
                if (obstaculos[i].x + obstaculos[i].largura < 0) {
                    obstaculos.splice(i, 1);
                }
            }
        }

        // Renderização do jogo no Canvas
        function desenhar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. CÉU
            let gradienteCeu = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradienteCeu.addColorStop(0, '#f12711');
            gradienteCeu.addColorStop(1, '#f5af19');
            ctx.fillStyle = gradienteCeu;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. FAVELA (Fundo do morro)
            ctx.fillStyle = '#4a1515';
            for (let i = 0; i < canvas.width; i += 40) {
                let h = 120 + Math.sin(i + (pontuacao * 0.01)) * 30;
                ctx.fillRect(i, 300 - h, 35, h);
            }
            ctx.fillStyle = '#2b0c0c';
            for (let i = -20; i < canvas.width; i += 50) {
                let h = 100 + Math.cos(i + (pontuacao * 0.02)) * 25;
                ctx.fillRect(i, 300 - h, 45, h);
                ctx.fillStyle = '#ffcc00';
                ctx.fillRect(i + 15, 300 - h + 30, 10, 10);
                ctx.fillStyle = '#2b0c0c';
            }

            // 3. RUA DE ASFALTO (Onde a moto se move livremente)
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 300, canvas.width, 100);
            
            // Linhas amarelas móveis
            ctx.fillStyle = '#ffcc00';
            let deslocamentoLinha = (pontuacao * velocidadeCenario) % 100;
            for (let i = -deslocamentoLinha; i < canvas.width; i += 100) {
                ctx.fillRect(i, 345, 40, 6);
            }

            // 4. OBSTÁCULOS
            ctx.font = "28px Arial";
            obstaculos.forEach(obs => {
                ctx.fillText(obs.tipo, obs.x, obs.y + 20);
            });

            // 5. DESENHAR MOTO
            ctx.save();
            // Desloca para a posição dinâmica atual (x, y) controlada pelo jogador
            ctx.translate(moto.x + 15, moto.y + 15); 
            ctx.rotate(-moto.anguloGrau);

            ctx.font = "45px Arial";
            ctx.scale(-1, 1); // Roda o emoji para a direita
            ctx.fillText("🏍️", -35, 15);
            ctx.restore();

            // 6. PLACAR
            ctx.fillStyle = '#fff';
            ctx.font = '24px Impact';
            ctx.fillText(`DISTÂNCIA: ${Math.floor(pontuacao)}m`, 20, 40);
            if (moto.estaEmpinando) {
                ctx.fillStyle = '#ffcc00';
                ctx.fillText(`+ NO GRAU! 🔥`, 20, 70);
            }
        }

        function desenharGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff3333';
            ctx.font = '50px Impact';
            ctx.textAlign = 'center';
            ctx.fillText('CAIU DA MOTO! 💥', canvas.width / 2, canvas.height / 2 - 20);

            ctx.fillStyle = '#fff';
            ctx.font = '24px Impact';
            ctx.fillText(`Você percorreu: ${Math.floor(pontuacao)} metros`, canvas.width / 2, canvas.height / 2 + 25);
            ctx.fillText('Pressione ESPAÇO para reviver na favela', canvas.width / 2, canvas.height / 2 + 65);
        }

        // --- SISTEMA MULTI-TECLAS (Garante movimentação fluida em diagonal) ---
        window.addEventListener('keydown', e => {
            if (e.code in teclas) {
                teclas[e.code] = true;
                if (e.code === 'Space' && !jogoAtivo) {
                    // Reset do jogo
                    moto.x = 100;
                    moto.y = 340;
                    moto.anguloGrau = 0;
                    obstaculos = [];
                    pontuacao = 0;
                    jogoAtivo = true;
                    ctx.textAlign = 'left';
                    loop();
                }
            }
        });

        window.addEventListener('keyup', e => {
            if (e.code in teclas) {
                teclas[e.code] = false;
            }
        });

        // Inicia o jogo
        loop();
    </script>
</body>
</html>
