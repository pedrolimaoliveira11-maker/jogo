<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Manecraft - Com Pulo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        body { font-family: 'Press Start 2P', Arial, sans-serif; background: linear-gradient(#1a1a2e, #16213e); color: #fff; margin: 0; padding: 15px; text-align: center; }
        h1 { color: #4ade80; text-shadow: 3px 3px #000; font-size: 2rem; margin: 8px 0 5px; }
        .version { background: #854d0e; color: #fed7aa; padding: 3px 12px; border-radius: 20px; font-size: 0.65rem; display: inline-block; margin-bottom: 8px; }
        #game-container { display: inline-block; background: #0f172a; padding: 12px; border: 6px solid #334155; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        canvas { border: 4px solid #1e2937; background: #5dade2; image-rendering: pixelated; cursor: crosshair; }
        #hotbar { display: flex; justify-content: center; gap: 6px; margin-top: 10px; padding: 8px; background: #1e2937; border: 4px solid #334155; border-radius: 6px; }
        .hotbar-slot { width: 56px; height: 56px; border: 3px solid #475569; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 8px; flex-direction: column; }
        .hotbar-slot.selected { border-color: #fbbf24; box-shadow: 0 0 12px #fbbf24; transform: scale(1.05); }
        .info { margin-top: 10px; font-size: 0.7rem; color: #94a3b8; }
        button { font-family: 'Press Start 2P', Arial, sans-serif; background: #334155; color: #fff; border: 3px solid #475569; padding: 7px 12px; font-size: 0.65rem; cursor: pointer; margin: 3px; }
        button:hover { background: #475569; }
        .footer { margin-top: 12px; font-size: 0.6rem; color: #64748b; }
    </style>
</head>
<body>
    <h1>MINI MANECRAFT</h1>
    <div class="version">v5 - Com Pulo + Física</div>
    
    <div id="game-container">
        <canvas id="game" width="800" height="592"></canvas>
        <div id="hotbar"></div>
    </div>
    
    <div class="info">
        <strong>Mover:</strong> A D &nbsp;&nbsp; 
        <strong>Pular:</strong> ESPAÇO &nbsp;&nbsp; 
        <strong>Quebrar:</strong> Clique Esquerdo &nbsp;&nbsp; 
        <strong>Colocar:</strong> Clique Direito<br>
        <strong>1-5</strong> = Trocar bloco &nbsp;&nbsp; <strong>G</strong> = Novo mundo
    </div>
    
    <div>
        <button onclick="generateWorld(); resetPlayer(); draw();">🌍 Novo Mundo</button>
        <button onclick="saveWorld()">💾 Salvar</button>
        <button onclick="loadWorld()">📂 Carregar</button>
    </div>
    
    <div class="footer">2D Platformer Style • Pulo + Gravidade + Colisão</div>

    <script>
        const COLS = 50;
        const ROWS = 37;
        const BLOCK_SIZE = 16;
        const GRAVITY = 0.6;
        const JUMP_FORCE = -11;
        const MOVE_SPEED = 3.5;
        
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let world = [];
        let currentBlock = 1;
        let mouseX = 0, mouseY = 0;
        let keys = {};
        
        let player = {
            x: 400, y: 200,
            vx: 0, vy: 0,
            width: 12, height: 20,
            onGround: false
        };
        
        class PerlinNoise {
            constructor(seed = Date.now()) {
                this.seed = seed; this.permutation = new Array(512); this.init();
            }
            init() {
                const p = Array.from({length:256},(_,i)=>i);
                let n = this.seed;
                for(let i=255;i>0;i--){ n=(n*16807)%2147483647; const j=Math.floor((n/2147483647)*(i+1)); [p[i],p[j]]=[p[j],p[i]]; }
                for(let i=0;i<256;i++){ this.permutation[i]=p[i]; this.permutation[i+256]=p[i]; }
            }
            fade(t){return t*t*t*(t*(t*6-15)+10)}
            lerp(t,a,b){return a+t*(b-a)}
            grad(h,x){const g=1+(h&7); return (h&8?-g:g)*x}
            noise(x){const X=Math.floor(x)&255;x-=Math.floor(x);const u=this.fade(x);const a=this.permutation[X],b=this.permutation[X+1];return this.lerp(u,this.grad(a,x),this.grad(b,x-1))/2+0.5}
            octaveNoise(x,oct=5,pers=0.5){let t=0,f=1,a=1,m=0;for(let i=0;i<oct;i++){t+=this.noise(x*f)*a;m+=a;a*=pers;f*=2;}return t/m}
        }
        
        let perlin = new PerlinNoise();
        
        function initWorld(){ world = Array.from({length:ROWS},()=>Array(COLS).fill(0)); }
        
        function generateWorld(){
            initWorld(); perlin = new PerlinNoise(Date.now());
            const base = ROWS-12;
            for(let x=0;x<COLS;x++){
                const n = perlin.octaveNoise(x*0.033,5,0.5);
                let h = Math.floor(base+(n-0.5)*16); h=Math.max(5,Math.min(h,ROWS-4));
                for(let y=h;y<ROWS;y++) world[y][x]=(y===h)?2:(y<h+5?1:3);
                if(Math.random()<0.09 && h>6){
                    const th=3+Math.floor(Math.random()*2);
                    for(let t=1;t<=th;t++) if(h-t>=0) world[h-t][x]=4;
                    const ly=h-th-1; if(ly>=0){for(let lx=x-2;lx<=x+2;lx++) if(lx>=0&&lx<COLS){if(ly>=0)world[ly][lx]=5; if(ly-1>=0&&Math.abs(lx-x)<=1)world[ly-1][lx]=5;}}
                }
            }
            resetPlayer();
        }
        
        function resetPlayer(){
            for(let y=6;y<ROWS-3;y++){for(let x=8;x<COLS-8;x++){if(world[y][x]===0&&world[y+1][x]>0){player.x=x*BLOCK_SIZE+2;player.y=y*BLOCK_SIZE-player.height;player.vx=0;player.vy=0;player.onGround=false;return;}}}
            player.x=200;player.y=150;player.vx=0;player.vy=0;
        }
        
        function isSolid(x,y){const gx=Math.floor(x/BLOCK_SIZE),gy=Math.floor(y/BLOCK_SIZE);if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return true;return world[gy][gx]>0;}
        function checkCollision(nx,ny){return isSolid(nx,ny)||isSolid(nx+player.width,ny)||isSolid(nx,ny+player.height)||isSolid(nx+player.width,ny+player.height);}
        
        function updatePhysics(){
            let moveX=0;
            if(keys['a']||keys['arrowleft'])moveX=-MOVE_SPEED;
            if(keys['d']||keys['arrowright'])moveX=MOVE_SPEED;
            player.vx=moveX;
            
            let newX=player.x+player.vx;
            if(!checkCollision(newX,player.y))player.x=newX;else player.vx=0;
            
            player.vy+=GRAVITY;
            let newY=player.y+player.vy;
            if(!checkCollision(player.x,newY)){player.y=newY;player.onGround=false;}
            else{if(player.vy>0)player.onGround=true;player.vy=0;if(player.vy>=0)player.y=Math.floor(player.y/BLOCK_SIZE)*BLOCK_SIZE;}
            
            if(player.x<0)player.x=0;
            if(player.x>canvas.width-player.width)player.x=canvas.width-player.width;
            if(player.y<0)player.y=0;
        }
        
        function jump(){if(player.onGround){player.vy=JUMP_FORCE;player.onGround=false;}}
        
        function draw(){
            ctx.fillStyle='#5dade2';ctx.fillRect(0,0,canvas.width,canvas.height);
            for(let y=0;y<ROWS;y++){for(let x=0;x<COLS;x++){const b=world[y][x];if(b>0){const px=x*BLOCK_SIZE,py=y*BLOCK_SIZE;ctx.fillStyle=b===1?'#8B4513':b===2?'#228B22':b===3?'#696969':b===4?'#D2691E':'#32CD32';ctx.fillRect(px,py,BLOCK_SIZE,BLOCK_SIZE);ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.strokeRect(px+0.5,py+0.5,BLOCK_SIZE-1,BLOCK_SIZE-1);}}}
            
            const px=player.x,py=player.y;
            ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(px+1,py+player.height-1,player.width-2,3);
            ctx.fillStyle='#f5cba7';ctx.fillRect(px+2,py+2,8,8);ctx.strokeStyle='#000';ctx.strokeRect(px+2,py+2,8,8);
            ctx.fillStyle='#000';ctx.fillRect(px+4,py+4,2,2);ctx.fillRect(px+8,py+4,2,2);
            ctx.fillStyle='#3b82f6';ctx.fillRect(px+1,py+10,10,8);
            ctx.fillStyle='#f5cba7';ctx.fillRect(px-1,py+10,3,6);ctx.fillRect(px+10,py+10,3,6);
            ctx.fillStyle='#1e40af';ctx.fillRect(px+2,py+18,3,5);ctx.fillRect(px+7,py+18,3,5);
            
            if(!player.onGround&&player.vy<0){ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(px+3,py+player.height+2,2,2);ctx.fillRect(px+7,py+player.height+3,2,2);}
            
            const gx=Math.floor(mouseX/BLOCK_SIZE),gy=Math.floor(mouseY/BLOCK_SIZE);
            if(gx>=0&&gx<COLS&&gy>=0&&gy<ROWS){ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.strokeRect(gx*BLOCK_SIZE+1,gy*BLOCK_SIZE+1,BLOCK_SIZE-2,BLOCK_SIZE-2);}
        }
        
        function createHotbar(){
            const hotbar=document.getElementById('hotbar');hotbar.innerHTML='';
            const blocks=[{id:1,name:'Terra',c:'#8B4513'},{id:2,name:'Grama',c:'#228B22'},{id:3,name:'Pedra',c:'#696969'},{id:4,name:'Madeira',c:'#D2691E'},{id:5,name:'Folhas',c:'#32CD32'}];
            blocks.forEach((b,i)=>{const d=document.createElement('div');d.className='hotbar-slot';d.style.backgroundColor=b.c;if(i===0)d.classList.add('selected');d.innerHTML=`<div style="color:#fff;font-size:7px;text-shadow:1px 1px #000;text-align:center">${b.name}<br><span style="font-size:6px">${i+1}</span></div>`;d.onclick=()=>{currentBlock=b.id;document.querySelectorAll('.hotbar-slot').forEach(el=>el.classList.remove('selected'));d.classList.add('selected');};hotbar.appendChild(d);});
        }
        
        function setupInput(){
            document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' '||e.key==='Spacebar'){e.preventDefault();jump();}if(e.key.toLowerCase()==='g'){generateWorld();draw();}if(e.key>='1'&&e.key<='5'){currentBlock=parseInt(e.key);document.querySelectorAll('.hotbar-slot').forEach((el,i)=>el.classList.toggle('selected',i+1===currentBlock));}});
            document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
            
            canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;});
            canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();const gx=Math.floor((e.clientX-r.left)/BLOCK_SIZE),gy=Math.floor((e.clientY-r.top)/BLOCK_SIZE);if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return;if(e.button===0&&world[gy][gx]>0)world[gy][gx]=0;if(e.button===2&&world[gy][gx]===0)world[gy][gx]=currentBlock;draw();});
            canvas.addEventListener('contextmenu',e=>e.preventDefault());
        }
        
        function gameLoop(){updatePhysics();draw();requestAnimationFrame(gameLoop);}
        
        function saveWorld(){try{localStorage.setItem('miniManecraftJump',JSON.stringify({world,player:{x:player.x,y:player.y}}));alert('✅ Jogo salvo!');}catch(e){}}
        function loadWorld(){try{const data=JSON.parse(localStorage.getItem('miniManecraftJump'));if(data){world=data.world;if(data.player){player.x=data.player.x;player.y=data.player.y;}draw();alert('✅ Jogo carregado!');}}catch(e){}}
        
        function initGame(){
            initWorld();generateWorld();createHotbar();setupInput();draw();gameLoop();
            setTimeout(()=>{const m=document.createElement('div');m.style.cssText='position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:#166534;color:#86efac;padding:7px 14px;border-radius:5px;font-size:0.7rem;';m.textContent='Pressione ESPAÇO para pular!';document.body.appendChild(m);setTimeout(()=>m.remove(),2600);},900);
        }
        window.onload=initGame;
    </script>
</body>
</html>
