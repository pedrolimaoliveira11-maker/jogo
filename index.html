<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Corrida na Cidade 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>

<script>
// Cena
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// Camera
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

// Renderizador
const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

// Rua
const road = new THREE.Mesh(
    new THREE.BoxGeometry(20,1,300),
    new THREE.MeshPhongMaterial({
        color:0x444444
    })
);

road.position.y = -1;
scene.add(road);

// Jogador
const player = new THREE.Mesh(
    new THREE.BoxGeometry(2,3,2),
    new THREE.MeshPhongMaterial({
        color:0xff0000
    })
);

player.position.set(0,1,10);
scene.add(player);

// Luz
const light = new THREE.DirectionalLight(
    0xffffff,
    1
);

light.position.set(10,20,10);
scene.add(light);

// Camera
camera.position.set(0,8,20);
camera.lookAt(player.position);

// Obstáculos
let obstacles = [];

function createCar(){

    const car = new THREE.Mesh(
        new THREE.BoxGeometry(3,2,6),
        new THREE.MeshPhongMaterial({
            color:Math.random()*0xffffff
        })
    );

    car.position.set(
        (Math.floor(Math.random()*3)-1)*6,
        0,
        -120
    );

    scene.add(car);
    obstacles.push(car);
}

setInterval(createCar,2000);

// Pulo
let velocityY = 0;
let gravity = -0.03;

document.addEventListener(
    "keydown",
    e=>{
        if(
            e.code==="Space" &&
            player.position.y<=1.01
        ){
            velocityY = 0.6;
        }
    }
);

// Loop
function animate(){

    requestAnimationFrame(
        animate
    );

    velocityY += gravity;
    player.position.y += velocityY;

    if(player.position.y < 1){
        player.position.y = 1;
        velocityY = 0;
    }

    obstacles.forEach(
        obstacle=>{
            obstacle.position.z += 0.7;

            if(
                Math.abs(
                    obstacle.position.z -
                    player.position.z
                ) < 3 &&
                Math.abs(
                    obstacle.position.x -
                    player.position.x
                ) < 3 &&
                player.position.y < 3
            ){
                alert("GAME OVER");
                location.reload();
            }
        }
    );

    renderer.render(
        scene,
        camera
    );
}

animate();

</script>
</body>
</html>
