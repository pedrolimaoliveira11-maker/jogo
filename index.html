<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Guerra 2D - Linhas de Frente</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2e3d23;
            font-family: sans-serif;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #controles {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>Painel de Controle (2D)</h2>
        <p>Unidade Atual: <strong id="unidade-ativa" style="color: #00ff00;">Soldado</strong></p>
        <hr>
        <div id="controles">
            <strong>Mudar de Unidade Aliada:</strong><br>
            [1] Soldado | [2] Tanque | [3] Avião<br><br>
            <strong>Movimentação:</strong><br>
            W / S - Andar para Frente / Trás<br>
            A / D - Girar Direção<br>
            Espaço - Turbo (Apenas Avião)
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DO AMBIENTE 2D ---
        const scene = new THREE.Scene();

        // Criando uma Câmera Ortográfica ideal para jogos 2D/Top-down
        const aspecto = window.innerWidth / window.innerHeight;
        const tamanhoVisao = 40; 
        const camera = new THREE.OrthographicCamera(
            -tamanhoVisao * aspecto, tamanhoVisao * aspecto, 
            tamanhoVisao, -tamanhoVisao, 
            0.1, 1000
        );
        
        // Posiciona a câmera diretamente olhando de cima para baixo
        camera.position.set(0, 0, 50); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Iluminação simples para destacar as cores no plano
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);

        // --- VARIÁVEIS DE JOGO ---
        let tipoUnidade = 'soldado'; 
        const teclado = {};
        const unidadesAliadas = {};
        const unidadesInimigas = [];

        // --- CRIAÇÃO DE MODELOS 2D ---

        // 1. Soldado (Círculo com indicador de direção)
        function criarSoldado2D(cor) {
            const grupo = new THREE.Group();
            const corpo = new THREE.Mesh(new THREE.CircleGeometry(1, 32), new THREE.MeshBasicMaterial({ color: cor }));
            grupo.add(corpo);
            
            const indicador = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            indicador.position.y = 0.8; 
            grupo.add(indicador);
            return grupo;
        }

        // 2. Tanque (Retângulo com canhão)
        function criarTanque2D(cor) {
            const grupo = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(3, 4), new THREE.MeshBasicMaterial({ color: cor }));
            grupo.add(base);

            const canhao = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3), new THREE.MeshBasicMaterial({ color: 0x111111 }));
            canhao.position.y = 2;
            grupo.add(canhao);
            return grupo;
        }

        // 3. Avião (Formato de Cruz/Asas)
        function criarAviao2D(cor) {
            const grupo = new THREE.Group();
            const corpo = new THREE.Mesh(new THREE.BoxGeometry(0.8, 5), new THREE.MeshBasicMaterial({ color: cor }));
            grupo.add(corpo);

            const asas = new THREE.Mesh(new THREE.BoxGeometry(5, 0.8), new THREE.MeshBasicMaterial({ color: cor }));
            asas.position.y = 0.5;
            grupo.add(asas);
            return grupo;
        }

        // --- POSICIONAMENTO DAS LINHAS DE FRENTE (ESQUERDA VS DIREITA) ---

        // LADO ESQUERDO: Seus Aliados (Verdes e Azul)
        unidadesAliadas.soldado = criarSoldado2D(0x2e8b57);
        unidadesAliadas.tanque = criarTanque2D(0x556b2f);
        unidadesAliadas.aviao = criarAviao2D(0x4682b4);

        unidadesAliadas.soldado.position.set(-25, 10, 0);
        unidadesAliadas.tanque.position.set(-25, -10, 0);
        unidadesAliadas.aviao.position.set(-35, 0, 0);

        // Virar todos para a direita inicialmente (eixo X positivo)
        unidadesAliadas.soldado.rotation.z = -Math.PI / 2;
        unidadesAliadas.tanque.rotation.z = -Math.PI / 2;
        unidadesAliadas.aviao.rotation.z = -Math.PI / 2;

        scene.add(unidadesAliadas.soldado);
        scene.add(unidadesAliadas.tanque);
        scene.add(unidadesAliadas.aviao);

        // LADO DIREITO: Inimigos (Vermelhos)
        const configsInimigos = [
            { tipo: 'soldado', pos: [25, 15] },
            { tipo: 'soldado', pos: [25, 5] },
            { tipo: 'tanque', pos: [25, -10] },
            { tipo: 'aviao', pos: [35, 0] }
        ];

        configsInimigos.forEach(cfg => {
            let inimigo;
            if (cfg.tipo === 'soldado') inimigo = criarSoldado2D(0x8b0000);
            if (cfg.tipo === 'tanque') inimigo = criarTanque2D(0x5c0000);
            if (cfg.tipo === 'aviao') inimigo = criarAviao2D(0x800000);
            
            inimigo.position.set(cfg.pos[0], cfg.pos[1], 0);
            
            // Virar inimigos para a esquerda (olhando para os aliados)
            inimigo.rotation.z = Math.PI / 2;
            
            scene.add(inimigo);
            unidadesInimigas.push(inimigo);
        });

        // --- ENTRADAS DE TECLADO ---
        window.addEventListener('keydown', (e) => {
            teclado[e.key.toLowerCase()] = true;
            
            if (e.key === '1') { tipoUnidade = 'soldado'; atualizarUI('Soldado'); }
            if (e.key === '2') { tipoUnidade = 'tanque'; atualizarUI('Tanque'); }
            if (e.key === '3') { tipoUnidade = 'aviao'; atualizarUI('Avião'); }
        });
        window.addEventListener('keyup', (e) => { teclado[e.key.toLowerCase()] = false; });

        function atualizarUI(nome) {
            document.getElementById('unidade-ativa').innerText = nome;
        }

        // --- SISTEMA DE MOVIMENTAÇÃO 2D ---
        const clock = new THREE.Clock();

        function atualizarMovimento(delta) {
            const atual = unidadesAliadas[tipoUnidade];

            // Velocidades customizadas por tipo
            let velocidade = 12 * delta;
            let velRotacao = 4 * delta;

            if (tipoUnidade === 'tanque') {
                velocidade = 7 * delta;
                velRotacao = 2 * delta;
            } else if (tipoUnidade === 'aviao') {
                // O avião move-se constantemente para frente em 2D
                velocidade = (teclado[' '] ? 22 : 14) * delta; 
                velRotacao = 3 * delta;
                atual.translateY(velocidade);
            }

            // Controles de rotação (A e D rotacionam no eixo Z no ambiente 2D)
            if (teclado['a']) atual.rotation.z += velRotacao;
            if (teclado['d']) atual.rotation.z -= velRotacao;

            // Movimento de avanço e recuo (Para Soldado e Tanque)
            if (tipoUnidade !== 'aviao') {
                if (teclado['w']) atual.translateY(velocidade);
                if (teclado['s']) atual.translateY(-velocidade);
            }

            // Câmera 2D segue suavemente a posição da unidade ativa no plano X e Y
            camera.position.x = atual.position.x;
            camera.position.y = atual.position.y;
        }

        // --- LOOP PRINCIPAL ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            atualizarMovimento(delta);

            // Pequena movimentação patrulha de simulação para o avião inimigo
            const aviaoInimigo = unidadesInimigas[3];
            aviaoInimigo.position.y = Math.sin(clock.getElapsedTime()) * 5;

            renderer.render(scene, camera);
        }

        // Redimensionamento de tela para manter a proporção ortográfica correta
        window.addEventListener('resize', () => {
            const novoAspecto = window.innerWidth / window.innerHeight;
            camera.left = -tamanhoVisao * novoAspecto;
            camera.right = tamanhoVisao * novoAspecto;
            camera.top = tamanhoVisao;
            camera.bottom = -tamanhoVisao;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
