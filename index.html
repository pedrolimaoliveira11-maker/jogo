<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦖 Pula Obstáculo - Versão Melhorada</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background: linear-gradient(to bottom, #1a237e, #283593);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        
        h1 {
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            margin-bottom: 8px;
            font-size: 2.4em;
        }
        
        .instructions {
            background: rgba(255,255,255,0.1);
            padding: 10px 22px;
            border-radius: 20px;
            margin-bottom: 12px;
            color: #e0e0e0;
            font-size: 1.05em;
            text-align: center;
            max-width: 620px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        #game {
            border: 8px solid #fff;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            background: #fff;
            cursor: pointer;
        }
        
        .footer {
            margin-top: 12px;
            color: #b0bec5;
            font-size: 0.9em;
            text-align: center;
        }
        
        .stage-info {
            margin-top: 8px;
            font-size: 1.1em;
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 0 0 10px rgba(255,235,59,0.5);
        }
    </style>
</head>
<body>
    <h1>🦖 Pula Obstáculo <span style="font-size:0.6em; color:#ffeb3b;">MELHORADO</span></h1>
    
    <div class="instructions">
        <strong>ESPAÇO</strong> ou <strong>↑</strong> para pular • Clique na tela também funciona<br>
        <span style="color:#ffeb3b;">A cada 200 pontos fica mais rápido!</span><br>
        <span style="color:#4fc3f7;">A cada 1000 pontos muda o ambiente!</span>
    </div>
    
    <canvas id="game" width="800" height="420"></canvas>
    
    <div class="stage-info" id="stageText">Fase 1 - Deserto</div>
    
    <div class="footer">
        Recordes salvos automaticamente • Divirta-se! 
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });

        let player = {
            x: 110,
            y: 0,
            width: 44,
            height: 54,
            vy: 0
        };
        
        let obstacles = [];
        let particles = [];
        let score = 0;
        let highScore = 0;
        let gameSpeed = 4.8;
        let gravity = 0.68;
        let jumpForce = -14;
        let gameOver = false;
        let frame = 0;
        let groundOffset = 0;
        let currentStage = 0;
        let groundY = 340;

        function loadHighScore() {
            const saved = localStorage.getItem('pulaObstaculoMelhoradoHighScore');
            if (saved) highScore = parseInt(saved);
        }
        loadHighScore();

        function resetGame() {
            player.y = groundY - player.height;
            player.vy = 0;
            obstacles = [];
            particles = [];
            score = 0;
            gameSpeed = 4.8;
            gameOver = false;
            frame = 0;
            groundOffset = 0;
            currentStage = 0;
            updateStageDisplay();
        }

        function updateStageDisplay() {
            const stageNames = [
                "Fase 1 - Deserto",
                "Fase 2 - Floresta",
                "Fase 3 - Neve Noturna",
                "Fase 4 - Vulcão"
            ];
            const stageEl = document.getElementById('stageText');
            if (stageEl) {
                stageEl.textContent = stageNames[Math.min(currentStage, 3)];
                stageEl.style.color = currentStage === 3 ? '#ff7043' : 
                                     currentStage === 2 ? '#90caf9' : 
                                     currentStage === 1 ? '#81c784' : '#ffeb3b';
            }
        }

        function getCurrentStage() {
            return Math.floor(score / 1000);
        }

        function updateStage() {
            const newStage = getCurrentStage();
            if (newStage !== currentStage && newStage <= 3) {
                currentStage = newStage;
                updateStageDisplay();
                gameSpeed = Math.min(gameSpeed + 0.6, 13);
            }
        }

        function updateSpeed() {
            const speedLevel = Math.floor(score / 200);
            const baseSpeed = 4.8;
            const newSpeed = Math.min(baseSpeed + speedLevel * 0.38, 13.5);
            if (newSpeed > gameSpeed) gameSpeed = newSpeed;
        }

        function spawnObstacle() {
            let height, width, obsType;
            
            if (currentStage === 0) {
                height = 30 + Math.random() * 48;
                width = 20 + Math.random() * 12;
                obsType = 'cactus';
            } else if (currentStage === 1) {
                height = 35 + Math.random() * 55;
                width = 22 + Math.random() * 14;
                obsType = 'tree';
            } else if (currentStage === 2) {
                height = 28 + Math.random() * 42;
                width = 24 + Math.random() * 16;
                obsType = 'snow';
            } else {
                height = 32 + Math.random() * 50;
                width = 21 + Math.random() * 15;
                obsType = 'lava';
            }
            
            obstacles.push({
                x: canvas.width + 50,
                y: groundY - height,
                width: width,
                height: height,
                type: obsType
            });
        }

        function checkCollision(p, o) {
            return !(
                p.x + p.width < o.x ||
                p.x > o.x + o.width ||
                p.y + p.height < o.y ||
                p.y > o.y + o.height
            );
        }

        function createDust(x, y) {
            for (let i = 0; i < 3; i++) {
                particles.push({
                    x: x + Math.random() * 15,
                    y: y + Math.random() * 5,
                    vx: -1.5 - Math.random() * 1.5,
                    vy: -0.8 + Math.random() * 0.6,
                    life: 18 + Math.random() * 12,
                    size: 2 + Math.random() * 2.5
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12;
                p.life--;
                p.vx *= 0.96;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            ctx.fillStyle = currentStage === 2 ? '#e3f2fd' : 
                           currentStage === 3 ? '#ffcc80' : '#d7ccc8';
            
            for (let p of particles) {
                ctx.globalAlpha = Math.max(0.2, p.life / 25);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function updateGame() {
            player.vy += gravity;
            player.y += player.vy;

            if (player.y > groundY - player.height) {
                if (player.vy > 2) createDust(player.x + 20, groundY - 2);
                player.y = groundY - player.height;
                player.vy = 0;
            }

            if (!gameOver && player.vy === 0 && frame % 6 === 0) {
                createDust(player.x + 8, groundY - 3);
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
            }

            const spawnDistance = Math.max(180, 280 - gameSpeed * 8);
            if (obstacles.length === 0 || 
                obstacles[obstacles.length - 1].x < canvas.width - spawnDistance) {
                spawnObstacle();
            }

            for (let o of obstacles) {
                if (checkCollision(player, o)) {
                    gameOver = true;
                    break;
                }
            }

            score += 0.2;
            updateStage();
            updateSpeed();
            updateParticles();
        }

        function drawBackground() {
            const stage = currentStage;

            if (stage === 0) {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, '#4fc3f7');
                grad.addColorStop(0.6, '#81d4fa');
                grad.addColorStop(1, '#e1f5fe');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#ffeb3b';
                ctx.beginPath();
                ctx.arc(700, 70, 35, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#78909c';
                ctx.beginPath();
                ctx.moveTo(0, groundY);
                ctx.lineTo(180, groundY - 90);
                ctx.lineTo(320, groundY);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(250, groundY);
                ctx.lineTo(420, groundY - 110);
                ctx.lineTo(580, groundY);
                ctx.fill();

            } else if (stage === 1) {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, '#2e7d32');
                grad.addColorStop(0.5, '#43a047');
                grad.addColorStop(1, '#66bb6a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#c5e1a5';
                ctx.beginPath();
                ctx.arc(680, 65, 28, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#1b5e20';
                for (let i = 0; i < 5; i++) {
                    const tx = ((frame * 0.4 + i * 180) % (canvas.width + 100)) - 50;
                    ctx.fillRect(tx, groundY - 95, 18, 95);
                    ctx.beginPath();
                    ctx.moveTo(tx - 15, groundY - 95);
                    ctx.lineTo(tx + 9, groundY - 160);
                    ctx.lineTo(tx + 33, groundY - 95);
                    ctx.fill();
                }

            } else if (stage === 2) {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, '#1a237e');
                grad.addColorStop(0.4, '#283593');
                grad.addColorStop(1, '#5c6bc0');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#e3f2fd';
                ctx.beginPath();
                ctx.arc(680, 60, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#283593';
                ctx.beginPath();
                ctx.arc(695, 55, 26, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                for (let i = 0; i < 25; i++) {
                    const sx = (i * 37 + frame * 0.1) % canvas.width;
                    const sy = 30 + (i % 7) * 22;
                    ctx.fillRect(sx, sy, 2, 2);
                }

            } else {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, '#bf360c');
                grad.addColorStop(0.3, '#e65100');
                grad.addColorStop(1, '#ff8a65');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = 'rgba(66,66,66,0.4)';
                for (let i = 0; i < 3; i++) {
                    const smokeX = 720 + Math.sin(frame * 0.03 + i) * 15;
                    ctx.beginPath();
                    ctx.arc(smokeX, 55 + i * 18, 22 + i * 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawGround() {
            const stage = currentStage;
            groundOffset = (groundOffset + gameSpeed) % 50;

            if (stage === 0) {
                ctx.fillStyle = '#d7ccc8';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#a1887f';
                ctx.fillRect(0, groundY, canvas.width, 14);
            } else if (stage === 1) {
                ctx.fillStyle = '#2e7d32';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#1b5e20';
                ctx.fillRect(0, groundY, canvas.width, 14);
            } else if (stage === 2) {
                ctx.fillStyle = '#e3f2fd';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#90caf9';
                ctx.fillRect(0, groundY, canvas.width, 14);
            } else {
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#bf360c';
                ctx.fillRect(0, groundY, canvas.width, 14);
            }

            ctx.strokeStyle = stage === 2 ? '#bbdefb' : 
                             stage === 3 ? '#ffab91' : '#5d4037';
            ctx.lineWidth = 2.5;

            for (let x = -groundOffset; x < canvas.width + 60; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x + 12, groundY + 10);
                ctx.lineTo(x + 18, groundY - 3);
                ctx.lineTo(x + 24, groundY + 10);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);

            const isJumping = player.vy < -2;
            const runPhase = Math.sin(frame * 0.32) * (isJumping ? 0.3 : 1);

            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(23, 58, 24, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = currentStage === 3 ? '#ff7043' : '#2e7d32';
            ctx.fillRect(5, 16, 34, 30);

            ctx.fillStyle = currentStage === 3 ? '#ffab91' : '#43a047';
            ctx.fillRect(9, 22, 26, 20);

            ctx.fillStyle = currentStage === 3 ? '#ff7043' : '#2e7d32';
            ctx.fillRect(30, 6, 24, 22);
            ctx.fillRect(50, 12, 13, 11);

            ctx.fillStyle = '#fff';
            ctx.fillRect(40, 10, 9, 9);
            ctx.fillStyle = '#000';
            ctx.fillRect(43, 12, 5, 5);

            ctx.fillStyle = currentStage === 3 ? '#e64a19' : '#1b5e20';
            ctx.beginPath();
            ctx.moveTo(5, 26);
            ctx.quadraticCurveTo(-10 + runPhase * 2, 30 + runPhase, -14, 40);
            ctx.quadraticCurveTo(-5, 44, 5, 36);
            ctx.fill();

            ctx.fillStyle = currentStage === 3 ? '#e64a19' : '#1b5e20';
            const backLeg = 9 + runPhase * 3;
            ctx.fillRect(backLeg, 44, 9, 16);
            ctx.fillRect(backLeg - 2, 57, 7, 6);

            const frontLeg = 25 - runPhase * 3;
            ctx.fillRect(frontLeg, 44, 9, 16);
            ctx.fillRect(frontLeg + 2, 57, 7, 6);

            ctx.fillStyle = currentStage === 3 ? '#ff8a65' : '#388e3c';
            ctx.fillRect(32, 26, 8, 13);

            ctx.restore();
        }

        function drawObstacles() {
            for (let o of obstacles) {
                ctx.save();

                if (o.type === 'cactus') {
                    ctx.fillStyle = '#2e7d32';
                    ctx.fillRect(o.x, o.y, o.width, o.height);
                    ctx.fillStyle = '#388e3c';
                    ctx.fillRect(o.x + 3, o.y + 4, o.width - 6, o.height - 8);
                    if (o.height > 45) {
                        ctx.fillRect(o.x - 6, o.y + 14, 7, 8);
                        ctx.fillRect(o.x + o.width - 1, o.y + 20, 7, 8);
                    }
                    ctx.strokeStyle = '#1b5e20';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(o.x + 2, o.y + 2, o.width - 4, o.height - 4);
                    
                } else if (o.type === 'tree') {
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(o.x + 6, o.y, o.width - 12, o.height);
                    ctx.fillStyle = '#2e7d32';
                    ctx.beginPath();
                    ctx.ellipse(o.x + o.width/2, o.y - 5, o.width * 0.9, 22, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(o.x + o.width/2, o.y + 12, o.width * 0.75, 18, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                } else if (o.type === 'snow') {
                    ctx.fillStyle = '#90a4ae';
                    ctx.fillRect(o.x, o.y, o.width, o.height);
                    ctx.fillStyle = '#eceff1';
                    ctx.fillRect(o.x + 3, o.y + 3, o.width - 6, o.height - 6);
                    ctx.fillStyle = '#b0bec5';
                    ctx.fillRect(o.x + 2, o.y + 8, o.width - 4, 6);
                    
                } else if (o.type === 'lava') {
                    ctx.fillStyle = '#37474f';
                    ctx.fillRect(o.x, o.y, o.width, o.height);
                    ctx.fillStyle = '#ff5722';
                    ctx.fillRect(o.x + 4, o.y + 6, o.width - 8, o.height - 12);
                    ctx.fillStyle = '#ffab91';
                    ctx.fillRect(o.x + 6, o.y + 10, o.width - 12, 8);
                }

                ctx.restore();
            }
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px "Segoe UI", Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Pontos: ' + Math.floor(score), 25, 42);

            ctx.fillStyle = '#ffeb3b';
            ctx.font = 'bold 20px "Segoe UI", Arial';
            ctx.fillText('🏆 Recorde: ' + highScore, 25, 68);

            ctx.fillStyle = '#90caf9';
            ctx.font = '16px Arial';
            ctx.fillText('Velocidade: ' + gameSpeed.toFixed(1), 25, 90);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.65)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(170, 95, 460, 210);
            ctx.strokeStyle = '#f44336';
            ctx.lineWidth = 6;
            ctx.strokeRect(170, 95, 460, 210);

            ctx.fillStyle = '#c62828';
            ctx.font = 'bold 48px "Segoe UI", Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 400, 150);

            ctx.fillStyle = '#333';
            ctx.font = 'bold 26px "Segoe UI", Arial';
            ctx.fillText('Sua pontuação: ' + Math.floor(score), 400, 195);

            const finalScore = Math.floor(score);
            if (finalScore > highScore) {
                highScore = finalScore;
                localStorage.setItem('pulaObstaculoMelhoradoHighScore', highScore);
                ctx.fillStyle = '#ff6f00';
                ctx.font = 'bold 22px "Segoe UI", Arial';
                ctx.fillText('🎉 NOVO RECORDE! 🎉', 400, 230);
            } else {
                ctx.fillStyle = '#ff9800';
                ctx.font = 'bold 20px "Segoe UI", Arial';
                ctx.fillText('Recorde: ' + highScore, 400, 230);
            }

            ctx.fillStyle = '#1b5e20';
            ctx.font = 'bold 19px "Segoe UI", Arial';
            ctx.fillText('Pressione ESPAÇO para jogar novamente', 400, 275);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawGround();

            if (!gameOver) {
                updateGame();
            }

            drawObstacles();
            drawPlayer();
            drawParticles();
            drawHUD();

            if (gameOver) {
                drawGameOver();
            }

            if (!gameOver) frame++;
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Spacebar' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                } else if (player.y >= groundY - player.height - 4) {
                    player.vy = jumpForce;
                }
            }
            if ((e.key === 'r' || e.key === 'R') && gameOver) {
                resetGame();
            }
        });

        function handleJump() {
            if (gameOver) {
                resetGame();
            } else if (player.y >= groundY - player.height - 4) {
                player.vy = jumpForce;
            }
        }

        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleJump();
        });

        function startGame() {
            resetGame();
            setTimeout(() => { if (!gameOver && obstacles.length === 0) spawnObstacle(); }, 700);
            setTimeout(() => { if (!gameOver && obstacles.length < 2) spawnObstacle(); }, 1500);
            gameLoop();
        }

        startGame();
        canvas.setAttribute('tabindex', '1');
        canvas.focus();
    </script>
</body>
</html>
