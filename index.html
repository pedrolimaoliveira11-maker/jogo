<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Paulo Obstacle Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* TELA DE LOGIN */
        #login-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
        }

        .login-box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            border-top: 5px solid #FF0000;
            border-bottom: 5px solid #000;
        }

        .login-box h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-box p {
            color: #666;
            margin-bottom: 20px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }

        .google-btn:hover {
            background: #357AE8;
        }

        .google-icon {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4285F4;
            font-size: 14px;
        }

        /* ÁREA DO JOGO */
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            /* Foto de fundo do São Paulo (Estádio do MorumBIS) */
            background-image: url('https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?q=80&w=800&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Escondido até fazer login */
        }

        /* Personagem */
        #player {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 50px;
            height: 60px;
            background-color: #FF0000; /* Cor inicial: Vermelho */
            border: 3px solid #FFF;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        /* Obstáculo */
        #obstacle {
            position: absolute;
            bottom: 0;
            right: -40px;
            width: 30px;
            height: 50px;
            background-color: #000;
            border: 2px solid #FFF;
            border-radius: 3px;
        }

        /* Interface de Pontos e Poderes */
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }

        #power-status {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #fff;
            font-size: 16px;
            display: none;
        }

        /* Tela de Game Over */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
        }

        #game-over h2 {
            font-size: 40px;
            color: #FF0000;
            margin-bottom: 10px;
        }

        #game-over button {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: #FFF;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>São Paulo Runner</h1>
            <p>Faça login para salvar sua pontuação</p>
            <button class="google-btn" onclick="loginComGoogle()">
                <div class="google-icon">G</div>
                Entrar com o Google
            </button>
        </div>
    </div>

    <div id="game-container">
        <div id="ui-layer">
            <div id="score-display">Pontos: 0</div>
            <div id="power-status">⚡ PODER ATIVADO!</div>
        </div>
        
        <div id="player"></div>
        <div id="obstacle"></div>

        <div id="game-over">
            <h2>FIM DE JOGO</h2>
            <p id="final-score">Pontos: 0</p>
            <button onclick="resetGame()">Jogar Novamente</button>
        </div>
    </div>

    <script>
        // Elementos do HTML
        const loginScreen = document.getElementById('login-screen');
        const gameContainer = document.getElementById('game-container');
        const player = document.getElementById('player');
        const obstacle = document.getElementById('obstacle');
        const scoreDisplay = document.getElementById('score-display');
        const powerStatus = document.getElementById('power-status');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');

        // Variáveis de mecânica do jogo
        let score = 0;
        let isJumping = false;
        let isGameOver = false;
        let gameLoopInterval;
        let scoreInterval;

        // Configurações de Física Dinâmica (Mudam com os poderes)
        let jumpHeight = 150;     // Altura padrão do pulo
        let obstacleSpeed = 8;    // Velocidade padrão do obstáculo
        let currentLevel = 0;

        // Lista de cores que o jogador vai alternar a cada 200 pontos
        const coresSpfc = ["#FF0000", "#FFFFFF", "#000000", "#FFD700"]; 

        // 1. Simulação de Login do Google
        function loginComGoogle() {
            loginScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            startGame();
        }

        // 2. Iniciar o Jogo
        function startGame() {
            isGameOver = false;
            score = 0;
            currentLevel = 0;
            jumpHeight = 150;
            obstacleSpeed = 8;
            player.style.backgroundColor = coresSpfc[0];
            powerStatus.style.display = 'none';
            gameOverScreen.style.display = 'none';
            obstacle.style.right = '-40px';
            
            // Sistema de Pontuação (Ganha pontos por tempo vivo)
            scoreInterval = setInterval(() => {
                if (!isGameOver) {
                    score += 10;
                    scoreDisplay.innerText = "Pontos: " + score;
                    verificarEvolucao();
                }
            }, 100);

            // Loop de movimentação do obstáculo e colisões
            gameLoop();
        }

        // 3. Sistema de Evolução (A cada 200 pontos)
        function verificarEvolucao() {
            // Calcula em qual "nível de 200 pontos" o jogador está
            let level doMomento = Math.floor(score / 200);

            if (level doMomento > currentLevel) {
                currentLevel = level doMomento;
                
                // Troca a cor do boneco baseado na lista do São Paulo
                let novaCorIndex = currentLevel % coresSpfc.length;
                player.style.backgroundColor = coresSpfc[novaCorIndex];

                // ATIVA OS PODERES: Pular mais alto e correr mais rápido (obstáculo vem mais rápido)
                jumpHeight = 150 + (currentLevel * 30); // Pula cada vez mais alto
                obstacleSpeed = 8 + (currentLevel * 3);  // Jogo fica mais rápido

                // Mostra o alerta de Poder
                powerStatus.innerText = `⚡ PODER NÍVEL ${currentLevel}!`;
                powerStatus.style.display = 'block';
                
                // Pisca o aviso de poder
                setTimeout(() => { powerStatus.style.display = 'none'; }, 2000);
            }
        }

        // 4. Comando de Pulo (Espaço ou Seta para Cima ou Toque na tela)
        document.addEventListener('keydown', (event) => {
            if ((event.code === 'Space' || event.code === 'ArrowUp') && !isJumping && !isGameOver) {
                pular();
            }
        });

        function pular() {
            isJumping = true;
            let position = 0;
            
            // Subida do Pulo (Usa a variável dinâmica jumpHeight)
            let upInterval = setInterval(() => {
                if (position >= jumpHeight) {
                    clearInterval(upInterval);
                    
                    // Descida do Pulo
                    let downInterval = setInterval(() => {
                        if (position <= 0) {
                            clearInterval(downInterval);
                            isJumping = false;
                        }
                        position -= 6;
                        player.style.bottom = position + 'px';
                    }, 20);
                }
                position += 6;
                player.style.bottom = position + 'px';
            }, 20);
        }

        // 5. Movimentação do Obstáculo e Checagem de Hitbox
        function gameLoop() {
            let obstaclePosition = -40;
            obstacle.style.right = obstaclePosition + 'px';

            function update() {
                if (isGameOver) return;

                // Move o obstáculo para a esquerda baseado na velocidade atual
                obstaclePosition += obstacleSpeed;
                if (obstaclePosition > 840) {
                    obstaclePosition = -40; // Reseta a posição quando sai da tela
                }
                obstacle.style.right = obstaclePosition + 'px';

                // Lógica de colisão corrigida para coordenadas do CSS
                let playerBottom = parseInt(player.style.bottom) || 0;
                
                // Transforma a posição da direita para correspondência com a esquerda do jogador
                // O jogador está fixo a 50px da esquerda. O container tem 800px.
                let obstacleLeft = 800 - obstaclePosition - 30; 

                if (obstacleLeft < 100 && obstacleLeft > 50 && playerBottom < 50) {
                    // Se bateu, é Fim de Jogo!
                    isGameOver = true;
                    clearInterval(scoreInterval);
                    finalScoreDisplay.innerText = "Pontos Finais: " + score;
                    gameOverScreen.style.display = 'flex';
                }

                requestAnimationFrame(update);
            }

            requestAnimationFrame(update);
        }

        // 6. Reiniciar o jogo
        function resetGame() {
            startGame();
        }
    </script>
</body>
</html>
