<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Guerra 6DoF - Linhas de Frente</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }
        #controles {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>Painel de Controle</h2>
        <p>Unidade Atual: <strong id="unidade-ativa" style="color: #00ff00;">Soldado</strong></p>
        <hr>
        <div id="controles">
            <strong>Mudar de Unidade Aliada:</strong><br>
            [1] Soldado | [2] Tanque | [3] Avião<br><br>
            <strong>Movimentação:</strong><br>
            W, A, S, D - Mover / Rotacionar<br>
            Espaço / Shift - Subir / Descer (Avião)
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO INICIAL DO CENÁRIO ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x334422); 
        scene.fog = new THREE.FogExp2(0x334422, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Iluminação
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Chão (Campo de Batalha)
        const floorGeo = new THREE.PlaneGeometry(500, 500);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x556b2f });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- VARIÁVEIS DE JOGO ---
        let tipoUnidade = 'soldado'; 
        const teclado = {};
        const unidadesAliadas = {};
        const unidadesInimigas = [];

        // --- CRIAÇÃO MODELOS 3D BÁSICOS ---

        // 1. Soldado
        function criarSoldado(cor) {
            const grupo = new THREE.Group();
            const corpo = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.8), new THREE.MeshStandardMaterial({ color: cor }));
            corpo.position.y = 0.9;
            corpo.castShadow = true;
            grupo.add(corpo);
            
            const arma = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({ color: 0x111 }));
            arma.position.set(0, 1.2, 0.5);
            grupo.add(arma);
            return grupo;
        }

        // 2. Tanque
        function criarTanque(cor) {
            const grupo = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 3), new THREE.MeshStandardMaterial({ color: cor }));
            base.position.y = 0.5;
            base.castShadow = true;
            grupo.add(base);

            const torre = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 1.5), new THREE.MeshStandardMaterial({ color: cor - 0x111111 }));
            torre.position.set(0, 1.3, -0.2);
            grupo.add(torre);

            const canhao = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 2), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            canhao.rotation.x = Math.PI / 2;
            canhao.position.set(0, 1.3, 1);
            grupo.add(canhao);
            return grupo;
        }

        // 3. Avião
        function criarAviao(cor) {
            const grupo = new THREE.Group();
            const corpo = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.2, 3), new THREE.MeshStandardMaterial({ color: cor }));
            corpo.rotation.x = Math.PI / 2;
            grupo.add(corpo);

            const asas = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 1), new THREE.MeshStandardMaterial({ color: cor }));
            asas.position.set(0, 0, 0.2);
            grupo.add(asas);

            const cauda = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 0.1), new THREE.MeshStandardMaterial({ color: cor }));
            cauda.position.set(0, 0.3, -1.3);
            grupo.add(cauda);
            return grupo;
        }

        // --- ALINHAMENTO DAS LINHAS DE FRENTE ---

        // LADO ESQUERDO: Seus Soldados e Veículos (Aliados - Verdes/Azul)
        unidadesAliadas.soldado = criarSoldado(0x2e8b57);
        unidadesAliadas.tanque = criarTanque(0x556b2f);  
        unidadesAliadas.aviao = criarAviao(0x4682b4);    

        // Posicionados no eixo X negativo, olhando para a direita (X positivo)
        unidadesAliadas.soldado.position.set(-30, 0, -10);
        unidadesAliadas.tanque.position.set(-30, 0, 10);
        unidadesAliadas.aviao.position.set(-40, 15, 0);

        // Rotacionar para olhar para o lado do inimigo (Direita)
        unidadesAliadas.soldado.rotation.y = Math.PI / 2;
        unidadesAliadas.tanque.rotation.y = Math.PI / 2;
        unidadesAliadas.aviao.rotation.y = Math.PI / 2;

        scene.add(unidadesAliadas.soldado);
        scene.add(unidadesAliadas.tanque);
        scene.add(unidadesAliadas.aviao);


        // LADO DIREITO: Inimigos (Vermelhos)
        const configsInimigos = [
            { tipo: 'soldado', pos: [30, 0, -15] },
            { tipo: 'soldado', pos: [30, 0, -5] },
            { tipo: 'tanque', pos: [30, 0, 10] },
            { tipo: 'aviao', pos: [40, 20, 0] }
        ];

        configsInimigos.forEach(cfg => {
            let inimigo;
            if (cfg.tipo === 'soldado') inimigo = criarSoldado(0x8b0000);
            if (cfg.tipo === 'tanque') inimigo = criarTanque(0x5c0000);
            if (cfg.tipo === 'aviao') inimigo = criarAviao(0x800000);
            
            inimigo.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
            
            // Rotacionar para olhar para o seu lado (Esquerda)
            inimigo.rotation.y = -Math.PI / 2;
            
            scene.add(inimigo);
            unidadesInimigas.push(inimigo);
        });

        // --- SISTEMA DE ENTRADA (TECLADO) ---
        window.addEventListener('keydown', (e) => {
            teclado[e.key.toLowerCase()] = true;
            
            if (e.key === '1') { tipoUnidade = 'soldado'; atualizarUI('Soldado'); }
            if (e.key === '2') { tipoUnidade = 'tanque'; atualizarUI('Tanque'); }
            if (e.key === '3') { tipoUnidade = 'aviao'; atualizarUI('Avião'); }
        });
        window.addEventListener('keyup', (e) => { teclado[e.key.toLowerCase()] = false; });

        function atualizarUI(nome) {
            document.getElementById('unidade-ativa').innerText = nome;
        }

        // --- LÓGICA DE MOVIMENTAÇÃO ---
        const clock = new THREE.Clock();

        function atualizarMovimento(delta) {
            const atual = unidadesAliadas[tipoUnidade];

            if (tipoUnidade === 'soldado' || tipoUnidade === 'tanque') {
                const vel = (tipoUnidade === 'soldado' ? 8 : 5) * delta;
                const rotVel = (tipoUnidade === 'soldado' ? 3 : 1.5) * delta;
                
                // Mover para frente/trás baseado na direção atual do modelo
                if (teclado['w']) atual.translateZ(vel);
                if (teclado['s']) atual.translateZ(-vel);
                if (teclado['a']) atual.rotation.y += rotVel;
                if (teclado['d']) atual.rotation.y -= rotVel;
                atual.position.y = 0;
            } 
            
            else if (tipoUnidade === 'aviao') {
                const velVoo = 15 * delta;
                const velRot = 2 * delta;

                // Avanço contínuo
                atual.translateZ(velVoo);

                // Controles de inclinação e rotação (6DoF)
                if (teclado['w']) atual.rotateX(velRot);
                if (teclado['s']) atual.rotateX(-velRot);
                if (teclado['a']) atual.rotateZ(velRot);
                if (teclado['d']) atual.rotateZ(-velRot);
                if (teclado[' ']) atual.position.y += velVoo * 0.5; 
                if (teclado['shift']) atual.position.y -= velVoo * 0.5; 

                if (atual.position.y < 1) atual.position.y = 1;
            }

            // Câmera posicionada atrás da unidade selecionada
            const offset = new THREE.Vector3(0, 4, -10); 
            offset.applyQuaternion(atual.quaternion);
            camera.position.copy(atual.position).add(offset);
            camera.lookAt(atual.position.clone().add(new THREE.Vector3(0, 1, 0)));
        }

        // --- LOOP PRINCIPAL ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            atualizarMovimento(delta);

            // Animação leve para o avião inimigo pairar no ar
            const aviaoInimigo = unidadesInimigas[3];
            aviaoInimigo.position.y = 20 + Math.sin(clock.getElapsedTime() * 1.5) * 2;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
