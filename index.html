<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Jump - Poderes Ativados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0e15;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(13, 14, 21, 0.85);
            color: #fff;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        .escondido {
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            font-size: 4rem;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #a0a5c0;
        }
        .btn {
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff007f;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #7f00ff;
        }
        /* Alerta de Poder Soltado na Tela */
        #alerta-poder {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 8;
            pointer-events: none;
            text-shadow: 0 0 20px #fff;
            opacity: 0;
            transition: opacity 0.3s, transform 0.5s;
        }
        #alerta-poder.visivel {
            opacity: 1;
            transform: translate(-50%, -40%);
        }
        /* Placar */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
            z-index: 5;
            pointer-events: none;
        }
        .score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #score { color: #00ffcc; }
        #highscore { color: #ff007f; }
        #status-poder {
            position: absolute;
            top: 90px;
            left: 20px;
            color: #ffcc00;
            font-size: 1.2rem;
            font-family: monospace;
            text-shadow: 0 0 10px #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="score-box">SCORE: <span id="score">0</span></div>
        <div class="score-box">HI-SCORE: <span id="highscore">0</span></div>
    </div>
    
    <div id="status-poder"></div>

    <div id="alerta-poder">SUPER PULO!</div>

    <div id="menu-inicial" class="overlay">
        <h1>Cyber Jump</h1>
        <p>A cada 200 pontos você muda de cor e ganha poderes!</p>
        <button class="btn" onclick="iniciarJogo()">JOGAR (Espaço)</button>
    </div>

    <div id="tela-gameover" class="overlay escondido">
        <h1 style="color: #ff007f; text-shadow: 0 0 20px #ff007f;">Game Over</h1>
        <p id="pontuacao-final">Você fez 0 pontos</p>
        <button class="btn" onclick="reiniciarJogo()">TENTAR DE NOVO</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const menuInicial = document.getElementById("menu-inicial");
        const telaGameOver = document.getElementById("tela-gameover");
        const txtScore = document.getElementById("score");
        const txtHighScore = document.getElementById("highscore");
        const txtFinalScore = document.getElementById("pontuacao-final");
        const alertaPoder = document.getElementById("alerta-poder");
        const statusPoder = document.getElementById("status-poder");

        function ajustarTela() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", ajustarTela);
        ajustarTela();

        let jogoRodando = false;
        let score = 0;
        let highscore = localStorage.getItem("highscore") || 0;
        txtHighScore.innerText = highscore;

        let velocidadeMundo = 7;
        const gravidade = 1.2;
        
        // Controle de Cores e Ciclos
        let ultimoCicloPontos = 0;
        let corJogador = "#00ffcc";
        let corObstaculo = "#ff007f";
        const paletaCores = ["#00ffcc", "#ff007f", "#ffcc00", "#00ff00", "#ff3300", "#9933ff", "#00ffff"];

        // Atributos do Jogador
        const jogador = {
            x: 100,
            y: 0,
            largura: 50,
            altura: 50,
            velocidadeY: 0,
            forcaPuloPadrao: -21,
            forcaPuloAtual: -21,
            noChao: false,
            atualizar() {
                this.velocidadeY += gravidade;
                this.y += this.velocidadeY;

                const linhaChao = canvas.height - 120 - this.altura;
                if (this.y >= linhaChao) {
                    this.y = linhaChao;
                    this.velocidadeY = 0;
                    this.noChao = true;
                }
            },
            pular() {
                if (this.noChao && jogoRodando) {
                    this.velocidadeY = this.forcaPuloAtual;
                    this.noChao = false;
                }
            },
            desenhar() {
                ctx.fillStyle = corJogador;
                ctx.shadowBlur = 15;
                ctx.shadowColor = corJogador;
                ctx.fillRect(this.x, this.y, this.largura, this.altura);
                ctx.shadowBlur = 0;
            }
        };

        class Obstaculo {
            constructor() {
                this.largura = 30 + Math.random() * 40;
                this.altura = 40 + Math.random() * 60;
                this.x = canvas.width + 100;
                this.y = canvas.height - 120 - this.altura;
            }
            atualizar() {
                this.x -= velocidadeMundo;
            }
            desenhar() {
                ctx.fillStyle = corObstaculo;
                ctx.shadowBlur = 15;
                ctx.shadowColor = corObstaculo;
                ctx.fillRect(this.x, this.y, this.largura, this.altura);
                ctx.shadowBlur = 0;
            }
        }

        let listaObstaculos = [];
        let tempoProximoObstaculo = 0;

        // Gerenciador de Upgrades e Eventos Visuais
        function gerenciarEvolucao() {
            let cicloAtual = Math.floor(score / 200);
            
            if (cicloAtual > ultimoCicloPontos) {
                ultimoCicloPontos = cicloAtual;
                
                // 1. Trocar cores aleatoriamente
                let novaCor1 = paletaCores[Math.floor(Math.random() * paletaCores.length)];
                let novaCor2 = paletaCores[Math.floor(Math.random() * paletaCores.length)];
                while(novaCor1 === novaCor2) { novaCor2 = paletaCores[Math.floor(Math.random() * paletaCores.length)]; }
                corJogador = novaCor1;
                corObstaculo = novaCor2;

                // 2. Alternar os Poderes de forma justa
                if (cicloAtual % 2 === 1) {
                    // Ativa Super Pulo
                    jogador.forcaPuloAtual = -27; // Pula bem mais alto (padrão é -21)
                    mostrarAvisoPoder("⚡ SUPER PULO ATIVADO! ⚡", corJogador);
                    statusPoder.innerText = "MODO: Super Pulo Ativo";
                    statusPoder.style.color = corJogador;
                } else {
                    // Ativa Super Corrida (Velocidade do cenário aumenta muito rápido)
                    velocidadeMundo += 5;
                    jogador.forcaPuloAtual = jogador.forcaPuloPadrao; // Reseta pulo
                    mostrarAvisoPoder("🏃 MODO CORRIDA ATIVADO! 🏃", corJogador);
                    statusPoder.innerText = "MODO: Super Velocidade";
                    statusPoder.style.color = corJogador;
                }
            }
        }

        function mostrarAvisoPoder(texto, cor) {
            alertaPoder.innerText = texto;
            alertaPoder.style.textShadow = `0 0 20px ${cor}`;
            alertaPoder.classList.add("visivel");
            
            setTimeout(() => {
                alertaPoder.classList.remove("visivel");
            }, 1800);
        }

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" || e.code === "ArrowUp") {
                if (!jogoRodando && menuInicial.style.display !== "none") {
                    iniciarJogo();
                } else {
                    jogador.pular();
                }
            }
        });
        window.addEventListener("touchstart", () => { jogador.pular(); });
        window.addEventListener("mousedown", () => { jogador.pular(); });

        function iniciarJogo() {
            menuInicial.style.display = "none";
            telaGameOver.classList.add("escondido");
            score = 0;
            ultimoCicloPontos = 0;
            velocidadeMundo = 8;
            corJogador = "#00ffcc";
            corObstaculo = "#ff007f";
            jogador.forcaPuloAtual = jogador.forcaPuloPadrao;
            statusPoder.innerText = "MODO: Normal";
            statusPoder.style.color = "#ffcc00";
            listaObstaculos = [];
            tempoProximoObstaculo = 0;
            jogador.y = canvas.height - 120 - jogador.altura;
            jogoRodando = true;
        }

        function gameOver() {
            jogoRodando = false;
            telaGameOver.classList.remove("escondido");
            txtFinalScore.innerText = `Você atingiu ${Math.floor(score)} pontos!`;
            
            if (Math.floor(score) > highscore) {
                highscore = Math.floor(score);
                localStorage.setItem("highscore", highscore);
                txtHighScore.innerText = highscore;
            }
        }

        function reiniciarJogo() {
            iniciarJogo();
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const linhaChaoY = canvas.height - 120;
            ctx.strokeStyle = "#252836";
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, linhaChaoY);
            ctx.lineTo(canvas.width, linhaChaoY);
            ctx.stroke();

            if (jogoRodando) {
                // Se estiver no modo corrida (velocidade alta), ganha pontos mais rápido
                let multiplicadorPontos = velocidadeMundo > 12 ? 0.35 : 0.18;
                score += multiplicadorPontos;
                txtScore.innerText = Math.floor(score);
                
                // Aceleração passiva padrão do jogo
                velocidadeMundo += 0.0015;

                gerenciarEvolucao();
                jogador.atualizar();

                tempoProximoObstaculo--;
                if (tempoProximoObstaculo <= 0) {
                    listaObstaculos.push(new Obstaculo());
                    // Ajusta o surgimento baseado na velocidade do mundo para não criar barreiras impossíveis
                    tempoProximoObstaculo = Math.max(45, 90 - (velocidadeMundo * 2)) + Math.random() * 40; 
                }

                for (let i = listaObstaculos.length - 1; i >= 0; i--) {
                    let obs = listaObstaculos[i];
                    obs.atualizar();
                    obs.desenhar();

                    if (obs.x + obs.largura < 0) {
                        listaObstaculos.splice(i, 1);
                        continue;
                    }

                    if (
                        jogador.x < obs.x + obs.largura &&
                        jogador.x + jogador.largura > obs.x &&
                        jogador.y < obs.y + obs.altura &&
                        jogador.y + jogador.altura > obs.y
                    ) {
                        gameOver();
                    }
                }
            }

            jogador.desenhar();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
