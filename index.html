<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Boxe - 2 Jogadores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: #222;
            display: block;
        }
        #instrucoes {
            position: absolute;
            top: 10px;
            color: white;
            text-align: center;
            font-size: 14px;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="instrucoes">
        <strong>Clique na tela para ativar Tela Cheia</strong><br>
        P1: A/D (Mover), W (Soco) | P2: Setas Esq/Dir (Mover), Seta Cima (Soco)
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Ajusta o tamanho do canvas para o tamanho da tela
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Reajusta as posições caso a tela mude de tamanho no meio do jogo
            if(player1 && player2) {
                player1.y = canvas.height * chaoioridade - player1.height;
                player2.y = canvas.height * chaoioridade - player2.height;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Entrar em tela cheia ao clicar
        window.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Erro ao ativar tela cheia: ${err.message}`);
                });
            }
        });

        // Configurações do Jogo
        const chaoioridade = 0.8; // Altura do chão proporcional
        
        const player1 = {
            x: 200,
            y: 0,
            width: 60,
            height: 120,
            color: '#e74c3c',
            nome: 'Jogador 1',
            lado: 1, // 1 = Direita, -1 = Esquerda
            vida: 100,
            isAtacando: false,
            tempoAtaque: 0,
            velocidade: 8,
            pontos: 0
        };

            height: 120,

            nome: 'Jogador 2',
            lado: -1,
            vida: 100,

            tempoAtaque: 0,
            velocidade: 8,
            pontos: 0
        };

            player1.x = canvas.width * 0.25;
            player2.x = canvas.width * 0.75 - player2.width;
            player1.y = canvas.height * chaoioridade - player1.height;
            player2.y = canvas.height * chaoioridade - player2.height;
            player1.vida = 100;
            player2.vida = 100;
        }

        window.addEventListener('keydown', (e) => teclas[e.code] = true);

                }

                }
            }
