<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Pichador na Cidade</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background: linear-gradient(to bottom, #0d1b2a, #1b263b);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        h1 {
            color: #00e5ff;
            text-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
            margin-bottom: 5px;
            font-size: 2.5em;
        }
        
        .instructions {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 25px;
            border-radius: 20px;
            margin-bottom: 10px;
            color: #b0bec5;
            font-size: 1.05em;
            text-align: center;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        
        #game {
            border: 8px solid #00e5ff;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            background: #fff;
            cursor: pointer;
        }
        
        .stage-info {
            margin-top: 8px;
            font-size: 1.15em;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
        }
        
        .footer {
            margin-top: 10px;
            color: #78909c;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>🎨 Pichador na Cidade</h1>
    
    <div class="instructions">
        <strong>ESPAÇO</strong> ou <strong>↑</strong> para pular • Clique na tela também pula<br>
        <span style="color:#ffeb3b;">A cada 200 pontos fica mais rápido</span> • 
        <span style="color:#4fc3f7;">A cada 1000 pontos muda a cidade</span>
    </div>
    
    <canvas id="game" width="820" height="430"></canvas>
    
    <div class="stage-info" id="stageText">Fase 1 - Centro da Cidade</div>
    
    <div class="footer">
        Um pichador correndo pela cidade • Recordes salvos no navegador
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });

        let player = {
            x: 105,
            y: 0,
            width: 38,
            height: 58,
            vy: 0
        };
        
        let obstacles = [];
        let particles = [];
        let rainParticles = [];
        let score = 0;
        let highScore = 0;
        let gameSpeed = 5.0;
        let gravity = 0.7;
        let jumpForce = -14.5;
        let gameOver = false;
        let frame = 0;
        let groundOffset = 0;
        let currentStage = 0;
        let groundY = 355;

        function loadHighScore() {
            const saved = localStorage.getItem('pichadorHighScore');
            if (saved) highScore = parseInt(saved);
        }
        loadHighScore();

        function resetGame() {
            player.y = groundY - player.height;
            player.vy = 0;
            obstacles = [];
            particles = [];
            rainParticles = [];
            score = 0;
            gameSpeed = 5.0;
            gameOver = false;
            frame = 0;
            groundOffset = 0;
            currentStage = 0;
            updateStageDisplay();
        }

        function updateStageDisplay() {
            const names = [
                "Fase 1 - Centro da Cidade",
                "Fase 2 - Noite Neon",
                "Fase 3 - Chuva na Cidade",
                "Fase 4 - Telhados"
            ];
            const el = document.getElementById('stageText');
            if (el) {
                el.textContent = names[Math.min(currentStage, 3)];
                el.style.color = currentStage === 3 ? '#ff7043' : 
                                currentStage === 2 ? '#4fc3f7' : 
                                currentStage === 1 ? '#ce93d8' : '#00e5ff';
            }
        }

        function getCurrentStage() {
            return Math.floor(score / 1000);
        }

        function updateStage() {
            const newStage = getCurrentStage();
            if (newStage !== currentStage && newStage <= 3) {
                currentStage = newStage;
                updateStageDisplay();
                gameSpeed = Math.min(gameSpeed + 0.7, 14);
            }
        }

        function updateSpeed() {
            const level = Math.floor(score / 200);
            const newSpeed = Math.min(5.0 + level * 0.42, 14);
            if (newSpeed > gameSpeed) gameSpeed = newSpeed;
        }

        function spawnObstacle() {
            let height, width, type;
            const stage = currentStage;

            if (stage === 0) {
                height = 32 + Math.random() * 38;
                width = 22 + Math.random() * 12;
                type = Math.random() > 0.5 ? 'trash' : 'box';
            } else if (stage === 1) {
                height = 28 + Math.random() * 35;
                width = 20 + Math.random() * 14;
                type = Math.random() > 0.6 ? 'cone' : 'barrel';
            } else if (stage === 2) {
                height = 25 + Math.random() * 40;
                width = 24 + Math.random() * 10;
                type = Math.random() > 0.5 ? 'bench' : 'hydrant';
            } else {
                height = 30 + Math.random() * 42;
                width = 23 + Math.random() * 11;
                type = Math.random() > 0.5 ? 'box' : 'vent';
            }

            obstacles.push({
                x: canvas.width + 55,
                y: groundY - height,
                width: width,
                height: height,
                type: type
            });
        }

        function checkCollision(p, o) {
            return !(
                p.x + p.width < o.x ||
                p.x > o.x + o.width ||
                p.y + p.height < o.y ||
                p.y > o.y + o.height
            );
        }

        function createDust(x, y) {
            for (let i = 0; i < 4; i++) {
                particles.push({
                    x: x + Math.random() * 12,
                    y: y,
                    vx: -2.2 - Math.random() * 1.8,
                    vy: -1.2 + Math.random() * 0.8,
                    life: 16 + Math.random() * 14,
                    size: 2.5 + Math.random() * 2
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life--;
                p.vx *= 0.95;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            ctx.fillStyle = currentStage === 2 ? '#90caf9' : '#b0bec5';
            for (let p of particles) {
                ctx.globalAlpha = Math.max(0.15, p.life / 22);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function updateRain() {
            if (currentStage !== 2) {
                rainParticles = [];
                return;
            }
            if (rainParticles.length < 80) {
                for (let i = 0; i < 6; i++) {
                    rainParticles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * (groundY - 30),
                        len: 8 + Math.random() * 10,
                        speed: 6 + Math.random() * 5
                    });
                }
            }
            for (let i = rainParticles.length - 1; i >= 0; i--) {
                const r = rainParticles[i];
                r.y += r.speed;
                if (r.y > groundY) rainParticles.splice(i, 1);
            }
        }

        function drawRain() {
            if (currentStage !== 2) return;
            ctx.strokeStyle = 'rgba(144, 202, 249, 0.6)';
            ctx.lineWidth = 1.5;
            for (let r of rainParticles) {
                ctx.beginPath();
                ctx.moveTo(r.x, r.y);
                ctx.lineTo(r.x, r.y + r.len);
                ctx.stroke();
            }
        }

        function updateGame() {
            player.vy += gravity;
            player.y += player.vy;

            if (player.y > groundY - player.height) {
                if (player.vy > 3) createDust(player.x + 18, groundY);
                player.y = groundY - player.height;
                player.vy = 0;
            }

            if (!gameOver && player.vy === 0 && frame % 5 === 0) {
                createDust(player.x + 6, groundY - 1);
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
            }

            const spawnDist = Math.max(170, 290 - gameSpeed * 9);
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - spawnDist) {
                spawnObstacle();
            }

            for (let o of obstacles) {
                if (checkCollision(player, o)) {
                    gameOver = true;
                    break;
                }
            }

            score += 0.22;
            updateStage();
            updateSpeed();
            updateParticles();
            updateRain();
        }

        function drawBackground() {
            const stage = currentStage;

            if (stage === 0) {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, '#4fc3f7');
                grad.addColorStop(0.55, '#81d4fa');
                grad.addColorStop(1, '#e3f2fd');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#607d8b';
                ctx.fillRect(50, 80, 90, groundY - 80);
                ctx.fillRect(180, 50, 70, groundY - 50);
                ctx.fillRect(290, 95, 85, groundY - 95);
                ctx.fillRect(420, 40, 65, groundY - 40);
                ctx.fillRect(530, 75, 95, groundY - 75);
                ctx.fillRect(670, 60, 75, groundY - 60);

                ctx.fillStyle = '#ffeb3b';
                for (let bx of [60, 200, 305, 440, 550, 690]) {
                    for (let by = 100; by < groundY - 30; by += 28) {
                        ctx.fillRect(bx, by, 12, 14);
                    }
                }

                ctx.fillStyle = '#ffeb3b';
                ctx.beginPath();
                ctx.arc(720, 55, 32, 0, Math.PI * 2);
                ctx.fill();

            } else if (stage === 1) {
                ctx.fillStyle = '#1a237e';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#263238';
                ctx.fillRect(40, 70, 95, groundY - 70);
                ctx.fillRect(170, 45, 75, groundY - 45);
                ctx.fillRect(280, 85, 90, groundY - 85);
                ctx.fillRect(410, 35, 70, groundY - 35);
                ctx.fillRect(520, 65, 100, groundY - 65);
                ctx.fillRect(660, 55, 80, groundY - 55);

                ctx.fillStyle = '#00e5ff';
                for (let bx of [55, 190, 300, 430, 540, 680]) {
                    for (let by = 95; by < groundY - 25; by += 26) {
                        if (Math.random() > 0.3) ctx.fillRect(bx, by, 11, 13);
                    }
                }

                ctx.fillStyle = '#ff4081';
                ctx.fillRect(300, 120, 60, 8);
                ctx.fillStyle = '#7c4dff';
                ctx.fillRect(520, 95, 45, 7);

            } else if (stage === 2) {
                ctx.fillStyle = '#37474f';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#455a64';
                ctx.fillRect(30, 65, 100, groundY - 65);
                ctx.fillRect(160, 40, 80, groundY - 40);
                ctx.fillRect(270, 80, 95, groundY - 80);
                ctx.fillRect(400, 30, 75, groundY - 30);
                ctx.fillRect(510, 60, 105, groundY - 60);
                ctx.fillRect(650, 50, 85, groundY - 50);

                ctx.fillStyle = '#78909c';
                for (let bx of [45, 180, 290, 420, 530, 670]) {
                    for (let by = 90; by < groundY - 20; by += 25) {
                        ctx.fillRect(bx, by, 10, 12);
                    }
                }

            } else {
                ctx.fillStyle = '#1b263b';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#37474f';
                ctx.fillRect(20, 30, 110, groundY - 30);
                ctx.fillRect(150, 15, 85, groundY - 15);
                ctx.fillRect(260, 45, 100, groundY - 45);
                ctx.fillRect(390, 10, 80, groundY - 10);
                ctx.fillRect(500, 35, 110, groundY - 35);
                ctx.fillRect(640, 25, 90, groundY - 25);

                ctx.fillStyle = '#546e7a';
                ctx.fillRect(20, 30, 110, 12);
                ctx.fillRect(150, 15, 85, 12);
                ctx.fillRect(260, 45, 100, 12);
            }
        }

        function drawGround() {
            const stage = currentStage;
            groundOffset = (groundOffset + gameSpeed) % 55;

            if (stage === 0) {
                ctx.fillStyle = '#78909c';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#546e7a';
                ctx.fillRect(0, groundY, canvas.width, 16);
            } else if (stage === 1) {
                ctx.fillStyle = '#37474f';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#263238';
                ctx.fillRect(0, groundY, canvas.width, 16);
            } else if (stage === 2) {
                ctx.fillStyle = '#455a64';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#37474f';
                ctx.fillRect(0, groundY, canvas.width, 16);
            } else {
                ctx.fillStyle = '#37474f';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#263238';
                ctx.fillRect(0, groundY, canvas.width, 16);
            }

            ctx.strokeStyle = stage === 2 ? '#90caf9' : '#b0bec5';
            ctx.lineWidth = 2.5;
            for (let x = -groundOffset; x < canvas.width + 70; x += 55) {
                ctx.beginPath();
                ctx.moveTo(x + 15, groundY + 12);
                ctx.lineTo(x + 22, groundY - 2);
                ctx.lineTo(x + 29, groundY + 12);
                ctx.stroke();
            }

            ctx.strokeStyle = '#ffeb3b';
            ctx.lineWidth = 3;
            for (let x = -groundOffset * 1.3; x < canvas.width; x += 90) {
                ctx.beginPath();
                ctx.moveTo(x, groundY + 28);
                ctx.lineTo(x + 45, groundY + 28);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);

            const isJumping = player.vy < -3;
            const runPhase = Math.sin(frame * 0.35) * (isJumping ? 0.4 : 1.1);

            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath();
            ctx.ellipse(20, 62, 22, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#37474f';
            const backLegX = 8 + runPhase * 3.5;
            ctx.fillRect(backLegX, 46, 9, 18);
            ctx.fillRect(backLegX - 1, 61, 7, 6);

            const frontLegX = 22 - runPhase * 3.5;
            ctx.fillRect(frontLegX, 46, 9, 18);
            ctx.fillRect(frontLegX + 2, 61, 7, 6);

            ctx.fillStyle = currentStage === 1 ? '#7c4dff' : '#00bcd4';
            ctx.fillRect(6, 18, 30, 30);

            ctx.fillStyle = currentStage === 1 ? '#5c00b3' : '#0097a7';
            ctx.beginPath();
            ctx.ellipse(21, 22, 16, 14, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffcc80';
            ctx.beginPath();
            ctx.arc(22, 18, 11, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#263238';
            ctx.beginPath();
            ctx.ellipse(23, 12, 12, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(12, 10, 22, 5);

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(26, 17, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(27, 17, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#455a64';
            ctx.fillRect(32, 24, 8, 16);

            ctx.fillStyle = '#ffcc80';
            ctx.fillRect(35, 36, 9, 8);

            ctx.fillStyle = '#ffeb3b';
            ctx.fillRect(38, 30, 7, 14);
            ctx.fillStyle = '#ff9800';
            ctx.fillRect(38, 30, 3, 14);
            ctx.fillStyle = '#263238';
            ctx.fillRect(39, 28, 5, 4);

            if (!isJumping && frame % 3 === 0) {
                ctx.fillStyle = 'rgba(255, 235, 59, 0.6)';
                ctx.fillRect(46, 33 + Math.sin(frame) * 2, 8, 3);
            }

            ctx.restore();
        }

        function drawObstacles() {
            for (let o of obstacles) {
                ctx.save();

                if (o.type === 'trash') {
                    ctx.fillStyle = '#455a64';
                    ctx.fillRect(o.x, o.y, o.width, o.height);
                    ctx.fillStyle = '#607d8b';
                    ctx.fillRect(o.x + 3, o.y + 4, o.width - 6, o.height - 10);
                    ctx.fillStyle = '#263238';
                    ctx.fillRect(o.x, o.y, o.width, 5);
                } 
                else if (o.type === 'box') {
                    ctx.fillStyle = '#8d6e63';
                    ctx.fillRect(o.x, o.y, o.width, o.height);
                    ctx.fillStyle = '#6d4c41';
                    ctx.fillRect(o.x + 3, o.y + 3, o.width - 6, o.height - 6);
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(o.x + 4, o.y + 4, o.width - 8, o.height - 8);
                } 
                else if (o.type === 'cone') {
                    ctx.fillStyle = '#ff5722';
                    ctx.beginPath();
                    ctx.moveTo(o.x + o.width/2, o.y);
                    ctx.lineTo(o.x, o.y + o.height);
                    ctx.lineTo(o.x + o.width, o.y + o.height);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(o.x + 4, o.y + o.height - 8, o.width - 8, 5);
                } 
                else if (o.type === 'barrel') {
                    ctx.fillStyle = '#ff9800';
                    ctx.fillRect(o.x, o.y, o.width, o.height);
                    ctx.fillStyle = '#e65100';
                    ctx.fillRect(o.x + 2, o.y + 6, o.width - 4, 4);
                    ctx.fillRect(o.x + 2, o.y + o.height - 10, o.width - 4, 4);
                } 
                else if (o.type === 'bench') {
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(o.x, o.y + 15, o.width, 12);
                    ctx.fillRect(o.x + 3, o.y, 5, 15);
                    ctx.fillRect(o.x + o.width - 8, o.y, 5, 15);
                } 
                else if (o.type === 'hydrant') {
                    ctx.fillStyle = '#d32f2f';
                    ctx.fillRect(o.x + 4, o.y, o.width - 8, o.height);
                    ctx.fillStyle = '#b71c1c';
                    ctx.fillRect(o.x + 2, o.y + 8, o.width - 4, 6);
                } 
                else if (o.type === 'vent') {
                    ctx.fillStyle = '#607d8b';
                    ctx.fillRect(o.x, o.y, o.width, o.height);
                    ctx.fillStyle = '#455a64';
                    ctx.fillRect(o.x + 3, o.y + 3, o.width - 6, o.height - 6);
                }

                ctx.restore();
            }
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 26px "Segoe UI", Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Pontos: ' + Math.floor(score), 22, 38);

            ctx.fillStyle = '#ffeb3b';
            ctx.font = 'bold 18px "Segoe UI", Arial';
            ctx.fillText('🏆 Recorde: ' + highScore, 22, 60);

            ctx.fillStyle = '#00e5ff';
            ctx.font = '15px Arial';
            ctx.fillText('Velocidade: ' + gameSpeed.toFixed(1), 22, 80);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(160, 90, 500, 220);
            ctx.strokeStyle = '#f44336';
            ctx.lineWidth = 6;
            ctx.strokeRect(160, 90, 500, 220);

            ctx.fillStyle = '#c62828';
            ctx.font = 'bold 46px "Segoe UI", Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 410, 145);

            ctx.fillStyle = '#333';
            ctx.font = 'bold 24px "Segoe UI", Arial';
            ctx.fillText('Sua pontuação: ' + Math.floor(score), 410, 185);

            const final = Math.floor(score);
            if (final > highScore) {
                highScore = final;
                localStorage.setItem('pichadorHighScore', highScore);
                ctx.fillStyle = '#ff6f00';
                ctx.font = 'bold 20px "Segoe UI", Arial';
                ctx.fillText('🎉 NOVO RECORDE! 🎉', 410, 220);
            } else {
                ctx.fillStyle = '#ff9800';
                ctx.font = 'bold 18px "Segoe UI", Arial';
                ctx.fillText('Recorde atual: ' + highScore, 410, 220);
            }

            ctx.fillStyle = '#1b5e20';
            ctx.font = 'bold 18px "Segoe UI", Arial';
            ctx.fillText('Pressione ESPAÇO para jogar novamente', 410, 265);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawGround();
            drawRain();

            if (!gameOver) {
                updateGame();
            }

            drawObstacles();
            drawPlayer();
            drawParticles();
            drawHUD();

            if (gameOver) {
                drawGameOver();
            }

            if (!gameOver) frame++;
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Spacebar' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                } else if (player.y >= groundY - player.height - 4) {
                    player.vy = jumpForce;
                }
            }
            if ((e.key === 'r' || e.key === 'R') && gameOver) resetGame();
        });

        function handleJump() {
            if (gameOver) {
                resetGame();
            } else if (player.y >= groundY - player.height - 4) {
                player.vy = jumpForce;
            }
        }

        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleJump();
        });

        function startGame() {
            resetGame();
            setTimeout(() => { if (!gameOver && obstacles.length === 0) spawnObstacle(); }, 650);
            setTimeout(() => { if (!gameOver && obstacles.length < 2) spawnObstacle(); }, 1400);
            gameLoop();
        }

        startGame();
        canvas.setAttribute('tabindex', '1');
        canvas.focus();
    </script>
</body>
</html>
