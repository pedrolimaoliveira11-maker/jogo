<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone 6D - Malsi Annihilation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020202;
        }
        /* HUD Superior */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff3333;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 0 0 8px rgba(255,0,0,0.8);
            pointer-events: none;
        }
        #hud div { margin-bottom: 5px; }
        
        /* Indicador de Status 6D */
        #dimension-status {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00ffff;
            font-size: 18px;
            z-index: 10;
            text-shadow: 0 0 10px #00ffff;
            text-align: right;
        }

        /* Tela de fundo real de guerra (suave atrás da renderização quântica) */
        #war-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: url('https://images.unsplash.com/photo-1508615070457-7baebd4003ab?q=80&w=1600') no-repeat center center/cover;
            opacity: 0.25;
            filter: grayscale(30%) contrast(120%);
        }

        #three-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Efeito de Flash Quântico na Tela */
        #flash-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            box-shadow: inset 0 0 0px rgba(0, 255, 255, 0);
            transition: box-shadow 0.1s ease;
        }

        /* Controles/Instruções na tela */
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #ff3333;
            font-size: 14px;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        /* Tela de Derrota / Ruína Temporal */
        #game-over {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(10, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            display: none;
        }
        #game-over h1 { font-size: 40px; color: #ff0000; margin-bottom: 20px; text-shadow: 0 0 15px #ff0000; }
        #game-over button {
            padding: 12px 30px;
            font-size: 18px;
            background: #ff3333;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #ff3333;
        }
    </style>
</head>
<body>

    <div id="war-bg"></div>
    <div id="flash-effect"></div>

    <div id="hud">
        <div>ALVOS MALSI ELIMINADOS: <span id="score">0</span></div>
        <div>INTEGRIDADE DA TRANCHEIRA: <span id="health">100</span>%</div>
    </div>

    <div id="dimension-status">
        ESTADO: <span id="status-txt" style="color: #ff0055;">GUERRA ATIVA</span><br>
        MATRIZ DIMENSIONAL: <span id="dim-layer">6D COMPRESSED</span>
    </div>

    <div id="controls-info">
        [A / D] ou [Setas Esquerda/Direita] para Mover Torreta | [ESPAÇO] para Disparar Laser Quântico
    </div>

    <div id="game-over">
        <h1>LINHA TEMPORAL COLAPSADA</h1>
        <p style="margin-bottom: 20px;">Os Malsis romperam as defesas da sua dimensão.</p>
        <button onclick="resetGame()">Reiniciar Universo (6D)</button>
    </div>

    <canvas id="three-canvas"></canvas>

    <script>
        // Variáveis do motor 3D
        let scene, camera, renderer;
        let player, malsiEnemies = [], lasers = [];
        let score = 0;
        let health = 100;
        let gameActive = true;

        // Parâmetros de Controle e Movimento
        let playerX = 0;
        let keys = { ArrowLeft: false, ArrowRight: false, KeyA: false, KeyD: false, Space: false };
        let canShoot = true;

        // Fatores das dimensões superiores (Tempo, Multiverso e Entropia)
        let timeScale = 1.0; 
        let entropyFactor = 0;
        let clock = new THREE.Clock();
        
        let malsiMaterial, playerMaterial, particleGeometry;

        function init() {
            const canvas = document.getElementById('three-canvas');
            scene = new THREE.Scene();
            
            // Nevoeiro de guerra volumétrico (Simula distorção atmosférica)
            scene.fog = new THREE.FogExp2(0x0a0505, 0.02);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 2, -5);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Iluminação caótica de combate
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const redAlertLight = new THREE.PointLight(0xff0033, 3, 100);
            redAlertLight.position.set(0, 10, 5);
            scene.add(redAlertLight);
