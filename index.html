<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Paulo Obstacle Runner - Tela Cheia Escura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* Deixa a página em tela cheia e remove barras de rolagem */
        body, html {
            width: 100%;
            height: 100%;
            background: #111;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none; 
        }

        /* ÁREA DO JOGO EM TELA CHEIA */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            /* Foto de fundo do São Paulo FC (Estádio do MorumBIS) */
            background-image: url('https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?q=80&w=800&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* CAMADA SUTIL PARA ESCURECER O FUNDO */
        #dark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Escurece o fundo em 40% */
            z-index: 1;
            pointer-events: none; /* Deixa os cliques passarem direto para o jogo */
        }

        /* ELEMENTOS DO JOGO (Z-index alto para ficarem na frente da camada escura) */
        #player {
            position: absolute;
            bottom: 0;
            left: 8%;
            width: 60px;
            height: 70px;
            background-color: #FF0000; /* Cor Inicial: Vermelho */
            border: 3px solid #FFF;
            border-radius: 8px;
            z-index: 5;
        }

        #obstacle {
            position: absolute;
            bottom: 0;
            right: -50px;
            width: 35px;
            height: 60px;
            background-color: #000000;
            border: 2px solid #FFF;
            border-radius: 5px;
            z-index: 5;
        }

        /* PLACAR E ALERTAS */
        #ui-layer {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 2px 2px 5px #000;
            pointer-events: none;
            z-index: 10;
        }

        #power-status {
            background: rgba(255, 0, 0, 0.9);
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid #fff;
            font-size: 18px;
            display: none;
            animation: piscar 0.5s infinite alternate;
        }

        @keyframes piscar {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        /* TELA DE GAME OVER */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
            z-index: 50;
            cursor: default;
        }

        #game-over h2 {
            font-size: 55px;
            color: #FF0000;
            margin-bottom: 15px;
            text-shadow: 2px 2px 5px #000;
        }

        #game-over p {
            font-size: 24px;
            margin-bottom: 25px;
        }

        #game-over button {
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background: #FF0000;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            transition: 0.2s;
        }

        #game-over button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="dark-overlay"></div>

        <div id="ui-layer">
            <div id="score-display">Pontos: 0</div>
            <div id="power-status">⚡ SUPER PODER ATIVADO!</div>
        </div>
        
        <div id="player" style="bottom: 0px;"></div>
        <div id="obstacle"></div>

        <div id="game-over">
            <h2>FIM DE JOGO</h2>
            <p id="final-score">Pontos: 0</p>
            <button id="btn-restart">Jogar Novamente</button>
        </div>

    </div>

    <script>
        // Elementos da Tela
        const gameContainer = document.getElementById('game-container');
        const player = document.getElementById('player');
        const obstacle = document.getElementById('obstacle');
        const scoreDisplay = document.getElementById('score-display');
        const powerStatus = document.getElementById('power-status');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const btnRestart = document.getElementById('btn-restart');

        // Mecânicas do Jogo
        let score = 0;
        let isJumping = false;
        let isGameOver = false; 
        let obstaclePosition = -50;

        // Configurações Iniciais Ajustadas para Tela Cheia
        let jumpHeight = 180;     
        let obstacleSpeed = 9;    
        let currentLevel = 0;

        // Cores do São Paulo (Muda a cada 200 pontos)
        const coresSpfc = ["#FF0000", "#FFFFFF", "#000000", "#FFD700"]; 

        // Reiniciar o jogo no botão do Game Over
        btnRestart.addEventListener('click', (event) => {
            event.stopPropagation(); // Impede que o clique chame o pulo
            initGame();
        });

        // Inicializador / Reset do Jogo
        function initGame() {
            score = 0;
            currentLevel = 0;
            jumpHeight = 180;
            obstacleSpeed = 9;
            obstaclePosition = -50;
            isGameOver = false;
            isJumping = false;
            
            player.style.backgroundColor = coresSpfc[0];
            player.style.bottom = "0px";
            powerStatus.style.display = 'none';
            gameOverScreen.style.display = 'none';
            scoreDisplay.innerText = "Pontos: 0";
        }

        // Sistema de loop de Pontos (Sobe de 10 em 10)
        setInterval(() => {
            if (!isGameOver) {
                score += 10;
                scoreDisplay.innerText = "Pontos: " + score;
                testarEvolucaoPoderes();
            }
        }, 150);

        // MECÂNICA: Troca de cor e upgrade de poderes a cada 200 pontos
        function testarEvolucaoPoderes() {
            let passoAtual = Math.floor(score / 200);

            if (passoAtual > currentLevel) {
                currentLevel = passoAtual;
                
                // 1. Troca a cor do personagem
                let indexCor = currentLevel % coresSpfc.length;
                player.style.backgroundColor = coresSpfc[indexCor];

                // 2. Aplica os Superpoderes dinamicamente na proporção da tela
                jumpHeight = 180 + (currentLevel * 30); 
                obstacleSpeed = 9 + (currentLevel * 3); 

                // 3. Alerta na tela
                powerStatus.innerText = `⚡ PODER NÍVEL ${currentLevel}! VELOCIDADE + PULO ALTO`;
                powerStatus.style.display = 'block';
                
                setTimeout(() => {
                    powerStatus.style.display = 'none';
                }, 2500);
            }
        }

        /* --- CONTROLES MANTIDOS: PULO NO ESPAÇO E NO CLIQUE (BOTÃO DE PULAR) --- */
        
        // 1. Pular com a barra de Espaço
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space' && !isJumping && !isGameOver) {
                executarPulo();
            }
        });

        // 2. Pular ao clicar com o mouse na tela (o container vira o botão de pulo)
        gameContainer.addEventListener('mousedown', () => {
            if (!isJumping && !isGameOver) {
                executarPulo();
            }
        });

        function executarPulo() {
            isJumping = true;
            let p_bottom = 0;
            
            // Subindo...
            let upInterval = setInterval(() => {
                if (p_bottom >= jumpHeight) {
                    clearInterval(upInterval);
                    
                    // Descendo...
                    let downInterval = setInterval(() => {
                        if (p_bottom <= 0) {
                            clearInterval(downInterval);
                            p_bottom = 0;
                            isJumping = false;
                        } else {
                            p_bottom -= 8; // Velocidade de descida corrigida
                        }
                        player.style.bottom = p_bottom + 'px';
                    }, 15);

                } else {
                    p_bottom += 8; // Velocidade de subida corrigida
                }
                player.style.bottom = p_bottom + 'px';
            }, 15);
        }

        // ENGINE PRINCIPAL: Movimento e Verificação de Colisões Responsiva
        function gameEngine() {
            if (!isGameOver) {
                let larguraTela = gameContainer.offsetWidth;
                obstaclePosition += obstacleSpeed;
                
                // Reseta o obstáculo quando ele cruza toda a tela cheia
                if (obstaclePosition > (larguraTela + 100)) {
                    obstaclePosition = -50;
                }
                obstacle.style.right = obstaclePosition + 'px';

                // Lógica adaptada para pegar a colisão exata em qualquer tamanho de monitor
                let playerBottom = parseInt(player.style.bottom) || 0;
                let playerLeft = player.offsetLeft;
                let obstacleLeft = larguraTela - obstaclePosition - 35; 

                // Caixa de colisão exata
                if (obstacleLeft < (playerLeft + 60) && obstacleLeft > playerLeft && playerBottom < 60) {
                    isGameOver = true;
                    finalScoreDisplay.innerText = "Pontos Finais: " + score;
                    gameOverScreen.style.display = 'flex';
                }
            }
            
            requestAnimationFrame(gameEngine);
        }

        // Inicializa o motor gráfico adaptado para o novo layout
        requestAnimationFrame(gameEngine);
    </script>
</body>
</html>
