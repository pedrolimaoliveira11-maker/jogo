<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Pichador - Pulando Carros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #0d1b2a, #1b263b);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        h1 {
            color: #00e5ff;
            text-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
            margin-bottom: 8px;
            font-size: 2.3em;
        }
        
        .instructions {
            background: rgba(0, 0, 0, 0.35);
            padding: 8px 20px;
            border-radius: 15px;
            margin-bottom: 8px;
            color: #b0bec5;
            font-size: 1em;
            text-align: center;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        
        #game {
            width: 90vw;
            max-width: 1400px;
            height: auto;
            border: 8px solid #00e5ff;
            border-radius: 16px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.7);
            background: #fff;
            cursor: pointer;
            display: block;
        }
        
        .stage-info {
            margin-top: 8px;
            font-size: 1.1em;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
        }
        
        .footer {
            margin-top: 8px;
            color: #78909c;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <h1>🎨 Pichador - Pulando Carros</h1>
    
    <div class="instructions">
        <strong>ESPAÇO</strong> ou <strong>↑</strong> para pular os carros • Clique na tela também funciona<br>
        <span style="color:#ffeb3b;">A cada 200 pontos fica mais rápido</span> • 
        <span style="color:#4fc3f7;">A cada 1000 pontos muda a cidade</span>
    </div>
    
    <canvas id="game" width="1200" height="620"></canvas>
    
    <div class="stage-info" id="stageText">Fase 1 - Centro da Cidade</div>
    
    <div class="footer">
        Um pichador correndo pela cidade pulando carros • Quase tela cheia (90%)
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });

        let player = {
            x: 140,
            y: 0,
            width: 42,
            height: 62,
            vy: 0
        };
        
        let obstacles = [];
        let particles = [];
        let rainParticles = [];
        let score = 0;
        let highScore = 0;
        let gameSpeed = 5.2;
        let gravity = 0.72;
        let jumpForce = -15.5;
        let gameOver = false;
        let frame = 0;
        let groundOffset = 0;
        let currentStage = 0;
        let groundY = 480;

        function loadHighScore() {
            const saved = localStorage.getItem('pichadorCarrosHighScore');
            if (saved) highScore = parseInt(saved);
        }
        loadHighScore();

        function resetGame() {
            player.y = groundY - player.height;
            player.vy = 0;
            obstacles = [];
            particles = [];
            rainParticles = [];
            score = 0;
            gameSpeed = 5.2;
            gameOver = false;
            frame = 0;
            groundOffset = 0;
            currentStage = 0;
            updateStageDisplay();
        }

        function updateStageDisplay() {
            const names = [
                "Fase 1 - Centro da Cidade",
                "Fase 2 - Noite Neon",
                "Fase 3 - Chuva na Cidade",
                "Fase 4 - Telhados"
            ];
            const el = document.getElementById('stageText');
            if (el) {
                el.textContent = names[Math.min(currentStage, 3)];
                el.style.color = currentStage === 3 ? '#ff7043' : 
                                currentStage === 2 ? '#4fc3f7' : 
                                currentStage === 1 ? '#ce93d8' : '#00e5ff';
            }
        }

        function getCurrentStage() {
            return Math.floor(score / 1000);
        }

        function updateStage() {
            const newStage = getCurrentStage();
            if (newStage !== currentStage && newStage <= 3) {
                currentStage = newStage;
                updateStageDisplay();
                gameSpeed = Math.min(gameSpeed + 0.75, 15);
            }
        }

        function updateSpeed() {
            const level = Math.floor(score / 200);
            const newSpeed = Math.min(5.2 + level * 0.45, 15);
            if (newSpeed > gameSpeed) gameSpeed = newSpeed;
        }

        function spawnObstacle() {
            let height, width, type;
            const stage = currentStage;

            if (stage === 0) {
                height = 38 + Math.random() * 25;
                width = 55 + Math.random() * 35;
                type = Math.random() > 0.6 ? 'sedan' : 'van';
            } else if (stage === 1) {
                height = 40 + Math.random() * 22;
                width = 60 + Math.random() * 30;
                type = Math.random() > 0.5 ? 'sedan' : 'truck';
            } else if (stage === 2) {
                height = 36 + Math.random() * 28;
                width = 58 + Math.random() * 32;
                type = Math.random() > 0.55 ? 'van' : 'sedan';
            } else {
                height = 42 + Math.random() * 20;
                width = 62 + Math.random() * 28;
                type = Math.random() > 0.5 ? 'truck' : 'sedan';
            }

            obstacles.push({
                x: canvas.width + 80,
                y: groundY - height,
                width: width,
                height: height,
                type: type,
                color: ['#e53935', '#1e88e5', '#43a047', '#fb8c00', '#8e24aa'][Math.floor(Math.random()*5)]
            });
        }

        function checkCollision(p, o) {
            return !(
                p.x + p.width < o.x ||
                p.x > o.x + o.width ||
                p.y + p.height < o.y ||
                p.y > o.y + o.height
            );
        }

        function createDust(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x + Math.random() * 15,
                    y: y,
                    vx: -2.5 - Math.random() * 2,
                    vy: -1.4 + Math.random() * 1,
                    life: 18 + Math.random() * 16,
                    size: 2.8 + Math.random() * 2.2
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.16;
                p.life--;
                p.vx *= 0.94;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            ctx.fillStyle = currentStage === 2 ? '#90caf9' : '#b0bec5';
            for (let p of particles) {
                ctx.globalAlpha = Math.max(0.12, p.life / 26);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function updateRain() {
            if (currentStage !== 2) {
                rainParticles = [];
                return;
            }
            if (rainParticles.length < 100) {
                for (let i = 0; i < 8; i++) {
                    rainParticles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * (groundY - 20),
                        len: 10 + Math.random() * 12,
                        speed: 7 + Math.random() * 6
                    });
                }
            }
            for (let i = rainParticles.length - 1; i >= 0; i--) {
                const r = rainParticles[i];
                r.y += r.speed;
                if (r.y > groundY) rainParticles.splice(i, 1);
            }
        }

        function drawRain() {
            if (currentStage !== 2) return;
            ctx.strokeStyle = 'rgba(144, 202, 249, 0.55)';
            ctx.lineWidth = 1.8;
            for (let r of rainParticles) {
                ctx.beginPath();
                ctx.moveTo(r.x, r.y);
                ctx.lineTo(r.x, r.y + r.len);
                ctx.stroke();
            }
        }

        function updateGame() {
            player.vy += gravity;
            player.y += player.vy;

            if (player.y > groundY - player.height) {
                if (player.vy > 3.5) createDust(player.x + 20, groundY);
                player.y = groundY - player.height;
                player.vy = 0;
            }

            if (!gameOver && player.vy === 0 && frame % 4 === 0) {
                createDust(player.x + 8, groundY - 2);
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
            }

            const spawnDist = Math.max(200, 320 - gameSpeed * 10);
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - spawnDist) {
                spawnObstacle();
            }

            for (let o of obstacles) {
                if (checkCollision(player, o)) {
                    gameOver = true;
                    break;
                }
            }

            score += 0.25;
            updateStage();
            updateSpeed();
            updateParticles();
            updateRain();
        }

        function drawBackground() {
            const stage = currentStage;

            if (stage === 0) {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, '#4fc3f7');
                grad.addColorStop(0.5, '#81d4fa');
                grad.addColorStop(1, '#e3f2fd');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#546e7a';
                ctx.fillRect(80, 70, 140, groundY - 70);
                ctx.fillRect(280, 45, 110, groundY - 45);
                ctx.fillRect(450, 85, 130, groundY - 85);
                ctx.fillRect(650, 35, 100, groundY - 35);
                ctx.fillRect(820, 65, 150, groundY - 65);
                ctx.fillRect(1050, 55, 120, groundY - 55);

                ctx.fillStyle = '#ffeb3b';
                for (let bx of [100, 300, 470, 670, 840, 1070]) {
                    for (let by = 95; by < groundY - 40; by += 32) {
                        ctx.fillRect(bx, by, 18, 20);
                    }
                }

                ctx.fillStyle = '#ffeb3b';
                ctx.beginPath();
                ctx.arc(1080, 60, 38, 0, Math.PI * 2);
                ctx.fill();

            } else if (stage === 1) {
                ctx.fillStyle = '#0d1b2a';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#263238';
                ctx.fillRect(70, 60, 150, groundY - 60);
                ctx.fillRect(260, 40, 120, groundY - 40);
                ctx.fillRect(430, 75, 140, groundY - 75);
                ctx.fillRect(620, 30, 110, groundY - 30);
                ctx.fillRect(800, 55, 160, groundY - 55);
                ctx.fillRect(1020, 48, 130, groundY - 48);

                ctx.fillStyle = '#00e5ff';
                for (let bx of [90, 280, 450, 640, 820, 1040]) {
                    for (let by = 85; by < groundY - 35; by += 30) {
                        if (Math.random() > 0.35) ctx.fillRect(bx, by, 16, 18);
                    }
                }

                ctx.fillStyle = '#ff4081';
                ctx.fillRect(480, 130, 80, 10);
                ctx.fillStyle = '#7c4dff';
                ctx.fillRect(850, 100, 55, 9);

            } else if (stage === 2) {
                ctx.fillStyle = '#263238';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#37474f';
                ctx.fillRect(60, 55, 160, groundY - 55);
                ctx.fillRect(250, 35, 130, groundY - 35);
                ctx.fillRect(420, 70, 150, groundY - 70);
                ctx.fillRect(610, 28, 120, groundY - 28);
                ctx.fillRect(790, 50, 170, groundY - 50);
                ctx.fillRect(1010, 42, 140, groundY - 42);

            } else {
                ctx.fillStyle = '#1a237e';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#37474f';
                ctx.fillRect(50, 25, 170, groundY - 25);
                ctx.fillRect(240, 12, 140, groundY - 12);
                ctx.fillRect(410, 38, 160, groundY - 38);
                ctx.fillRect(600, 8, 130, groundY - 8);
                ctx.fillRect(780, 30, 180, groundY - 30);
                ctx.fillRect(1000, 20, 150, groundY - 20);

                ctx.fillStyle = '#546e7a';
                ctx.fillRect(50, 25, 170, 14);
                ctx.fillRect(240, 12, 140, 14);
                ctx.fillRect(410, 38, 160, 14);
            }
        }

        function drawGround() {
            const stage = currentStage;
            groundOffset = (groundOffset + gameSpeed) % 60;

            if (stage === 0) {
                ctx.fillStyle = '#607d8b';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#455a64';
                ctx.fillRect(0, groundY, canvas.width, 18);
            } else if (stage === 1) {
                ctx.fillStyle = '#263238';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#1a237e';
                ctx.fillRect(0, groundY, canvas.width, 18);
            } else if (stage === 2) {
                ctx.fillStyle = '#37474f';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#263238';
                ctx.fillRect(0, groundY, canvas.width, 18);
            } else {
                ctx.fillStyle = '#263238';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#1a237e';
                ctx.fillRect(0, groundY, canvas.width, 18);
            }

            ctx.strokeStyle = stage === 2 ? '#90caf9' : '#b0bec5';
            ctx.lineWidth = 3;
            for (let x = -groundOffset; x < canvas.width + 80; x += 60) {
                ctx.beginPath();
                ctx.moveTo(x + 18, groundY + 14);
                ctx.lineTo(x + 26, groundY - 3);
                ctx.lineTo(x + 34, groundY + 14);
                ctx.stroke();
            }

            ctx.strokeStyle = '#ffeb3b';
            ctx.lineWidth = 4;
            for (let x = -groundOffset * 1.4; x < canvas.width; x += 100) {
                ctx.beginPath();
                ctx.moveTo(x, groundY + 32);
                ctx.lineTo(x + 55, groundY + 32);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);

            const isJumping = player.vy < -4;
            const runPhase = Math.sin(frame * 0.38) * (isJumping ? 0.45 : 1.2);

            ctx.fillStyle = 'rgba(0,0,0,0.28)';
            ctx.beginPath();
            ctx.ellipse(22, 66, 24, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#37474f';
            const backLegX = 9 + runPhase * 4;
            ctx.fillRect(backLegX, 48, 10, 20);
            ctx.fillRect(backLegX - 2, 65, 8, 7);

            const frontLegX = 24 - runPhase * 4;
            ctx.fillRect(frontLegX, 48, 10, 20);
            ctx.fillRect(frontLegX + 2, 65, 8, 7);

            ctx.fillStyle = currentStage === 1 ? '#7c4dff' : '#00bcd4';
            ctx.fillRect(6, 19, 34, 32);

            ctx.fillStyle = currentStage === 1 ? '#5c00b3' : '#0097a7';
            ctx.beginPath();
            ctx.ellipse(23, 23, 18, 15, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffcc80';
            ctx.beginPath();
            ctx.arc(24, 19, 12, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#263238';
            ctx.beginPath();
            ctx.ellipse(25, 13, 13, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(12, 11, 26, 6);

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(28, 18, 4.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(29, 18, 2.2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#455a64';
            ctx.fillRect(35, 25, 9, 18);

            ctx.fillStyle = '#ffcc80';
            ctx.fillRect(38, 39, 10, 9);

            ctx.fillStyle = '#ffeb3b';
            ctx.fillRect(41, 32, 8, 16);
            ctx.fillStyle = '#ff9800';
            ctx.fillRect(41, 32, 3.5, 16);
            ctx.fillStyle = '#263238';
            ctx.fillRect(42, 30, 6, 5);

            if (!isJumping && frame % 3 === 0) {
                ctx.fillStyle = 'rgba(255, 235, 59, 0.65)';
                ctx.fillRect(50, 36 + Math.sin(frame) * 2.5, 10, 4);
            }

            ctx.restore();
        }

        function drawObstacles() {
            for (let o of obstacles) {
                ctx.save();
                const carColor = o.color || '#e53935';

                if (o.type === 'sedan') {
                    ctx.fillStyle = carColor;
                    ctx.fillRect(o.x, o.y + 8, o.width, o.height - 12);
                    
                    ctx.fillStyle = '#263238';
                    ctx.fillRect(o.x + 12, o.y, o.width - 24, 12);
                    
                    ctx.fillStyle = '#90caf9';
                    ctx.fillRect(o.x + 14, o.y + 2, o.width - 28, 8);
                    
                    ctx.fillStyle = '#263238';
                    ctx.beginPath();
                    ctx.arc(o.x + 14, o.y + o.height - 2, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 14, o.y + o.height - 2, 7, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ffeb3b';
                    ctx.fillRect(o.x + o.width - 8, o.y + 12, 6, 5);

                } else if (o.type === 'van') {
                    ctx.fillStyle = carColor;
                    ctx.fillRect(o.x, o.y + 5, o.width, o.height - 8);
                    
                    ctx.fillStyle = '#37474f';
                    ctx.fillRect(o.x + 8, o.y, o.width - 16, 10);
                    
                    ctx.fillStyle = '#90caf9';
                    ctx.fillRect(o.x + 10, o.y + 2, o.width - 20, 7);
                    
                    ctx.fillStyle = '#263238';
                    ctx.beginPath();
                    ctx.arc(o.x + 16, o.y + o.height - 1, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 16, o.y + o.height - 1, 8, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ffeb3b';
                    ctx.fillRect(o.x + o.width - 9, o.y + 10, 7, 6);

                } else if (o.type === 'truck') {
                    ctx.fillStyle = '#455a64';
                    ctx.fillRect(o.x, o.y + 10, o.width, o.height - 12);
                    
                    ctx.fillStyle = carColor;
                    ctx.fillRect(o.x + o.width * 0.55, o.y + 5, o.width * 0.45, o.height - 8);
                    
                    ctx.fillStyle = '#263238';
                    ctx.beginPath();
                    ctx.arc(o.x + 18, o.y + o.height - 1, 9, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 18, o.y + o.height - 1, 9, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ffeb3b';
                    ctx.fillRect(o.x + o.width - 10, o.y + 14, 8, 6);
                }

                ctx.restore();
            }
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px "Segoe UI", Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Pontos: ' + Math.floor(score), 25, 42);

            ctx.fillStyle = '#ffeb3b';
            ctx.font = 'bold 20px "Segoe UI", Arial';
            ctx.fillText('🏆 Recorde: ' + highScore, 25, 68);

            ctx.fillStyle = '#00e5ff';
            ctx.font = '16px Arial';
            ctx.fillText('Velocidade: ' + gameSpeed.toFixed(1), 25, 90);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.72)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(280, 130, 640, 260);
            ctx.strokeStyle = '#f44336';
            ctx.lineWidth = 7;
            ctx.strokeRect(280, 130, 640, 260);

            ctx.fillStyle = '#c62828';
            ctx.font = 'bold 52px "Segoe UI", Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 600, 195);

            ctx.fillStyle = '#333';
            ctx.font = 'bold 28px "Segoe UI", Arial';
            ctx.fillText('Sua pontuação: ' + Math.floor(score), 600, 245);

            const final = Math.floor(score);
            if (final > highScore) {
                highScore = final;
                localStorage.setItem('pichadorCarrosHighScore', highScore);
                ctx.fillStyle = '#ff6f00';
                ctx.font = 'bold 24px "Segoe UI", Arial';
                ctx.fillText('🎉 NOVO RECORDE! 🎉', 600, 285);
            } else {
                ctx.fillStyle = '#ff9800';
                ctx.font = 'bold 22px "Segoe UI", Arial';
                ctx.fillText('Recorde atual: ' + highScore, 600, 285);
            }

            ctx.fillStyle = '#1b5e20';
            ctx.font = 'bold 20px "Segoe UI", Arial';
            ctx.fillText('Pressione ESPAÇO para jogar novamente', 600, 330);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawGround();
            drawRain();

            if (!gameOver) {
                updateGame();
            }

            drawObstacles();
            drawPlayer();
            drawParticles();
            drawHUD();

            if (gameOver) {
                drawGameOver();
            }

            if (!gameOver) frame++;
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Spacebar' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                } else if (player.y >= groundY - player.height - 5) {
                    player.vy = jumpForce;
                }
            }
            if ((e.key === 'r' || e.key === 'R') && gameOver) resetGame();
        });

        function handleJump() {
            if (gameOver) {
                resetGame();
            } else if (player.y >= groundY - player.height - 5) {
                player.vy = jumpForce;
            }
        }

        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleJump();
        });

        function startGame() {
            resetGame();
            setTimeout(() => { if (!gameOver && obstacles.length === 0) spawnObstacle(); }, 700);
            setTimeout(() => { if (!gameOver && obstacles.length < 2) spawnObstacle(); }, 1500);
            gameLoop();
        }

        startGame();
        canvas.setAttribute('tabindex', '1');
        canvas.focus();
    </script>
</body>
</html>
