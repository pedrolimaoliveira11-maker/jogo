<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Corrida na Rua</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #gameArea {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: url('rua.jpg') no-repeat center center;
      background-size: cover;
    }
    .runner {
      position: absolute;
      bottom: 20px;
      width: 60px;
      height: 100px;
      background-size: cover;
      background-repeat: no-repeat;
    }
    #runner1 { left: 100px; background-image: url('runner_red.png'); }
    #runner2 { left: 200px; background-image: url('runner_blue.png'); }
    .obstacle {
      position: absolute;
      bottom: 20px;
      width: 40px;
      height: 40px;
      background: brown;
      border-radius: 5px;
    }
    .powerup {
      position: absolute;
      bottom: 80px;
      width: 30px;
      height: 30px;
      background: gold;
      border-radius: 50%;
    }
    #finishLine {
      position: absolute;
      top: 0;
      right: 50px;
      width: 10px;
      height: 100%;
      background: yellow;
    }
    #message {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 4px black;
    }
  </style>
</head>
<body>
  <div id="gameArea">
    <div id="runner1" class="runner"></div>
    <div id="runner2" class="runner"></div>
    <div id="finishLine"></div>
    <div id="message">ESPAÇO (vermelho) / ENTER (azul)</div>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const runner1 = document.getElementById("runner1");
    const runner2 = document.getElementById("runner2");
    const message = document.getElementById("message");

    let pos1 = 100;
    let pos2 = 200;
    let gameOver = false;

    // Criar obstáculos e power-ups
    function createObstacle(x) {
      const obs = document.createElement("div");
      obs.className = "obstacle";
      obs.style.left = x + "px";
      gameArea.appendChild(obs);
      return obs;
    }

    function createPowerup(x) {
      const pu = document.createElement("div");
      pu.className = "powerup";
      pu.style.left = x + "px";
      gameArea.appendChild(pu);
      return pu;
    }

    const obstacles = [createObstacle(400), createObstacle(700), createObstacle(1000)];
    const powerups = [createPowerup(600), createPowerup(900)];

    document.addEventListener("keydown", (e) => {
      if (gameOver) return;

      if (e.code === "Space") {
        pos1 += 20;
        runner1.style.left = pos1 + "px";
        checkCollision(runner1, "Jogador Vermelho");
      }
      if (e.code === "Enter") {
        pos2 += 20;
        runner2.style.left = pos2 + "px";
        checkCollision(runner2, "Jogador Azul");
      }

      checkWinner();
    });

    function checkCollision(runner, playerName) {
      const runnerRect = runner.getBoundingClientRect();

      obstacles.forEach(obs => {
        const obsRect = obs.getBoundingClientRect();
        if (runnerRect.left < obsRect.right &&
            runnerRect.right > obsRect.left &&
            runnerRect.bottom > obsRect.top) {
          message.textContent = playerName + " bateu no obstáculo!";
          gameOver = true;
        }
      });

      powerups.forEach(pu => {
        const puRect = pu.getBoundingClientRect();
        if (runnerRect.left < puRect.right &&
            runnerRect.right > puRect.left &&
            runnerRect.bottom > puRect.top) {
          pu.remove();
          message.textContent = playerName + " ganhou um turbo!";
          let boost = 100;
          runner.style.left = (parseInt(runner.style.left) + boost) + "px";
        }
      });
    }

    function checkWinner() {
      const finishX = window.innerWidth - 60;
      if (pos1 >= finishX) {
        message.textContent = "Jogador Vermelho venceu!";
        gameOver = true;
      } else if (pos2 >= finishX) {
        message.textContent = "Jogador Azul venceu!";
        gameOver = true;
      }
    }
  </script>
</body>
</html>
