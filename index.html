<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Tiger Tricolor 🐯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        body {
            /* Fundo com o escudo do São Paulo sutil ao fundo */
            background-color: #120101;
            background-image: 
                linear-gradient(to bottom, rgba(20, 2, 2, 0.94), rgba(0, 0, 0, 0.96)),
                url('https://upload.wikimedia.org/wikipedia/pt/4/4b/S%C3%A3o_Paulo_Futebol_Clube.svg');
            background-size: 700px;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .casino-container {
            text-align: center;
            background: linear-gradient(145deg, #2b0404, #110101);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 0 35px #ff0000, inset 0 0 15px #ffffff;
            border: 4px solid #cc0000;
            max-width: 420px;
            width: 100%;
            position: relative;
        }

        /* Moldura Chinesa/Tigrinho */
        .casino-container::before {
            content: '🐯 FORTUNE TIGER 🇾🇪';
            display: block;
            font-size: 1.6rem;
            color: #fff;
            background: linear-gradient(90deg, #ff0000, #000000, #ff0000);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 2px solid #fff;
            text-shadow: 2px 2px 0px #000;
        }

        .painel-saldo {
            background-color: #000;
            padding: 12px;
            border-radius: 50px;
            font-size: 1.3rem;
            margin-bottom: 20px;
            border: 2px solid #ffcc00;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #saldo {
            color: #ffcc00;
            text-shadow: 0 0 8px #ffcc00;
            font-size: 1.5rem;
        }

        /* Tela da Grade do Tigrinho */
        .slots-box {
            display: flex;
            justify-content: space-between;
            background: linear-gradient(180deg, #3a0000, #990000);
            padding: 15px;
            border-radius: 20px;
            border: 5px solid #ffcc00;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
            position: relative;
        }

        .rolo {
            width: 100px;
            height: 120px;
            background: #fff;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            border: 3px solid #333;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }

        /* Animação de Giro Alucinante igual do app original */
        .girando {
            animation: rodarTigre 0.08s linear infinite;
        }

        @keyframes rodarTigre {
            0% { transform: translateY(3px) scaleY(1); filter: blur(3px); }
            50% { transform: translateY(-3px) scaleY(0.9); filter: blur(5px); }
            100% { transform: translateY(3px) scaleY(1); filter: blur(3px); }
        }

        /* Mensagem do multiplicador bônus (Solta a carta!) */
        .bonus-banner {
            background: #ffcc00;
            color: #000;
            font-size: 0.9rem;
            padding: 4px;
            border-radius: 5px;
            margin-bottom: 15px;
            animation: piscar 0.5s linear infinite;
            display: none;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Controles de Aposta */
        .controles {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .botoes-aposta {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-ajuste {
            background: #fff;
            color: #000;
            border: 2px solid #cc0000;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }

        input[type="number"] {
            width: 90px;
            padding: 8px;
            border-radius: 10px;
            border: 2px solid #ffcc00;
            background-color: #000;
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }

        /* Botão de Giro Grande e Alaranjado do Tigrinho */
        .btn-girar {
            background: linear-gradient(180deg, #ffcc00, #ff6600);
            color: white;
            border: 3px solid #fff;
            padding: 16px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 102, 0, 0.5);
            text-shadow: 2px 2px 2px #000;
            transition: 0.1s ease;
        }

        .btn-girar:hover {
            transform: scale(1.03);
        }

        .btn-girar:active {
            transform: scale(0.97);
        }

        .btn-girar:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        #mensagem {
            margin-top: 15px;
            font-size: 1.2rem;
            min-height: 30px;
            text-shadow: 1px 1px 2px #000;
        }
        
        .ganhou { color: #00ff66; font-size: 1.4rem; }
        .perdeu { color: #ff3333; }
        .carta-bonus { color: #ffcc00; font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="casino-container">
        <div class="painel-saldo">
            💰 R$ <span id="saldo">50.00</span>
        </div>

        <div class="bonus-banner" id="banner">🐯 O TIGRINHO ESTÁ PRESTES A SOLTAR A CARTA X10! 🐯</div>

        <div class="slots-box">
            <div class="rolo" id="rolo1">🐯</div>
            <div class="rolo" id="rolo2">🐯</div>
            <div class="rolo" id="rolo3">🐯</div>
        </div>

        <div class="controles">
            <div class="botoes-aposta">
                <button class="btn-ajuste" onclick="alterarAposta(-2)">-</button>
                <input type="number" id="aposta" value="2.00" step="2" min="2" readonly>
                <button class="btn-ajuste" onclick="alterarAposta(2)">+</button>
            </div>
            <button class="btn-girar" id="btnGirar" onclick="soltarOTigre()">GIRAR ⚡</button>
        </div>

        <div id="mensagem">Suba a banca e comece a girar!</div>
    </div>

    <script>
        let saldo = 50.00;
        // Ícones baseados no Fortune Tiger
        const itens = ['🐯', '🍊', '🧧', '💰', '🎆', '🏆'];
        
        const rolo1 = document.getElementById('rolo1');
        const rolo2 = document.getElementById('rolo2');
        const rolo3 = document.getElementById('rolo3');
        const txtSaldo = document.getElementById('saldo');
        const txtMensagem = document.getElementById('mensagem');
        const btnGirar = document.getElementById('btnGirar');
        const inputAposta = document.getElementById('aposta');
        const banner = document.getElementById('banner');

        function alterarAposta(valor) {
            let atual = parseFloat(inputAposta.value);
            let nova = atual + valor;
            if (nova >= 2 && nova <= saldo) {
                inputAposta.value = nova.toFixed(2);
            }
        }

        function soltarOTigre() {
            const aposta = parseFloat(inputAposta.value);

            if (aposta > saldo) {
                txtMensagem.className = 'perdeu';
                txtMensagem.innerText = "❌ Saldo insuficiente!";
                return;
            }

            // Consome o saldo da rodada
            saldo -= aposta;
            txtSaldo.innerText = saldo.toFixed(2);
            
            btnGirar.disabled = true;
            txtMensagem.innerText = "O tigre está rodando...";
            txtMensagem.className = '';
            banner.style.display = 'none';

            // Chance aleatória de ativar a famosa "Animação da Carta" (Bônus falso visual)
            const ativarModoCarta = Math.random() < 0.25; 
            if (ativarModoCarta) {
                banner.style.display = 'block';
            }

            rolo1.classList.add('girando');
            rolo2.classList.add('girando');
            rolo3.classList.add('girando');

            // Tempo de giro (1.5 segundos para dar suspense)
            setTimeout(() => {
                rolo1.classList.remove('girando');
                rolo2.classList.remove('girando');
                rolo3.classList.remove('girando');

                // Sorteio
                const r1 = itens[Math.floor(Math.random() * itens.length)];
                const r2 = itens[Math.floor(Math.random() * itens.length)];
                const r3 = itens[Math.floor(Math.random() * itens.length)];

                rolo1.innerText = r1;
                rolo2.innerText = r2;
                rolo3.innerText = r3;

                // Sistema de Ganhos
                if (r1 === r2 && r2 === r3) {
                    let multiplicador = r1 === '🐯' ? 20 : 10; // Tigre paga mais!
                    let ganho = aposta * multiplicador;
                    saldo += ganho;
                    txtMensagem.className = 'ganhou';
                    txtMensagem.innerText = `🐯 SOLTOU A CARTA! 3x ${r1} Pagou R$ ${ganho.toFixed(2)}!`;
                } 
                else if (r1 === r2 || r2 === r3 || r1 === r3) {
                    let ganho = aposta * 1.5;
                    saldo += ganho;
                    txtMensagem.className = 'ganhou';
                    txtMensagem.innerText = `✨ Ganho da Linha! Combinou 2 e levou R$ ${ganho.toFixed(2)}`;
                } 
                else {
                    txtMensagem.className = 'perdeu';
                    txtMensagem.innerText = "Abaixe a cabeça... O tigre não soltou a carta.";
                }

                txtSaldo.innerText = saldo.toFixed(2);
                btnGirar.disabled = false;
                banner.style.display = 'none';

                // Se falir
                if (saldo < 2) {
                    txtMensagem.className = 'perdeu';
                    txtMensagem.innerText = "💥 A banca quebrou! Atualize para resetar os créditos.";
                    btnGirar.disabled = true;
                }

            }, 1500);
        }
    </script>
</body>
</html>
