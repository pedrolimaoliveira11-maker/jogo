<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Paulo Obstacle Runner - Tela Cheia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none; 
        }

        /* ÁREA DO JOGO EM TELA CHEIA */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Foto de fundo do São Paulo FC (Estádio do MorumBIS) */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?q=80&w=1200&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* ELEMENTOS DO JOGO */
        #player {
            position: absolute;
            bottom: 0;
            left: 10%; /* Posicionado a 10% da lateral da tela */
            width: 60px;
            height: 80px;
            background-color: #FF0000; /* Cor Inicial: Vermelho */
            border: 3px solid #FFF;
            border-radius: 8px;
            z-index: 2;
        }

        #obstacle {
            position: absolute;
            bottom: 0;
            right: -60px;
            width: 40px;
            height: 65px;
            background-color: #000000;
            border: 2px solid #FFF;
            border-radius: 5px;
            z-index: 2;
        }

        /* CHÃO DO JOGO */
        #floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        /* PLACAR E ALERTAS */
        #ui-layer {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 3px 3px 6px #000;
            pointer-events: none;
            z-index: 10;
        }

        #power-status {
            background: rgba(255, 0, 0, 0.9);
            padding: 8px 24px;
            border-radius: 30px;
            border: 2px solid #fff;
            font-size: 20px;
            display: none;
            animation: piscar 0.5s infinite alternate;
        }

        @keyframes piscar {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        /* TELA DE GAME OVER */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
            z-index: 50;
        }

        #game-over h2 {
            font-size: 60px;
            color: #FF0000;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px #000;
        }

        #game-over p {
            font-size: 26px;
            margin-bottom: 30px;
        }

        #game-over button {
            padding: 15px 35px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            background: #FF0000;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            transition: 0.2s;
        }

        #game-over button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="ui-layer">
            <div id="score-display">Pontos: 0</div>
            <div id="power-status">⚡ SUPER PODER ATIVADO!</div>
        </div>
        
        <div id="floor"></div>

        <div id="player" style="bottom: 0px;"></div>
        <div id="obstacle"></div>

        <div id="game-over">
            <h2>FIM DE JOGO</h2>
            <p id="final-score">Pontos: 0</p>
            <button id="btn-restart">Jogar Novamente</button>
        </div>

    </div>

    <script>
        // Elementos da Tela
        const gameContainer = document.getElementById('game-container');
        const player = document.getElementById('player');
        const obstacle = document.getElementById('obstacle');
        const scoreDisplay = document.getElementById('score-display');
        const powerStatus = document.getElementById('power-status');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const btnRestart = document.getElementById('btn-restart');

        // Mecânicas do Jogo
        let score = 0;
        let isJumping = false;
        let isGameOver = false; 
        let obstaclePosition = -60;

        // Configurações Iniciais de Física e Velocidade
        let jumpHeight = 180; // Ajustado levemente para combinar com a proporção da tela cheia    
        let obstacleSpeed = 9;    
        let currentLevel = 0;

        // Cores do São Paulo (Muda a cada 200 pontos)
        const coresSpfc = ["#FF0000", "#FFFFFF", "#000000", "#FFD700"]; 

        // Reiniciar o jogo no botão do Game Over
        btnRestart.addEventListener('click', () => {
            initGame();
        });

        // Inicializador / Reset do Jogo
        function initGame() {
            score = 0;
            currentLevel = 0;
            jumpHeight = 180;
            obstacleSpeed = 9;
            obstaclePosition = -60;
            isGameOver = false;
            isJumping = false;
            
            player.style.backgroundColor = coresSpfc[0];
            player.style.bottom = "0px";
            powerStatus.style.display = 'none';
            gameOverScreen.style.display = 'none';
            scoreDisplay.innerText = "Pontos: 0";
        }

        // Sistema de loop de Pontos (Sobe de 10 em 10)
        setInterval(() => {
            if (!isGameOver) {
                score += 10;
                scoreDisplay.innerText = "Pontos: " + score;
                testarEvolucaoPoderes();
            }
        }, 150);

        // MECÂNICA: Troca de cor e upgrade de poderes a cada 200 pontos
        function testarEvolucaoPoderes() {
            let passoAtual = Math.floor(score / 200);

            if (passoAtual > currentLevel) {
                currentLevel = passoAtual;
                
                // 1. Troca a cor do personagem
                let indexCor = currentLevel % coresSpfc.length;
                player.style.backgroundColor = coresSpfc[indexCor];

                // 2. Aplica os Superpoderes (Pula mais alto / Jogo fica mais rápido)
                jumpHeight = 180 + (currentLevel * 30); 
                obstacleSpeed = 9 + (currentLevel * 3); 

                // 3. Alerta na tela
                powerStatus.innerText = `⚡ PODER NÍVEL ${currentLevel}! CORRIDA + ALTO PULO`;
                powerStatus.style.display = 'block';
                
                setTimeout(() => {
                    powerStatus.style.display = 'none';
                }, 2500);
            }
        }

        /* --- CONTROLE DE PULO EXCLUSIVO NO ESPAÇO --- */
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space' && !isJumping && !isGameOver) {
                executarPulo();
            }
        });

        function ejecutarPulo() {
            isJumping = true;
            let p_bottom = 0;
            
            // Subindo...
            let upInterval = setInterval(() => {
                if (p_bottom >= jumpHeight) {
                    clearInterval(upInterval);
                    
                    // Descendo...
                    let downInterval = setInterval(() => {
                        if (p_bottom <= 0) {
                            clearInterval(downInterval);
                            p_bottom = 0;
                            isJumping = false;
                        } else {
                            p_bottom -= 8;
                        }
                        player.style.bottom = p_bottom + 'px';
                    }, 15);

                } else {
                    p_bottom += 8;
                }
                player.style.bottom = p_bottom + 'px';
            }, 15);
        }

        // ENGINE PRINCIPAL: Movimento e Verificação de Colisões (Adaptada para Tela Cheia)
        function gameEngine() {
            if (!isGameOver) {
                obstaclePosition += obstacleSpeed;
                
                // Se o obstáculo passar do limite esquerdo da tela, reseta ele para a direita
                if (obstaclePosition > (window.innerWidth + 60)) {
                    obstaclePosition = -60;
                }
                obstacle.style.right = obstaclePosition + 'px';

                // Lógica de colisão baseada na posição exata da tela em pixels
                let playerBounds = player.getBoundingClientRect();
                let obstacleBounds = obstacle.getBoundingClientRect();

                if (
                    playerBounds.right > obstacleBounds.left &&
                    playerBounds.left < obstacleBounds.right &&
                    playerBounds.bottom > obstacleBounds.top
                ) {
                    isGameOver = true;
                    finalScoreDisplay.innerText = "Pontos Finais: " + score;
                    gameOverScreen.style.display = 'flex';
                }
            }
            
            requestAnimationFrame(gameEngine);
        }

        // Inicializa o motor gráfico
        requestAnimationFrame(gameEngine);
    </script>
</body>
</html>
