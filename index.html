<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Manecraft - Dia e Noite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        body { font-family: 'Press Start 2P', Arial, sans-serif; background: linear-gradient(#1a1a2e, #16213e); color: #fff; margin: 0; padding: 15px; text-align: center; }
        h1 { color: #4ade80; text-shadow: 3px 3px #000; font-size: 2rem; margin: 5px 0 3px; }
        .version { background: #7c3aed; color: #ddd6fe; padding: 4px 14px; border-radius: 20px; font-size: 0.65rem; display: inline-block; margin-bottom: 8px; }
        #game-container { display: inline-block; background: #0f172a; padding: 12px; border: 6px solid #334155; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        canvas { border: 4px solid #1e2937; background: #5dade2; image-rendering: pixelated; cursor: crosshair; }
        #hotbar { display: flex; justify-content: center; gap: 5px; margin-top: 10px; padding: 8px; background: #1e2937; border: 4px solid #334155; border-radius: 6px; }
        .hotbar-slot { width: 52px; height: 52px; border: 3px solid #475569; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 7px; }
        .hotbar-slot.selected { border-color: #fbbf24; box-shadow: 0 0 12px #fbbf24; transform: scale(1.05); }
        .info { margin-top: 8px; font-size: 0.65rem; color: #94a3b8; line-height: 1.4; }
        button { font-family: 'Press Start 2P', Arial, sans-serif; background: #334155; color: #fff; border: 3px solid #475569; padding: 6px 11px; font-size: 0.6rem; cursor: pointer; margin: 2px; }
        button:hover { background: #475569; }
        .footer { margin-top: 10px; font-size: 0.55rem; color: #64748b; }
    </style>
</head>
<body>
    <h1>MINI MANECRAFT</h1>
    <div class="version">DIA E NOITE v8</div>
    
    <div id="game-container">
        <canvas id="game" width="800" height="592"></canvas>
        <div id="hotbar"></div>
    </div>
    
    <div class="info">
        <strong>Mover:</strong> A D &nbsp;&nbsp; 
        <strong>Pular / Wall Jump:</strong> ESPAÇO &nbsp;&nbsp; 
        <strong>Quebrar:</strong> Clique Esquerdo &nbsp;&nbsp; 
        <strong>Colocar:</strong> Clique Direito<br>
        <strong>1-6</strong> = Blocos &nbsp;&nbsp; <strong>G</strong> = Novo mundo
    </div>
    
    <div>
        <button onclick="generateWorld(); resetPlayer(); draw();">🌍 Novo Mundo</button>
        <button onclick="saveWorld()">💾 Salvar</button>
        <button onclick="loadWorld()">📂 Carregar</button>
    </div>
    
    <div class="footer">
        Rios • Animais • Wall Jump • Dia e Noite • Construção
    </div>

    <script>
        const COLS = 50;
        const ROWS = 37;
        const BLOCK_SIZE = 16;
        const GRAVITY = 0.7;
        const JUMP_FORCE = -12.5;
        const MOVE_SPEED = 3.6;
        const WALL_JUMP_X = 8;
        const WALL_JUMP_Y = -11.5;
        
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let world = [];
        let currentBlock = 1;
        let mouseX = 0, mouseY = 0;
        let keys = {};
        let particles = [];
        let animals = [];
        
        // ==================== DIA E NOITE ====================
        let time = 0;
        const DAY_LENGTH = 24000;
        let isNight = false;
        
        let player = {
            x: 400, y: 200,
            vx: 0, vy: 0,
            width: 12, height: 20,
            onGround: false,
            touchingWall: 0
        };
        
        class PerlinNoise {
            constructor(seed = Date.now()) {
                this.seed = seed; this.permutation = new Array(512); this.init();
            }
            init() {
                const p = Array.from({length:256},(_,i)=>i);
                let n = this.seed;
                for(let i=255;i>0;i--){ n=(n*16807)%2147483647; const j=Math.floor((n/2147483647)*(i+1)); [p[i],p[j]]=[p[j],p[i]]; }
                for(let i=0;i<256;i++){ this.permutation[i]=p[i]; this.permutation[i+256]=p[i]; }
            }
            fade(t){return t*t*t*(t*(t*6-15)+10)}
            lerp(t,a,b){return a+t*(b-a)}
            grad(h,x){const g=1+(h&7); return (h&8?-g:g)*x}
            noise(x){const X=Math.floor(x)&255;x-=Math.floor(x);const u=this.fade(x);const a=this.permutation[X],b=this.permutation[X+1];return this.lerp(u,this.grad(a,x),this.grad(b,x-1))/2+0.5}
            octaveNoise(x,oct=5,pers=0.5){let t=0,f=1,a=1,m=0;for(let i=0;i<oct;i++){t+=this.noise(x*f)*a;m+=a;a*=pers;f*=2;}return t/m}
        }
        
        let perlin = new PerlinNoise();
        
        function initWorld(){ world = Array.from({length:ROWS},()=>Array(COLS).fill(0)); }
        
        function generateWorld(){
            initWorld(); perlin = new PerlinNoise(Date.now());
            const baseHeight = ROWS-12;
            
            for(let x=0;x<COLS;x++){
                const noiseValue = perlin.octaveNoise(x*0.033,5,0.5);
                let height = Math.floor(baseHeight+(noiseValue-0.5)*16);
                height = Math.max(5,Math.min(height,ROWS-4));
                
                for(let y=height;y<ROWS;y++){
                    if(y===height) world[y][x]=2;
                    else if(y<height+5) world[y][x]=1;
                    else world[y][x]=3;
                }
                
                if(Math.random()<0.08 && height>6){
                    const th=3+Math.floor(Math.random()*2);
                    for(let t=1;t<=th;t++) if(height-t>=0) world[height-t][x]=4;
                    const ly=height-th-1; if(ly>=0){for(let lx=x-2;lx<=x+2;lx++) if(lx>=0&&lx<COLS){if(ly>=0)world[ly][lx]=5; if(ly-1>=0&&Math.abs(lx-x)<=1)world[ly-1][lx]=5;}}
                }
            }
            
            // Rios e lagos
            for(let i=0;i<3;i++){
                const startX = Math.floor(Math.random()*(COLS-15))+5;
                const riverWidth = 2+Math.floor(Math.random()*3);
                for(let x=startX;x<startX+riverWidth&&x<COLS;x++){
                    for(let y=8;y<ROWS-3;y++){
                        if(world[y][x]>0 && Math.random()<0.7) world[y][x]=6;
                    }
                }
            }
            
            for(let x=0;x<COLS;x++){
                for(let y=ROWS-8;y<ROWS;y++){
                    if(world[y][x]>0 && Math.random()<0.15) world[y][x]=6;
                }
            }
            
            resetPlayer();
            spawnAnimals();
        }
        
        function resetPlayer(){
            for(let y=6;y<ROWS-3;y++){for(let x=8;x<COLS-8;x++){if(world[y][x]===0&&world[y+1][x]>0&&world[y+1][x]!==6){player.x=x*BLOCK_SIZE+2;player.y=y*BLOCK_SIZE-player.height;player.vx=0;player.vy=0;player.onGround=false;player.touchingWall=0;return;}}}
            player.x=200;player.y=150;player.vx=0;player.vy=0;player.touchingWall=0;
        }
        
        function spawnAnimals(){
            animals = [];
            const num = 6 + Math.floor(Math.random()*5);
            for(let i=0;i<num;i++){
                for(let tries=0;tries<50;tries++){
                    const x = Math.floor(Math.random()*(COLS-4))+2;
                    const y = Math.floor(Math.random()*(ROWS-8))+4;
                    if(world[y][x]===0 && world[y+1][x]>0 && world[y+1][x]!==6){
                        animals.push({
                            x: x*BLOCK_SIZE+4, y: y*BLOCK_SIZE-14,
                            width:14, height:14,
                            vx: (Math.random()<0.5?-1:1)*(0.8+Math.random()*0.6),
                            type: Math.floor(Math.random()*3),
                            direction: Math.random()<0.5?-1:1
                        });
                        break;
                    }
                }
            }
        }
        
        function updateAnimals(){
            for(let animal of animals){
                if (isNight) {
                    animal.vx *= 0.4;
                    continue;
                }
                animal.x += animal.vx;
                const gx = Math.floor(animal.x/BLOCK_SIZE);
                const gy = Math.floor((animal.y+animal.height)/BLOCK_SIZE);
                const onGround = (gy<ROWS && world[gy][gx]>0 && world[gy][gx]!==6);
                
                if(!onGround) animal.vx *= 0.95;
                
                if(Math.random()<0.015){
                    animal.direction *= -1;
                    animal.vx = animal.direction * (0.8 + Math.random()*0.6);
                }
                
                const nextX = animal.x + animal.vx;
                const checkX = animal.vx>0 ? Math.floor((nextX+animal.width)/BLOCK_SIZE) : Math.floor(nextX/BLOCK_SIZE);
                if(checkX>=0&&checkX<COLS&&gy>=0&&gy<ROWS){
                    if(world[gy][checkX]>0 && world[gy][checkX]!==6){
                        animal.vx *= -1;
                        animal.direction *= -1;
                        animal.x += animal.vx*2;
                    }
                }
                
                if(animal.x<10){ animal.x=10; animal.vx*=-1; animal.direction=1; }
                if(animal.x>canvas.width-animal.width-10){ animal.x=canvas.width-animal.width-10; animal.vx*=-1; animal.direction=-1; }
            }
        }
        
        function drawAnimals(){
            for(let animal of animals){
                const ax=animal.x, ay=animal.y;
                if(animal.type===0){
                    ctx.fillStyle='#8B4513'; ctx.fillRect(ax,ay+4,animal.width,10);
                    ctx.fillStyle='#654321'; ctx.fillRect(ax+2,ay,10,6);
                    ctx.fillStyle='#000'; ctx.fillRect(ax+3,ay+2,2,2); ctx.fillRect(ax+8,ay+2,2,2);
                }else if(animal.type===1){
                    ctx.fillStyle='#ff9999'; ctx.fillRect(ax,ay+3,animal.width,11);
                    ctx.fillStyle='#ff6666'; ctx.fillRect(ax+10,ay+4,5,5);
                    ctx.fillStyle='#000'; ctx.fillRect(ax+11,ay+5,1,1); ctx.fillRect(ax+13,ay+5,1,1);
                }else{
                    ctx.fillStyle='#f5f5f5'; ctx.fillRect(ax,ay+4,animal.width,10);
                    ctx.fillStyle='#333'; ctx.fillRect(ax+2,ay+1,10,5);
                    ctx.fillStyle='#000'; ctx.fillRect(ax+3,ay+2,2,2); ctx.fillRect(ax+8,ay+2,2,2);
                }
            }
        }
        
        function isSolid(x,y){const gx=Math.floor(x/BLOCK_SIZE),gy=Math.floor(y/BLOCK_SIZE);if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return true;return world[gy][gx]>0&&world[gy][gx]!==6;}
        
        function updateWallTouch(){
            player.touchingWall=0;
            const left=isSolid(player.x-1,player.y+2)||isSolid(player.x-1,player.y+player.height-3);
            const right=isSolid(player.x+player.width+1,player.y+2)||isSolid(player.x+player.width+1,player.y+player.height-3);
            if(left)player.touchingWall=-1;else if(right)player.touchingWall=1;
        }
        
        function checkCollision(nx,ny){return isSolid(nx,ny)||isSolid(nx+player.width,ny)||isSolid(nx,ny+player.height)||isSolid(nx+player.width,ny+player.height);}
        
        function updatePhysics(){
            let moveX=0;
            if(keys['a']||keys['arrowleft'])moveX=-MOVE_SPEED;
            if(keys['d']||keys['arrowright'])moveX=MOVE_SPEED;
            player.vx=moveX;
            
            let newX=player.x+player.vx;
            if(!checkCollision(newX,player.y))player.x=newX;else player.vx=0;
            
            player.vy+=GRAVITY;
            let newY=player.y+player.vy;
            if(!checkCollision(player.x,newY)){player.y=newY;player.onGround=false;}
            else{if(player.vy>0)player.onGround=true;player.vy=0;if(player.vy>=0)player.y=Math.floor((player.y+player.height)/BLOCK_SIZE)*BLOCK_SIZE-player.height;}
            
            updateWallTouch();
            if(player.x<0)player.x=0;
            if(player.x>canvas.width-player.width)player.x=canvas.width-player.width;
            if(player.y<0)player.y=0;
        }
        
        function jump(){
            if(player.onGround){player.vy=JUMP_FORCE;player.onGround=false;}
            else if(player.touchingWall!==0){
                player.vy=WALL_JUMP_Y;
                player.vx=player.touchingWall*-WALL_JUMP_X;
                player.onGround=false;
                player.touchingWall=0;
                createWallJumpParticles();
            }
        }
        
        function createWallJumpParticles(){
            const dir=player.touchingWall;
            for(let i=0;i<8;i++){
                particles.push({
                    x:player.x+(dir===1?player.width:0),
                    y:player.y+player.height*0.5,
                    vx:dir*(2+Math.random()*2.5),
                    vy:-1.5-Math.random()*2,
                    life:22+Math.random()*12
                });
            }
        }
        
        function updateParticles(){
            for(let i=particles.length-1;i>=0;i--){
                const p=particles[i];
                p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;
                if(p.life<=0)particles.splice(i,1);
            }
        }
        
        function drawParticles(){
            ctx.fillStyle='#fed7aa';
            for(const p of particles){
                ctx.globalAlpha=Math.max(0,p.life/30);
                ctx.fillRect(p.x,p.y,3,3);
            }
            ctx.globalAlpha=1;
        }
        
        // ==================== DIA E NOITE ====================
        function updateDayNight() {
            time = (time + 1) % DAY_LENGTH;
            isNight = (time > 12000 && time < 22000);
        }
        
        function draw() {
            // === CÉU COM DIA E NOITE ===
            let skyColor;
            if (time < 3000) skyColor = '#ff7e5f';
            else if (time < 6000) skyColor = '#5dade2';
            else if (time < 9000) skyColor = '#f39c12';
            else if (time < 12000) skyColor = '#e67e22';
            else skyColor = '#1a1a2e';
            
            ctx.fillStyle = skyColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (isNight) {
                ctx.fillStyle = 'rgba(10, 10, 40, 0.55)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // Blocos
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const b = world[y][x];
                    if (b > 0) {
                        const px = x * BLOCK_SIZE;
                        const py = y * BLOCK_SIZE;
                        if (b === 6) {
                            ctx.fillStyle = '#3b82f6';
                            ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
                            ctx.fillStyle = 'rgba(147, 197, 253, 0.35)';
                            ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE * 0.4);
                        } else {
                            ctx.fillStyle = b === 1 ? '#8B4513' : b === 2 ? '#228B22' : b === 3 ? '#696969' : b === 4 ? '#D2691E' : '#32CD32';
                            ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
                            ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                            ctx.strokeRect(px + 0.5, py + 0.5, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        }
                    }
                }
            }
            
            drawAnimals();
            
            // Player
            const px = player.x;
            const py = player.y;
            
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(px + 1, py + player.height - 1, player.width - 2, 3);
            
            ctx.fillStyle = '#f5cba7';
            ctx.fillRect(px + 2, py + 2, 8, 8);
            ctx.strokeStyle = '#000';
            ctx.strokeRect(px + 2, py + 2, 8, 8);
            
            ctx.fillStyle = '#000';
            ctx.fillRect(px + 4, py + 4, 2, 2);
            ctx.fillRect(px + 8, py + 4, 2, 2);
            
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(px + 1, py + 10, 10, 8);
            
            ctx.fillStyle = '#f5cba7';
            ctx.fillRect(px - 1, py + 10, 3, 6);
            ctx.fillRect(px + 10, py + 10, 3, 6);
            
            ctx.fillStyle = '#1e40af';
            ctx.fillRect(px + 2, py + 18, 3, 5);
            ctx.fillRect(px + 7, py + 18, 3, 5);
            
            if (player.touchingWall !== 0 && !player.onGround) {
                ctx.fillStyle = 'rgba(251, 191, 36, 0.5)';
                if (player.touchingWall === -1) ctx.fillRect(px - 2, py + 5, 3, player.height - 10);
                else ctx.fillRect(px + player.width - 1, py + 5, 3, player.height - 10);
            }
            
            drawParticles();
            
            const gx = Math.floor(mouseX / BLOCK_SIZE);
            const gy = Math.floor(mouseY / BLOCK_SIZE);
            if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 2;
                ctx.strokeRect(gx * BLOCK_SIZE + 1, gy * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            }
            
            // Indicador de tempo
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(canvas.width - 80, 8, 70, 18);
            ctx.fillStyle = '#fff';
            ctx.font = '10px Arial';
            ctx.fillText(isNight ? '🌙 Noite' : '☀️ Dia', canvas.width - 75, 21);
        }
        
        function createHotbar() {
            const hotbar = document.getElementById('hotbar');
            hotbar.innerHTML = '';
            const blocks = [
                {id:1,name:'Terra',color:'#8B4513'},{id:2,name:'Grama',color:'#228B22'},
                {id:3,name:'Pedra',color:'#696969'},{id:4,name:'Madeira',color:'#D2691E'},
                {id:5,name:'Folhas',color:'#32CD32'},{id:6,name:'Água',color:'#3b82f6'}
            ];
            blocks.forEach((b,i)=>{
                const d = document.createElement('div');
                d.className='hotbar-slot';
                d.style.backgroundColor = b.color;
                if(i===0) d.classList.add('selected');
                d.innerHTML = `<div style="color:white;font-size:6px;text-shadow:1px 1px black;text-align:center">${b.name}<br><span style="font-size:5px">${i+1}</span></div>`;
                d.onclick = () => {
                    currentBlock = b.id;
                    document.querySelectorAll('.hotbar-slot').forEach(el=>el.classList.remove('selected'));
                    d.classList.add('selected');
                };
                hotbar.appendChild(d);
            });
        }
        
        function setupInput() {
            document.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); jump(); }
                if (e.key.toLowerCase() === 'g') { generateWorld(); draw(); }
                if (e.key >= '1' && e.key <= '6') {
                    currentBlock = parseInt(e.key);
                    document.querySelectorAll('.hotbar-slot').forEach((d,i) => d.classList.toggle('selected', i+1 === currentBlock));
                }
            });
            document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            
            canvas.addEventListener('mousemove', e => {
                const r = canvas.getBoundingClientRect();
                mouseX = e.clientX - r.left;
                mouseY = e.clientY - r.top;
            });
            
            canvas.addEventListener('mousedown', e => {
                const r = canvas.getBoundingClientRect();
                const gx = Math.floor((e.clientX-r.left)/BLOCK_SIZE);
                const gy = Math.floor((e.clientY-r.top)/BLOCK_SIZE);
                if(gx<0||gx>=COLS||gy<0||gy>=ROWS) return;
                if(e.button===0 && world[gy][gx]>0) world[gy][gx]=0;
                if(e.button===2 && world[gy][gx]===0) world[gy][gx]=currentBlock;
                draw();
            });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }
        
        function gameLoop() {
            updatePhysics();
            updateAnimals();
            updateParticles();
            updateDayNight();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function updateDayNight() {
            time = (time + 1) % DAY_LENGTH;
            isNight = (time > 12000 && time < 22000);
        }
        
        function saveWorld() {
            try {
                localStorage.setItem('miniManecraftDayNight', JSON.stringify({
                    world: world,
                    player: {x:player.x, y:player.y},
                    animals: animals,
                    time: time
                }));
                alert('✅ Mundo salvo!');
            } catch(e){ alert('Erro ao salvar'); }
        }
        
        function loadWorld() {
            try {
                const data = JSON.parse(localStorage.getItem('miniManecraftDayNight'));
                if(data){
                    world = data.world;
                    if(data.player){ player.x = data.player.x; player.y = data.player.y; }
                    if(data.animals) animals = data.animals;
                    if(data.time) time = data.time;
                    draw();
                    alert('✅ Mundo carregado!');
                }
            } catch(e){ alert('Nenhum save encontrado'); }
        }
        
        function initGame() {
            initWorld();
            generateWorld();
            createHotbar();
            setupInput();
            draw();
            gameLoop();
            
            setTimeout(() => {
                const m = document.createElement('div');
                m.style.cssText = 'position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#ddd6fe;padding:7px 14px;border-radius:5px;font-size:0.65rem;';
                m.innerHTML = 'O tempo passa! <strong>Dia e Noite</strong> ativos!';
                document.body.appendChild(m);
                setTimeout(() => m.remove(), 2800);
            }, 900);
        }
        
        window.onload = initGame;
    </script>
</body>
</html>
