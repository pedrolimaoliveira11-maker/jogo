<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Craft 8-Bit Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            background-color: #000;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px #000;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #55ff55;
            padding: 15px;
            border: 3px solid #55ff55;
            border-radius: 0px;
            pointer-events: none;
            font-size: 12px;
        }
        /* Efeito de linhas de varredura CRT opcional para dar mais clima retrô */
        #crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="instructions">
        === MINI CRAFT 8-BIT ===<br><br>
        CLIQUE NA TELA PARA JOGAR<br>
        W, A, S, D - MOVER<br>
        ESPAÇO      - PULAR<br>
        BOTÃO ESQ.  - DESTRUIR<br>
        BOTÃO DIR.  - CONSTRUIR
    </div>
    <div id="crt-overlay"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>

    <script>
        // --- CONFIGURAÇÃO DA CENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4a74b4); // Azul retro
        scene.fog = new THREE.FogExp2(0x4a74b4, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Antialias falso ajuda no look pixelado
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- PÓS-PROCESSAMENTO (EFEITO 8-BIT / PIXELADO) ---
        const composer = new THREE.EffectComposer(renderer);
        const renderPass = new THREE.RenderPass(scene, camera);
        composer.addPass(renderPass);

        // Shader customizado para reduzir a resolução da imagem renderizada
        const PixelShader = {
            uniforms: {
                "tDiffuse": { value: null },
                "resolution": { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                "pixelSize": { value: 6.0 } // QUANTO MAIOR O NÚMERO, MAIS 8-BIT FICA
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform vec2 resolution;
                uniform float pixelSize;
                varying vec2 vUv;
                void main() {
                    vec2 dxy = pixelSize / resolution;
                    vec2 coord = dxy * Math.floor(vUv / dxy);
                    gl_FragColor = texture2D(tDiffuse, coord);
                }
            `
        };

        // Correção de sintaxe para o shader nativo rodar no WebGL do Three.js
        PixelShader.fragmentShader = PixelShader.fragmentShader.replace('Math.floor', 'floor'); 

        const pixelPass = new THREE.ShaderPass(PixelShader);
        composer.addPass(pixelPass);

        // --- CONTROLES ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => { controls.lock(); });

        const keys = { w: false, a: false, s: false, d: false, space: false };
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') keys.w = true;
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyS') keys.s = true;
            if (e.code === 'KeyD') keys.d = true;
            if (e.code === 'Space') keys.space = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') keys.w = false;
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyS') keys.s = false;
            if (e.code === 'KeyD') keys.d = false;
            if (e.code === 'Space') keys.space = false;
        });

        // --- ILUMINAÇÃO ESTILO RETRÔ ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(20, 40, 20);
        scene.add(directionalLight);

        // --- GERAÇÃO DE BLOCOS ---
        const blocks = [];
        const materials = {
            grass: new THREE.MeshLambertMaterial({ color: 0x38733c }), // Cores saturadas estilo NES/Brick
            dirt: new THREE.MeshLambertMaterial({ color: 0x6e473b }),
            stone: new THREE.MeshLambertMaterial({ color: 0x666666 })
        };
        const blockGeometry = new THREE.BoxGeometry(1, 1, 1);

        function createBlock(x, y, z, type) {
            const mesh = new THREE.Mesh(blockGeometry, materials[type]);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            blocks.push(mesh);
        }

        // Gerar Mapa Pequeno e Compacto
        const worldSize = 14;
        for (let x = -worldSize/2; x < worldSize/2; x++) {
            for (let z = -worldSize/2; z < worldSize/2; z++) {
                let height = Math.floor(Math.sin(x * 0.4) * 1.5 + Math.cos(z * 0.4) * 1.5);
                
                createBlock(x, height, z, 'grass');
                createBlock(x, height - 1, z, 'dirt');
                createBlock(x, height - 2, z, 'stone');
            }
        }

        camera.position.set(0, 4, 0);

        // --- FÍSICA ---
        let velocityY = 0;
        const gravity = -0.015;
        const jumpForce = 0.22;
        const playerSpeed = 0.08;

        function updatePhysics() {
            if (!controls.isLocked) return;

            velocityY += gravity;
            camera.position.y += velocityY;

            let floorY = 2.8; // Altura fixa de colisão simplificada
            if (camera.position.y < floorY) {
                camera.position.y = floorY;
                velocityY = 0;
                if (keys.space) velocityY = jumpForce;
            }

            if (keys.w) controls.moveForward(playerSpeed);
            if (keys.s) controls.moveForward(-playerSpeed);
            if (keys.a) controls.moveRight(-playerSpeed);
            if (keys.d) controls.moveRight(playerSpeed);
        }

        // --- CONSTRUIR E DESTRUIR ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0);

        window.addEventListener('pointerdown', (e) => {
            if (!controls.isLocked) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0 && intersects[0].distance < 6) {
                const intersect = intersects[0];

                if (e.button === 0) { // Clique Esquerdo: Quebrar
                    scene.remove(intersect.object);
                    const index = blocks.indexOf(intersect.object);
                    if (index > -1) blocks.splice(index, 1);
                } 
                else if (e.button === 2) { // Clique Direito: Construir
                    const position = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(0.5));
                    createBlock(Math.round(position.x), Math.round(position.y), Math.round(position.z), 'stone');
                }
            }
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- LOOP DE REDIRECIONAMENTO ---
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            
            // Renderiza usando o Composer (que aplica o filtro pixelado) em vez do renderer padrão
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            pixelPass.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
