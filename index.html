<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Craft Clone</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="instructions">
        <strong>Controles:</strong><br>
        Clique na tela para ativar o mouse<br>
        W, A, S, D - Mover<br>
        Espaço - Pular<br>
        Clique Esquerdo - Quebrar Bloco<br>
        Clique Direito - Criar Bloco
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- CONFIGURAÇÃO INICIAL ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec0ee); // Cor do céu
        scene.fog = new THREE.FogExp2(0x7ec0ee, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- CONTROLES DE MOVIMENTO (PointerLock) ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        
        document.body.addEventListener('click', () => {
            controls.lock();
        });

        const keys = { w: false, a: false, s: false, d: false, space: false };
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') keys.w = true;
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyS') keys.s = true;
            if (e.code === 'KeyD') keys.d = true;
            if (e.code === 'Space') keys.space = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') keys.w = false;
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyS') keys.s = false;
            if (e.code === 'KeyD') keys.d = false;
            if (e.code === 'Space') keys.space = false;
        });

        // --- ILUMINAÇÃO ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(10, 20, 15);
        scene.add(directionalLight);

        // --- GERADOR DE MUNDO (BLOCO) ---
        const blockSize = 1;
        const blocks = [];
        
        // Texturas básicas usando cores sólidas (Grama, Terra, Pedra)
        const materials = {
            grass: new THREE.MeshLambertMaterial({ color: 0x557a2b }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x866043 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x808080 })
        };
        const blockGeometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);

        function createBlock(x, y, z, type) {
            const mesh = new THREE.Mesh(blockGeometry, materials[type]);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            blocks.push(mesh);
        }

        // Gerar um terreno simples de 16x16
        const worldSize = 16;
        for (let x = -worldSize/2; x < worldSize/2; x++) {
            for (let z = -worldSize/2; z < worldSize/2; z++) {
                // Altura básica usando seno para fazer pequenas ondulações
                let height = Math.floor(Math.sin(x * 0.2) * 2 + Math.cos(z * 0.2) * 2);
                
                // Camada de Grama
                createBlock(x, height, z, 'grass');
                // Camadas de Terra por baixo
                createBlock(x, height - 1, z, 'dirt');
                createBlock(x, height - 2, z, 'stone');
            }
        }

        // Posição inicial da câmera (Jogador)
        camera.position.set(0, 5, 0);

        // --- FÍSICA E GRAVIDADE SIMPLES ---
        let velocityY = 0;
        const gravity = -0.012;
        const jumpForce = 0.25;
        const playerSpeed = 0.1;
        const playerHeight = 1.8;

        function updatePhysics() {
            if (!controls.isLocked) return;

            // Gravidade
            velocityY += gravity;
            camera.position.y += velocityY;

            // Colisão simples com o chão (y = 0 considerando a altura do relevo aproximada)
            // Para um jogo real, seria necessário checar o bloco exato abaixo.
            let terrainHeight = 1; 
            if (camera.position.y < terrainHeight + playerHeight) {
                camera.position.y = terrainHeight + playerHeight;
                velocityY = 0;
                if (keys.space) {
                    velocityY = jumpForce; // Pular
                }
            }

            // Movimento estrafado (frente/trás/lados)
            if (keys.w) controls.moveForward(playerSpeed);
            if (keys.s) controls.moveForward(-playerSpeed);
            if (keys.a) controls.moveRight(-playerSpeed);
            if (keys.d) controls.moveRight(playerSpeed);
        }

        // --- QUEBRAR E COLOCAR BLOCOS (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // Centro da tela

        window.addEventListener('pointerdown', (e) => {
            if (!controls.isLocked) return;

            // Aponta o raio para o centro da tela
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0 && intersects[0].distance < 6) {
                const intersect = intersects[0];

                if (e.button === 0) {
                    // Botão Esquerdo: Quebrar bloco
                    scene.remove(intersect.object);
                    const index = blocks.indexOf(intersect.object);
                    if (index > -1) blocks.splice(index, 1);
                } 
                else if (e.button === 2) {
                    // Botão Direito: Colocar bloco baseado na face clicada
                    const position = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(0.5));
                    
                    // Alinha com a grade do cenário
                    const bx = Math.round(position.x);
                    const by = Math.round(position.y);
                    const bz = Math.round(position.z);

                    createBlock(bx, by, bz, 'dirt');
                }
            }
        });

        // Previnir menu de contexto do clique direito
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- LOOP DE ANIMAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            renderer.render(scene, camera);
        }

        // Ajustar tela caso mude de tamanho
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
