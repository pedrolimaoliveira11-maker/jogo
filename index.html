<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Boxe - 2 Jogadores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: #222;
            display: block;
        }
        #instrucoes {
            position: absolute;
            top: 10px;
            color: white;
            text-align: center;
            font-size: 14px;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="instrucoes">
        <strong>Clique na tela para ativar Tela Cheia</strong><br>
        P1: A/D (Mover), W (Soco) | P2: Setas Esq/Dir (Mover), Seta Cima (Soco)
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Ajusta o tamanho do canvas para o tamanho da tela
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Entrar em tela cheia ao clicar
        window.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Erro ao ativar tela cheia: ${err.message}`);
                });
            }
        });

        // Configurações do Jogo
        const chaoioridade = 0.8; // Altura do chão proporcional
        
        const player1 = {
            x: 200,
            y: 0,
            width: 60,
            height: 120,
            color: '#e74c3c',
            nome: 'Jogador 1',
            lado: 1, // 1 = Direita, -1 = Esquerda
            vida: 100,
            isAtacando: false,
            tempoAtaque: 0,
            velocidade: 8,
            pontos: 0
        };

        const player2 = {
            x: 0,
            y: 0,
            width: 60,
            height: 120,
            color: '#3498db',
            nome: 'Jogador 2',
            lado: -1,
            vida: 100,
            isAtacando: false,
            tempoAtaque: 0,
            velocidade: 8,
            pontos: 0
        };

        // Resetar posições após um nocaute
        function resetPosicoes() {
            player1.x = canvas.width * 0.25;
            player2.x = canvas.width * 0.75 - player2.width;
            player1.y = canvas.height * chaoioridade - player1.height;
            player2.y = canvas.height * chaoioridade - player2.height;
            player1.vida = 100;
            player2.vida = 100;
        }

        // Controle de teclas pressionadas
        const teclas = {};
        window.addEventListener('keydown', (e) => teclas[e.code] = true);
        window.addEventListener('keyup', (e) => teclas[e.code] = false);

        // Lógica de atualização
        function atualizar() {
            // Garante que o chão se adapte se a tela mudar
            const chaoY = canvas.height * chaoioridade;

            // --- Controles do Jogador 1 (A, D, W) ---
            if (teclas['KeyA'] && player1.x > 0) {
                player1.x -= player1.velocidade;
            }
            if (teclas['KeyD'] && player1.x < player2.x + player2.width) { // Bloqueia atravessar o rival completamente
                player1.x += player1.velocidade;
            }
            if (teclas['KeyW'] && !player1.isAtacando) {
                player1.isAtacando = true;
                player1.tempoAtaque = 10; // Duração do soco em frames
                verificarColisaoAtaque(player1, player2);
            }

            // --- Controles do Jogador 2 (Setas) ---
            if (teclas['ArrowLeft'] && player2.x > player1.x) {
                player2.x -= player2.velocidade;
            }
            if (teclas['ArrowRight'] && player2.x < canvas.width - player2.width) {
                player2.x += player2.velocidade;
            }
            if (teclas['ArrowUp'] && !player2.isAtacando) {
                player2.isAtacando = true;
                player2.tempoAtaque = 10;
                verificarColisaoAtaque(player2, player1);
            }

            // Atualiza tempo dos golpes
            if (player1.isAtacando) {
                player1.tempoAtaque--;
                if (player1.tempoAtaque <= 0) player1.isAtacando = false;
            }
            if (player2.isAtacando) {
                player2.tempoAtaque--;
                if (player2.tempoAtaque <= 0) player2.isAtacando = false;
            }

            // Orientação dos lutadores (olhar um para o outro)
            if (player1.x < player2.x) {
                player1.lado = 1;
                player2.lado = -1;
            } else {
                player1.lado = -1;
                player2.lado = 1;
            }

            // Verifica Fim do Round
            if (player1.vida <= 0) {
                player2.pontos++;
                resetPosicoes();
            }
            if (player2.vida <= 0) {
                player1.pontos++;
                resetPosicoes();
            }
        }

        // Sistema de Detecção do Soco
        function verificarColisaoAtaque(atacante, defensor) {
            const alcanceSoco = 50;
            let socoX;

            if (atacante.lado === 1) {
                socoX = atacante.x + atacante.width;
                // Se o soco alcança o defensor
                if (socoX + alcanceSoco >= defensor.x && socoX <= defensor.x + defensor.width) {
                    defensor.vida -= 10;
                    defensor.x += 20; // Empurrão
                }
            } else {
                socoX = atacante.x;
                if (socoX - alcanceSoco <= defensor.x + defensor.width && socoX >= defensor.x) {
                    defensor.vida -= 10;
                    defensor.x -= 20; // Empurrão
                }
            }
        }

        // Renderização gráfica
        function desenhar() {
            // Limpa a tela
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const chaoY = canvas.height * chaoioridade;

            // Desenha o Ringue/Chão
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, chaoY, canvas.width, canvas.height - chaoY);
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, chaoY, canvas.width, 10); // Linha do ringue

            // Desenha Interface (Placar e Vida)
            desenharInterface();

            // Desenha Jogador 1
            desenharLutador(player1);

            // Desenha Jogador 2
            desenharLutador(player2);
        }

        function desenharLutador(p) {
            const chaoY = canvas.height * chaoioridade;
            p.y = chaoY - p.height; // Garante que está no chão

            // Corpo
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.width, p.height);

            // Cabeça
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(p.x + (p.width/4), p.y - 35, p.width/2, 35);

            // Luvas / Braço de Boxe
            ctx.fillStyle = '#fff';
            const alcanceSoco = 40;
            
            if (p.isAtacando) {
                if (p.lado === 1) {
                    ctx.fillRect(p.x + p.width, p.y + 20, alcanceSoco, 20); // Soco direita
                } else {
                    ctx.fillRect(p.x - alcanceSoco, p.y + 20, alcanceSoco, 20); // Soco esquerda
                }
            } else {
                // Posição de guarda padrão
                if (p.lado === 1) {
                    ctx.fillRect(p.x + p.width - 15, p.y + 20, 20, 20);
                } else {
                    ctx.fillRect(p.x - 5, p.y + 20, 20, 20);
                }
            }
        }

        function desenharInterface() {
            // Barra de vida P1
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(50, 50, 300, 25);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(50, 50, 300 * (player1.vida / 100), 25);
            
            // Barra de vida P2
            const p2BarX = canvas.width - 350;
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(p2BarX, 50, 300, 25);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(p2BarX + (300 - 300 * (player2.vida / 100)), 50, 300 * (player2.vida / 100), 25);

            // Placar de Rounds
            ctx.fillStyle = '#fff';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`${player1.pontos}  -  ${player2.pontos}`, canvas.width / 2, 70);

            // Nomes
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(player1.nome, 50, 40);
            ctx.textAlign = 'right';
            ctx.fillText(player2.nome, canvas.width - 50, 40);
        }

        // Loop Principal do Jogo
        function loop() {
            atualizar();
            desenhar();
            requestAnimationFrame(loop);
        }

        // Inicializa as posições dos jogadores de acordo com a tela atual e roda o jogo
        resetPosicoes();
        loop();
    </script>
</body>
</html>
