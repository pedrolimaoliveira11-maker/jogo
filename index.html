<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚇 Sub Surf - Estilo Subway Surfers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        
        h1 {
            color: #00ff9d;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.6);
            margin-bottom: 8px;
            font-size: 2.4em;
        }
        
        .instructions {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 15px;
            margin-bottom: 8px;
            color: #ddd;
            font-size: 1em;
            text-align: center;
        }
        
        #game {
            width: 90vw;
            max-width: 1100px;
            height: auto;
            border: 8px solid #00ff9d;
            border-radius: 15px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.7);
            background: #fff;
            cursor: pointer;
        }
        
        .footer {
            margin-top: 10px;
            color: #aaa;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>🚇 Sub Surf</h1>
    
    <div class="instructions">
        <strong>← →</strong> ou <strong>A D</strong> = Mudar de faixa &nbsp;&nbsp; 
        <strong>ESPAÇO</strong> = Pular &nbsp;&nbsp; 
        <strong>↓</strong> ou <strong>S</strong> = Agachar
    </div>
    
    <canvas id="game" width="1100" height="620"></canvas>
    
    <div class="footer">
        Estilo Subway Surfers • Colete moedas • Fuja dos obstáculos
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let currentLane = 1;
        let playerY = 480;
        let playerVY = 0;
        let isJumping = false;
        let isDucking = false;

        let obstacles = [];
        let coins = [];
        let particles = [];
        let score = 0;
        let coinsCollected = 0;
        let highScore = 0;
        let gameSpeed = 5.5;
        let gravity = 0.9;
        let jumpForce = -17;
        let gameOver = false;
        let frame = 0;

        function loadHighScore() {
            const saved = localStorage.getItem('subSurfHighScore');
            if (saved) highScore = parseInt(saved);
        }
        loadHighScore();

        function resetGame() {
            currentLane = 1;
            playerY = 480;
            playerVY = 0;
            isJumping = false;
            isDucking = false;
            obstacles = [];
            coins = [];
            particles = [];
            score = 0;
            coinsCollected = 0;
            gameSpeed = 5.5;
            gameOver = false;
            frame = 0;
        }

        function getLaneX(lane) {
            const center = canvas.width / 2;
            return center + (lane - 1) * 180;
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const type = Math.random() > 0.7 ? 'train' : 'barrier';
            
            obstacles.push({
                lane: lane,
                y: -100,
                width: type === 'train' ? 120 : 70,
                height: type === 'train' ? 90 : 55,
                type: type
            });
        }

        function spawnCoin() {
            const lane = Math.floor(Math.random() * 3);
            coins.push({
                lane: lane,
                y: -60,
                size: 22
            });
        }

        function updateGame() {
            if (isJumping) {
                playerVY += gravity;
                playerY += playerVY;
                
                if (playerY >= 480) {
                    playerY = 480;
                    playerVY = 0;
                    isJumping = false;
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += gameSpeed;
                if (obstacles[i].y > canvas.height + 100) {
                    obstacles.splice(i, 1);
                }
            }

            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].y += gameSpeed;
                if (coins[i].y > canvas.height + 50) {
                    coins.splice(i, 1);
                }
            }

            if (Math.random() < 0.025) spawnObstacle();
            if (Math.random() < 0.04) spawnCoin();

            const playerX = getLaneX(currentLane);
            for (let o of obstacles) {
                if (o.lane === currentLane) {
                    const playerTop = playerY - (isDucking ? 25 : 55);
                    const playerBottom = playerY + 15;
                    
                    if (o.y + o.height > playerTop && o.y < playerBottom) {
                        gameOver = true;
                    }
                }
            }

            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                if (c.lane === currentLane && 
                    c.y > playerY - 70 && c.y < playerY + 20) {
                    coins.splice(i, 1);
                    coinsCollected++;
                    score += 50;
                    
                    for (let p = 0; p < 8; p++) {
                        particles.push({
                            x: getLaneX(currentLane),
                            y: playerY - 30,
                            vx: (Math.random() - 0.5) * 4,
                            vy: (Math.random() - 0.5) * 4,
                            life: 20
                        });
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            score += 0.3;
            gameSpeed = Math.min(5.5 + Math.floor(score / 300) * 0.35, 13);
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, 400);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, 400);

            ctx.fillStyle = '#0f3460';
            ctx.fillRect(50, 120, 80, 280);
            ctx.fillRect(180, 80, 70, 320);
            ctx.fillRect(900, 100, 90, 300);
            ctx.fillRect(1050, 60, 75, 340);

            ctx.fillStyle = '#e94560';
            for (let y = 140; y < 380; y += 35) {
                ctx.fillRect(60, y, 15, 18);
                ctx.fillRect(85, y + 10, 15, 18);
                ctx.fillRect(190, y, 15, 18);
                ctx.fillRect(920, y, 15, 18);
                ctx.fillRect(1055, y + 5, 15, 18);
            }
        }

        function drawRoad() {
            const centerX = canvas.width / 2;

            ctx.fillStyle = '#2d3436';
            ctx.beginPath();
            ctx.moveTo(centerX - 250, 620);
            ctx.lineTo(centerX + 250, 620);
            ctx.lineTo(centerX + 160, 200);
            ctx.lineTo(centerX - 160, 200);
            ctx.fill();

            ctx.strokeStyle = '#fdcb6e';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(centerX - 250, 620);
            ctx.lineTo(centerX - 160, 200);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(centerX + 250, 620);
            ctx.lineTo(centerX + 160, 200);
            ctx.stroke();

            ctx.strokeStyle = '#dfe6e9';
            ctx.lineWidth = 4;
            for (let y = 220; y < 600; y += 50) {
                const progress = (y - 200) / 420;
                const offset = (1 - progress) * 90;
                ctx.beginPath();
                ctx.moveTo(centerX - offset, y);
                ctx.lineTo(centerX + offset, y);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            const x = getLaneX(currentLane);
            const y = playerY;

            ctx.save();
            ctx.translate(x, y);

            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(0, 30, 35, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            if (isDucking) {
                ctx.fillStyle = '#e17055';
                ctx.fillRect(-20, 5, 40, 25);
                ctx.fillStyle = '#d63031';
                ctx.fillRect(-18, 0, 36, 8);
            } else {
                ctx.fillStyle = '#e17055';
                ctx.fillRect(-18, -30, 36, 45);

                ctx.fillStyle = '#fdcb6e';
                ctx.beginPath();
                ctx.arc(0, -38, 14, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#00b894';
                ctx.beginPath();
                ctx.ellipse(0, -45, 15, 7, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.fillRect(-7, -40, 5, 5);
                ctx.fillRect(2, -40, 5, 5);
                ctx.fillStyle = '#2d3436';
                ctx.fillRect(-6, -39, 3, 3);
                ctx.fillRect(3, -39, 3, 3);
            }

            ctx.restore();
        }

        function drawObstacles() {
            for (let o of obstacles) {
                const x = getLaneX(o.lane);
                const scale = 0.5 + (o.y / 650);
                const w = o.width * scale;
                const h = o.height * scale;

                ctx.save();
                ctx.translate(x, o.y);

                if (o.type === 'barrier') {
                    ctx.fillStyle = '#e17055';
                    ctx.fillRect(-w/2, 0, w, h);
                    ctx.fillStyle = '#d63031';
                    ctx.fillRect(-w/2 + 5, 8, w - 10, 8);
                    ctx.fillRect(-w/2 + 5, h - 16, w - 10, 8);
                } else {
                    ctx.fillStyle = '#2d3436';
                    ctx.fillRect(-w/2, 0, w, h);
                    ctx.fillStyle = '#636e72';
                    ctx.fillRect(-w/2 + 8, 10, w - 16, h * 0.6);
                    ctx.fillStyle = '#fdcb6e';
                    ctx.fillRect(-w/2 + 15, h * 0.3, 12, 12);
                    ctx.fillRect(w/2 - 27, h * 0.3, 12, 12);
                }

                ctx.restore();
            }
        }

        function drawCoins() {
            for (let c of coins) {
                const x = getLaneX(c.lane);
                ctx.save();
                ctx.translate(x, c.y);

                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(0, 0, c.size / 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.arc(0, 0, c.size / 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        function drawParticles() {
            ctx.fillStyle = '#f1c40f';
            for (let p of particles) {
                ctx.globalAlpha = p.life / 20;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 26px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Pontos: ' + Math.floor(score), 25, 40);
            
            ctx.fillStyle = '#f1c40f';
            ctx.fillText('🪙 Moedas: ' + coinsCollected, 25, 68);

            ctx.fillStyle = '#00ff9d';
            ctx.font = 'bold 18px Arial';
            ctx.fillText('Recorde: ' + highScore, 25, 92);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(280, 140, 540, 260);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 6;
            ctx.strokeRect(280, 140, 540, 260);

            ctx.fillStyle = '#c0392b';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 550, 200);

            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 26px Arial';
            ctx.fillText('Pontuação: ' + Math.floor(score), 550, 245);
            ctx.fillText('Moedas: ' + coinsCollected, 550, 275);

            if (Math.floor(score) > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('subSurfHighScore', highScore);
                ctx.fillStyle = '#f39c12';
                ctx.font = 'bold 22px Arial';
                ctx.fillText('NOVO RECORDE!', 550, 310);
            }

            ctx.fillStyle = '#27ae60';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('Pressione ESPAÇO para jogar novamente', 550, 355);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawRoad();
            drawObstacles();
            drawCoins();
            drawPlayer();
            drawParticles();
            drawHUD();

            if (!gameOver) {
                updateGame();
            } else {
                drawGameOver();
            }

            frame++;
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (gameOver) {
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    resetGame();
                }
                return;
            }

            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
                if (currentLane > 0) currentLane--;
            }
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
                if (currentLane < 2) currentLane++;
            }
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (!isJumping && !isDucking) {
                    isJumping = true;
                    playerVY = jumpForce;
                }
            }
            if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') {
                isDucking = true;
            }
        });

        document.addEventListener('keyup', function(e) {
            if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') {
                isDucking = false;
            }
        });

        function startGame() {
            resetGame();
            
            setTimeout(() => { if (!gameOver) spawnObstacle(); }, 700);
            setTimeout(() => { if (!gameOver) spawnCoin(); }, 1200);
            setTimeout(() => { if (!gameOver) spawnObstacle(); }, 2000);

            gameLoop();
        }

        startGame();
    </script>
</body>
</html>
