<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Pichador Realista - Pulando Carros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #0a1628, #162033);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        h1 {
            color: #00e5ff;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.7);
            margin-bottom: 6px;
            font-size: 2.2em;
        }
        
        .instructions {
            background: rgba(0, 0, 0, 0.4);
            padding: 7px 18px;
            border-radius: 12px;
            margin-bottom: 6px;
            color: #b0bec5;
            font-size: 0.95em;
            text-align: center;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        
        #game {
            width: 90vw;
            max-width: 1450px;
            height: auto;
            border: 10px solid #00e5ff;
            border-radius: 18px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            background: #fff;
            cursor: pointer;
            display: block;
        }
        
        .stage-info {
            margin-top: 6px;
            font-size: 1.05em;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }
        
        .footer {
            margin-top: 6px;
            color: #78909c;
            font-size: 0.82em;
        }
    </style>
</head>
<body>
    <h1>🎨 Pichador Realista</h1>
    
    <div class="instructions">
        <strong>ESPAÇO</strong> ou <strong>↑</strong> para pular os carros • Quase tela cheia (90%)<br>
        <span style="color:#ffeb3b;">+ rápido a cada 200 pontos</span> • 
        <span style="color:#4fc3f7;">Muda de cidade a cada 1000 pontos</span>
    </div>
    
    <canvas id="game" width="1280" height="640"></canvas>
    
    <div class="stage-info" id="stageText">Fase 1 - Centro da Cidade</div>
    
    <div class="footer">
        Gráficos mais realistas • Pichador pulando carros na cidade
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });

        let player = {
            x: 150,
            y: 0,
            width: 44,
            height: 64,
            vy: 0
        };
        
        let obstacles = [];
        let particles = [];
        let rainParticles = [];
        let score = 0;
        let highScore = 0;
        let gameSpeed = 5.3;
        let gravity = 0.74;
        let jumpForce = -15.8;
        let gameOver = false;
        let frame = 0;
        let groundOffset = 0;
        let currentStage = 0;
        let groundY = 495;

        function loadHighScore() {
            const saved = localStorage.getItem('pichadorRealistaHighScore');
            if (saved) highScore = parseInt(saved);
        }
        loadHighScore();

        function resetGame() {
            player.y = groundY - player.height;
            player.vy = 0;
            obstacles = [];
            particles = [];
            rainParticles = [];
            score = 0;
            gameSpeed = 5.3;
            gameOver = false;
            frame = 0;
            groundOffset = 0;
            currentStage = 0;
            updateStageDisplay();
        }

        function updateStageDisplay() {
            const names = [
                "Fase 1 - Centro da Cidade",
                "Fase 2 - Noite Neon",
                "Fase 3 - Chuva na Cidade",
                "Fase 4 - Telhados"
            ];
            const el = document.getElementById('stageText');
            if (el) {
                el.textContent = names[Math.min(currentStage, 3)];
                el.style.color = currentStage === 3 ? '#ff7043' : 
                                currentStage === 2 ? '#4fc3f7' : 
                                currentStage === 1 ? '#ce93d8' : '#00e5ff';
            }
        }

        function getCurrentStage() {
            return Math.floor(score / 1000);
        }

        function updateStage() {
            const newStage = getCurrentStage();
            if (newStage !== currentStage && newStage <= 3) {
                currentStage = newStage;
                updateStageDisplay();
                gameSpeed = Math.min(gameSpeed + 0.8, 15.5);
            }
        }

        function updateSpeed() {
            const level = Math.floor(score / 200);
            const newSpeed = Math.min(5.3 + level * 0.48, 15.5);
            if (newSpeed > gameSpeed) gameSpeed = newSpeed;
        }

        function spawnObstacle() {
            let height, width, type;
            const stage = currentStage;

            if (stage === 0) {
                height = 42 + Math.random() * 22;
                width = 68 + Math.random() * 28;
                type = Math.random() > 0.55 ? 'sedan' : 'van';
            } else if (stage === 1) {
                height = 44 + Math.random() * 20;
                width = 72 + Math.random() * 26;
                type = Math.random() > 0.5 ? 'sedan' : 'truck';
            } else if (stage === 2) {
                height = 40 + Math.random() * 24;
                width = 70 + Math.random() * 30;
                type = Math.random() > 0.5 ? 'van' : 'sedan';
            } else {
                height = 46 + Math.random() * 18;
                width = 74 + Math.random() * 24;
                type = Math.random() > 0.55 ? 'truck' : 'sedan';
            }

            obstacles.push({
                x: canvas.width + 90,
                y: groundY - height,
                width: width,
                height: height,
                type: type,
                color: ['#c62828', '#1565c0', '#2e7d32', '#ef6c00', '#6a1b9a', '#37474f'][Math.floor(Math.random()*6)]
            });
        }

        function checkCollision(p, o) {
            return !(
                p.x + p.width < o.x ||
                p.x > o.x + o.width ||
                p.y + p.height < o.y ||
                p.y > o.y + o.height
            );
        }

        function createDust(x, y) {
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: x + Math.random() * 18,
                    y: y,
                    vx: -2.8 - Math.random() * 2.2,
                    vy: -1.6 + Math.random() * 1.2,
                    life: 20 + Math.random() * 18,
                    size: 3 + Math.random() * 2.5
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.17;
                p.life--;
                p.vx *= 0.93;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            ctx.fillStyle = currentStage === 2 ? '#81d4fa' : '#b0bec5';
            for (let p of particles) {
                ctx.globalAlpha = Math.max(0.1, p.life / 30);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function updateRain() {
            if (currentStage !== 2) {
                rainParticles = [];
                return;
            }
            if (rainParticles.length < 120) {
                for (let i = 0; i < 10; i++) {
                    rainParticles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * (groundY - 10),
                        len: 12 + Math.random() * 14,
                        speed: 8 + Math.random() * 7
                    });
                }
            }
            for (let i = rainParticles.length - 1; i >= 0; i--) {
                const r = rainParticles[i];
                r.y += r.speed;
                if (r.y > groundY) rainParticles.splice(i, 1);
            }
        }

        function drawRain() {
            if (currentStage !== 2) return;
            ctx.strokeStyle = 'rgba(129, 212, 250, 0.5)';
            ctx.lineWidth = 2;
            for (let r of rainParticles) {
                ctx.beginPath();
                ctx.moveTo(r.x, r.y);
                ctx.lineTo(r.x, r.y + r.len);
                ctx.stroke();
            }
        }

        function updateGame() {
            player.vy += gravity;
            player.y += player.vy;

            if (player.y > groundY - player.height) {
                if (player.vy > 4) createDust(player.x + 22, groundY);
                player.y = groundY - player.height;
                player.vy = 0;
            }

            if (!gameOver && player.vy === 0 && frame % 4 === 0) {
                createDust(player.x + 10, groundY - 2);
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
            }

            const spawnDist = Math.max(210, 340 - gameSpeed * 11);
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - spawnDist) {
                spawnObstacle();
            }

            for (let o of obstacles) {
                if (checkCollision(player, o)) {
                    gameOver = true;
                    break;
                }
            }

            score += 0.26;
            updateStage();
            updateSpeed();
            updateParticles();
            updateRain();
        }

        function drawBackground() {
            const stage = currentStage;

            if (stage === 0) {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, '#3a7bd5');
                grad.addColorStop(0.4, '#5dade2');
                grad.addColorStop(1, '#d4e6f1');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#5d6d7e';
                ctx.fillRect(60, 55, 160, groundY - 55);
                ctx.fillRect(260, 35, 130, groundY - 35);
                ctx.fillRect(430, 70, 150, groundY - 70);
                ctx.fillRect(620, 25, 120, groundY - 25);
                ctx.fillRect(790, 50, 170, groundY - 50);
                ctx.fillRect(1010, 40, 150, groundY - 40);

                ctx.fillStyle = '#f7dc6f';
                for (let bx of [75, 280, 450, 640, 810, 1030]) {
                    for (let by = 80; by < groundY - 50; by += 35) {
                        ctx.fillRect(bx, by, 20, 22);
                        ctx.fillStyle = '#f4d03f';
                        ctx.fillRect(bx + 3, by + 3, 8, 8);
                        ctx.fillStyle = '#f7dc6f';
                    }
                }

                const sunGrad = ctx.createRadialGradient(1100, 55, 20, 1100, 55, 55);
                sunGrad.addColorStop(0, '#fef9e7');
                sunGrad.addColorStop(0.3, '#f7dc6f');
                sunGrad.addColorStop(1, '#f39c12');
                ctx.fillStyle = sunGrad;
                ctx.beginPath();
                ctx.arc(1100, 55, 48, 0, Math.PI * 2);
                ctx.fill();

            } else if (stage === 1) {
                ctx.fillStyle = '#0c1a2e';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(50, 50, 170, groundY - 50);
                ctx.fillRect(250, 30, 140, groundY - 30);
                ctx.fillRect(420, 65, 160, groundY - 65);
                ctx.fillRect(610, 22, 130, groundY - 22);
                ctx.fillRect(780, 45, 180, groundY - 45);
                ctx.fillRect(1000, 35, 160, groundY - 35);

                ctx.fillStyle = '#00f3ff';
                for (let bx of [70, 270, 440, 630, 800, 1020]) {
                    for (let by = 75; by < groundY - 45; by += 32) {
                        if (Math.random() > 0.4) ctx.fillRect(bx, by, 18, 20);
                    }
                }

                ctx.fillStyle = '#ff00aa';
                ctx.fillRect(500, 140, 90, 12);
                ctx.fillStyle = '#aa00ff';
                ctx.fillRect(850, 105, 65, 10);

            } else if (stage === 2) {
                ctx.fillStyle = '#1f2a44';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#34495e';
                ctx.fillRect(55, 48, 165, groundY - 48);
                ctx.fillRect(245, 32, 145, groundY - 32);
                ctx.fillRect(415, 68, 155, groundY - 68);
                ctx.fillRect(605, 20, 135, groundY - 20);
                ctx.fillRect(785, 48, 175, groundY - 48);
                ctx.fillRect(1005, 38, 155, groundY - 38);

            } else {
                ctx.fillStyle = '#0f1c2e';
                ctx.fillRect(0, 0, canvas.width, groundY);

                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(45, 22, 180, groundY - 22);
                ctx.fillRect(235, 10, 150, groundY - 10);
                ctx.fillRect(405, 35, 170, groundY - 35);
                ctx.fillRect(595, 8, 140, groundY - 8);
                ctx.fillRect(775, 28, 190, groundY - 28);
                ctx.fillRect(995, 18, 165, groundY - 18);

                ctx.fillStyle = '#1a252f';
                ctx.fillRect(45, 22, 180, 15);
                ctx.fillRect(235, 10, 150, 15);
                ctx.fillRect(405, 35, 170, 15);
            }
        }

        function drawGround() {
            const stage = currentStage;
            groundOffset = (groundOffset + gameSpeed) % 65;

            if (stage === 0) {
                ctx.fillStyle = '#5d6d7e';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#455a64';
                ctx.fillRect(0, groundY, canvas.width, 20);
            } else if (stage === 1) {
                ctx.fillStyle = '#1a252f';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#0f1c2e';
                ctx.fillRect(0, groundY, canvas.width, 20);
            } else if (stage === 2) {
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#1a252f';
                ctx.fillRect(0, groundY, canvas.width, 20);
            } else {
                ctx.fillStyle = '#1a252f';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#0f1c2e';
                ctx.fillRect(0, groundY, canvas.width, 20);
            }

            ctx.fillStyle = stage === 2 ? '#5d6d7e' : '#4a5568';
            for (let x = -groundOffset; x < canvas.width + 90; x += 18) {
                ctx.fillRect(x, groundY + 22, 3, 8);
            }

            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 5;
            for (let x = -groundOffset * 1.5; x < canvas.width; x += 110) {
                ctx.beginPath();
                ctx.moveTo(x, groundY + 35);
                ctx.lineTo(x + 60, groundY + 35);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);

            const isJumping = player.vy < -4.5;
            const runPhase = Math.sin(frame * 0.4) * (isJumping ? 0.5 : 1.3);

            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.beginPath();
            ctx.ellipse(24, 68, 26, 9, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2c3e50';
            const backLegX = 10 + runPhase * 4.5;
            ctx.fillRect(backLegX, 50, 11, 20);
            ctx.fillStyle = '#1a252f';
            ctx.fillRect(backLegX, 65, 11, 7);

            const frontLegX = 25 - runPhase * 4.5;
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(frontLegX, 50, 11, 20);
            ctx.fillStyle = '#1a252f';
            ctx.fillRect(frontLegX, 65, 11, 7);

            ctx.fillStyle = '#1a252f';
            ctx.fillRect(backLegX - 2, 68, 15, 5);
            ctx.fillRect(frontLegX - 2, 68, 15, 5);

            ctx.fillStyle = currentStage === 1 ? '#6c3483' : '#117a65';
            ctx.fillRect(7, 20, 35, 33);

            ctx.fillStyle = currentStage === 1 ? '#5b2c6f' : '#0e6655';
            ctx.beginPath();
            ctx.ellipse(24, 24, 19, 16, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#f5b041';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(16, 28);
            ctx.lineTo(20, 35);
            ctx.moveTo(32, 28);
            ctx.lineTo(28, 35);
            ctx.stroke();

            ctx.fillStyle = '#f5cba7';
            ctx.beginPath();
            ctx.arc(25, 20, 13, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1c2833';
            ctx.beginPath();
            ctx.ellipse(26, 13, 14, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(13, 11, 26, 6);

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(29, 19, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#1c2833';
            ctx.beginPath();
            ctx.arc(30, 19, 2.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1c2833';
            ctx.fillRect(37, 26, 10, 19);

            ctx.fillStyle = '#f5cba7';
            ctx.fillRect(40, 41, 11, 9);

            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(43, 33, 9, 17);
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(43, 33, 4, 17);
            ctx.fillStyle = '#1c2833';
            ctx.fillRect(44, 31, 7, 5);

            if (!isJumping && frame % 3 === 0) {
                ctx.fillStyle = 'rgba(241, 196, 15, 0.7)';
                ctx.fillRect(53, 38 + Math.sin(frame) * 3, 12, 4.5);
            }

            ctx.restore();
        }

        function drawObstacles() {
            for (let o of obstacles) {
                ctx.save();
                const carColor = o.color || '#c62828';

                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(o.x + 5, groundY - 3, o.width - 8, 6);

                if (o.type === 'sedan') {
                    ctx.fillStyle = carColor;
                    ctx.fillRect(o.x, o.y + 10, o.width, o.height - 14);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(o.x + 15, o.y + 2, o.width - 30, 12);
                    
                    ctx.fillStyle = '#5dade2';
                    ctx.fillRect(o.x + 17, o.y + 4, o.width - 34, 8);
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(o.x + 17, o.y + 4, o.width * 0.3, 3);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.beginPath();
                    ctx.arc(o.x + 16, o.y + o.height - 3, 9, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#5d6d7e';
                    ctx.beginPath();
                    ctx.arc(o.x + 16, o.y + o.height - 3, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 16, o.y + o.height - 3, 9, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#5d6d7e';
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 16, o.y + o.height - 3, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#f7dc6f';
                    ctx.fillRect(o.x + o.width - 10, o.y + 14, 8, 6);

                } else if (o.type === 'van') {
                    ctx.fillStyle = carColor;
                    ctx.fillRect(o.x, o.y + 6, o.width, o.height - 9);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(o.x + 12, o.y, o.width - 24, 10);
                    
                    ctx.fillStyle = '#5dade2';
                    ctx.fillRect(o.x + 14, o.y + 2, o.width - 28, 7);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.beginPath();
                    ctx.arc(o.x + 18, o.y + o.height - 2, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#5d6d7e';
                    ctx.beginPath();
                    ctx.arc(o.x + 18, o.y + o.height - 2, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 18, o.y + o.height - 2, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#5d6d7e';
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 18, o.y + o.height - 2, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#f7dc6f';
                    ctx.fillRect(o.x + o.width - 11, o.y + 12, 9, 7);

                } else if (o.type === 'truck') {
                    ctx.fillStyle = '#455a64';
                    ctx.fillRect(o.x, o.y + 12, o.width, o.height - 15);
                    
                    ctx.fillStyle = carColor;
                    ctx.fillRect(o.x + o.width * 0.52, o.y + 6, o.width * 0.48, o.height - 10);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.beginPath();
                    ctx.arc(o.x + 20, o.y + o.height - 2, 11, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#5d6d7e';
                    ctx.beginPath();
                    ctx.arc(o.x + 20, o.y + o.height - 2, 7, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 20, o.y + o.height - 2, 11, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#5d6d7e';
                    ctx.beginPath();
                    ctx.arc(o.x + o.width - 20, o.y + o.height - 2, 7, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#f7dc6f';
                    ctx.fillRect(o.x + o.width - 12, o.y + 16, 10, 7);
                }

                ctx.restore();
            }
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 30px "Segoe UI", Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Pontos: ' + Math.floor(score), 28, 45);

            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 22px "Segoe UI", Arial';
            ctx.fillText('🏆 Recorde: ' + highScore, 28, 72);

            ctx.fillStyle = '#00e5ff';
            ctx.font = '17px Arial';
            ctx.fillText('Velocidade: ' + gameSpeed.toFixed(1), 28, 95);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(300, 125, 680, 280);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 8;
            ctx.strokeRect(300, 125, 680, 280);

            ctx.fillStyle = '#c0392b';
            ctx.font = 'bold 56px "Segoe UI", Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 640, 195);

            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 30px "Segoe UI", Arial';
            ctx.fillText('Sua pontuação: ' + Math.floor(score), 640, 250);

            const final = Math.floor(score);
            if (final > highScore) {
                highScore = final;
                localStorage.setItem('pichadorRealistaHighScore', highScore);
                ctx.fillStyle = '#e67e22';
                ctx.font = 'bold 26px "Segoe UI", Arial';
                ctx.fillText('🎉 NOVO RECORDE! 🎉', 640, 295);
            } else {
                ctx.fillStyle = '#e67e22';
                ctx.font = 'bold 24px "Segoe UI", Arial';
                ctx.fillText('Recorde atual: ' + highScore, 640, 295);
            }

            ctx.fillStyle = '#1e8449';
            ctx.font = 'bold 22px "Segoe UI", Arial';
            ctx.fillText('Pressione ESPAÇO para jogar novamente', 640, 345);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawGround();
            drawRain();

            if (!gameOver) {
                updateGame();
            }

            drawObstacles();
            drawPlayer();
            drawParticles();
            drawHUD();

            if (gameOver) {
                drawGameOver();
            }

            if (!gameOver) frame++;
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Spacebar' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                } else if (player.y >= groundY - player.height - 5) {
                    player.vy = jumpForce;
                }
            }
            if ((e.key === 'r' || e.key === 'R') && gameOver) resetGame();
        });

        function handleJump() {
            if (gameOver) {
                resetGame();
            } else if (player.y >= groundY - player.height - 5) {
                player.vy = jumpForce;
            }
        }

        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleJump();
        });

        function startGame() {
            resetGame();
            setTimeout(() => { if (!gameOver && obstacles.length === 0) spawnObstacle(); }, 650);
            setTimeout(() => { if (!gameOver && obstacles.length < 2) spawnObstacle(); }, 1450);
            gameLoop();
        }

        startGame();
        canvas.setAttribute('tabindex', '1');
        canvas.focus();
    </script>
</body>
</html>
