<!DOCTYPE html>
<html lang="pt-BR">

            box-sizing: border-box;

            background-color: #0b0c10;
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {

        }

            position: absolute;
            top: 15px;
            color: #fff;
            text-align: center;
            font-size: 14px;

            background: rgba(0, 0, 0, 0.75);
            padding: 12px 25px;
            border-radius: 8px;
            border: 2px solid #333;
            line-height: 1.5;
        }
        .destaque { color: #f1c40f; font-weight: bold; }
    </style>
</head>
