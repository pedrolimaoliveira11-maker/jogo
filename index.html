<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Máquina de Prêmios</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        /* Estilo do botão que parece uma alavanca/painel */
        .caixa-jogo {
            background-color: #333;
            border: 5px solid #ffcc00;
            border-radius: 15px;
            display: inline-block;
            padding: 30px;
            box-shadow: 0px 0px 20px #ffcc00;
        }
        .botao-alavanca {
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 8px #990000;
            transition: 0.1s;
        }
        /* Efeito de clique (botão afundando) */
        .botao-alavanca:active {
            box-shadow: 0px 2px #990000;
            transform: translateY(6px);
        }
        #resultado {
            font-size: 24px;
            margin-top: 20px;
            color: #ffcc00;
            height: 30px;
        }
    </style>
</head>
<body>

    <div class="caixa-jogo">
        <h1>Sorteio da Sorte!</h1>
        <p>Clique no botão para girar a alavanca</p>
        
        <button class="botao-alavanca" onclick="puxarAlavanca()">Puxar Alavanca! 🕹️</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        // Lista de prêmios do seu jogo
        const premios = [
            "💎 100 Diamantes!",
            "⚔️ Espada Lendária",
            "🛡️ Escudo de Bronze",
            "💥 Super Poder por 1 minuto",
            "❌ Tente Novamente!"
        ];

        function puxarAlavanca() {
            const displayResultado = document.getElementById("resultado");
            
            // Efeito de "carregando/girando"
            displayResultado.innerText = "Girando... 🎰";
            
            // Espera 1 segundo para dar suspense e mostra o resultado
            setTimeout(() => {
                const numeroAleatorio = Math.floor(Math.random() * premios.length);
                const premioGanho = premios[numeroAleatorio];
                displayResultado.innerText = premioGanho;
            }, 1000);
        }
    </script>

</body>
</html>
