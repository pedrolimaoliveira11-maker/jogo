<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Manecraft 2D - Com Personagem</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        body {
            font-family: 'Press Start 2P', Arial, sans-serif;
            background: linear-gradient(#1a1a2e, #16213e);
            color: #fff;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        
        h1 { color: #4ade80; text-shadow: 3px 3px #000; font-size: 2rem; margin: 10px 0 5px; }
        .version { background: #854d0e; color: #fed7aa; padding: 3px 12px; border-radius: 20px; font-size: 0.65rem; display: inline-block; margin-bottom: 10px; }
        #game-container { display: inline-block; background: #0f172a; padding: 12px; border: 6px solid #334155; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        canvas { border: 4px solid #1e2937; background: #5dade2; image-rendering: pixelated; cursor: crosshair; }
        #hotbar { display: flex; justify-content: center; gap: 6px; margin-top: 12px; padding: 8px; background: #1e2937; border: 4px solid #334155; border-radius: 6px; }
        .hotbar-slot { width: 58px; height: 58px; border: 3px solid #475569; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 8px; }
        .hotbar-slot.selected { border-color: #fbbf24; box-shadow: 0 0 10px #fbbf24; transform: scale(1.05); }
        .controls-info { margin-top: 12px; font-size: 0.7rem; color: #94a3b8; line-height: 1.4; }
        button { font-family: 'Press Start 2P', Arial, sans-serif; background: #334155; color: #fff; border: 3px solid #475569; padding: 8px 14px; font-size: 0.7rem; cursor: pointer; margin: 4px; }
        button:hover { background: #475569; }
        .footer { margin-top: 15px; font-size: 0.65rem; color: #64748b; }
    </style>
</head>
<body>
    <h1>MINI MANECRAFT 2D</h1>
    <div class="version">v4 - Personagem Controlável</div>
    
    <div id="game-container">
        <canvas id="game" width="800" height="592"></canvas>
        <div id="hotbar"></div>
    </div>
    
    <div class="controls-info">
        <strong>Movimento:</strong> WASD ou Setas &nbsp;|&nbsp; 
        <strong>Quebrar:</strong> Clique Esquerdo &nbsp;|&nbsp; 
        <strong>Colocar:</strong> Clique Direito<br>
        <strong>G</strong> = Gerar novo mundo
    </div>
    
    <div>
        <button onclick="generateWorld(); draw();">🌍 Novo Mundo</button>
        <button onclick="saveWorld()">💾 Salvar</button>
        <button onclick="loadWorld()">📂 Carregar</button>
        <button onclick="resetPlayer()">🔄 Resetar Personagem</button>
    </div>
    
    <div class="footer">Jogo 2D com personagem controlável • Perlin Noise + Colisão</div>

    <script>
        const COLS = 50;
        const ROWS = 37;
        const BLOCK_SIZE = 16;
        
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let world = [];
        let currentBlock = 1;
        let mouseX = 0, mouseY = 0;
        
        let player = {
            gridX: Math.floor(COLS / 2),
            gridY: Math.floor(ROWS / 2)
        };
        
        class PerlinNoise {
            constructor(seed = Date.now()) {
                this.seed = seed;
                this.permutation = new Array(512);
                this.init();
            }
            init() {
                const p = [];
                for (let i = 0; i < 256; i++) p[i] = i;
                let n = this.seed;
                for (let i = 255; i > 0; i--) {
                    n = (n * 16807) % 2147483647;
                    const j = Math.floor((n / 2147483647) * (i + 1));
                    [p[i], p[j]] = [p[j], p[i]];
                }
                for (let i = 0; i < 256; i++) {
                    this.permutation[i] = p[i];
                    this.permutation[i + 256] = p[i];
                }
            }
            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            lerp(t, a, b) { return a + t * (b - a); }
            grad(hash, x) {
                const h = hash & 15;
                return ((h & 8 ? -1 : 1) * (1 + (h & 7))) * x;
            }
            noise(x) {
                const X = Math.floor(x) & 255;
                x -= Math.floor(x);
                const u = this.fade(x);
                const a = this.permutation[X];
                const b = this.permutation[X + 1];
                return this.lerp(u, this.grad(a, x), this.grad(b, x - 1)) / 2 + 0.5;
            }
            octaveNoise(x, octaves = 5, persistence = 0.5) {
                let total = 0, freq = 1, amp = 1, max = 0;
                for (let i = 0; i < octaves; i++) {
                    total += this.noise(x * freq) * amp;
                    max += amp;
                    amp *= persistence;
                    freq *= 2;
                }
                return total / max;
            }
        }
        
        let perlin = new PerlinNoise();
        
        function initWorld() {
            world = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        }
        
        function generateWorld() {
            initWorld();
            perlin = new PerlinNoise(Date.now());
            const base = ROWS - 13;
            
            for (let x = 0; x < COLS; x++) {
                const noiseVal = perlin.octaveNoise(x * 0.034, 5, 0.52);
                let h = Math.floor(base + (noiseVal - 0.5) * 17);
                if (h < 4) h = 4;
                if (h > ROWS - 3) h = ROWS - 3;
                
                for (let y = h; y < ROWS; y++) {
                    if (y === h) world[y][x] = 2;
                    else if (y < h + 5) world[y][x] = 1;
                    else world[y][x] = 3;
                }
                
                if (Math.random() < 0.1 && h > 5) {
                    const th = 3 + Math.floor(Math.random() * 2);
                    for (let t = 1; t <= th; t++) {
                        if (h - t >= 0) world[h - t][x] = 4;
                    }
                    const ly = h - th - 1;
                    if (ly >= 0) {
                        for (let lx = x-2; lx <= x+2; lx++) {
                            if (lx >= 0 && lx < COLS) {
                                if (ly >= 0) world[ly][lx] = 5;
                                if (ly-1 >= 0 && Math.abs(lx-x) <= 1) world[ly-1][lx] = 5;
                            }
                        }
                    }
                }
            }
            resetPlayerPosition();
        }
        
        function resetPlayerPosition() {
            for (let y = 5; y < ROWS - 3; y++) {
                for (let x = 5; x < COLS - 5; x++) {
                    if (world[y][x] === 0 && world[y+1][x] > 0) {
                        player.gridX = x;
                        player.gridY = y;
                        return;
                    }
                }
            }
            player.gridX = Math.floor(COLS / 2);
            player.gridY = 8;
        }
        
        function resetPlayer() {
            resetPlayerPosition();
            draw();
        }
        
        function canMoveTo(nx, ny) {
            if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;
            return world[ny][nx] === 0;
        }
        
        function movePlayer(dx, dy) {
            const newX = player.gridX + dx;
            const newY = player.gridY + dy;
            if (canMoveTo(newX, newY)) {
                player.gridX = newX;
                player.gridY = newY;
                draw();
            }
        }
        
        function draw() {
            ctx.fillStyle = '#5dade2';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const b = world[y][x];
                    if (b > 0) {
                        const px = x * BLOCK_SIZE;
                        const py = y * BLOCK_SIZE;
                        ctx.fillStyle = (b === 1) ? '#8B4513' : (b === 2) ? '#228B22' : (b === 3) ? '#696969' : (b === 4) ? '#D2691E' : '#32CD32';
                        ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                        ctx.strokeRect(px + 0.5, py + 0.5, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    }
                }
            }
            
            // Player
            const px = player.gridX * BLOCK_SIZE;
            const py = player.gridY * BLOCK_SIZE;
            
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(px + 2, py + BLOCK_SIZE - 2, BLOCK_SIZE - 4, 4);
            
            ctx.fillStyle = '#f5cba7';
            ctx.fillRect(px + 4, py + 2, 8, 8);
            ctx.strokeStyle = '#000';
            ctx.strokeRect(px + 4, py + 2, 8, 8);
            
            ctx.fillStyle = '#000';
            ctx.fillRect(px + 6, py + 4, 2, 2);
            ctx.fillRect(px + 10, py + 4, 2, 2);
            
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(px + 3, py + 10, 10, 8);
            
            ctx.fillStyle = '#f5cba7';
            ctx.fillRect(px, py + 10, 3, 7);
            ctx.fillRect(px + 13, py + 10, 3, 7);
            
            ctx.fillStyle = '#1e40af';
            ctx.fillRect(px + 4, py + 18, 3, 6);
            ctx.fillRect(px + 9, py + 18, 3, 6);
            
            // Mouse highlight
            const gx = Math.floor(mouseX / BLOCK_SIZE);
            const gy = Math.floor(mouseY / BLOCK_SIZE);
            if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 2;
                ctx.strokeRect(gx * BLOCK_SIZE + 1, gy * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            }
        }
        
        function createHotbar() {
            const hotbar = document.getElementById('hotbar');
            hotbar.innerHTML = '';
            const blocks = [
                {id:1, name:'Terra', color:'#8B4513'},
                {id:2, name:'Grama', color:'#228B22'},
                {id:3, name:'Pedra', color:'#696969'},
                {id:4, name:'Madeira', color:'#D2691E'},
                {id:5, name:'Folhas', color:'#32CD32'}
            ];
            blocks.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = 'hotbar-slot';
                div.style.backgroundColor = b.color;
                if (i === 0) div.classList.add('selected');
                div.innerHTML = `<div style="color:white;font-size:8px;text-shadow:1px 1px black;">${b.name}<br><span style="font-size:7px;">${i+1}</span></div>`;
                div.onclick = () => {
                    currentBlock = b.id;
                    document.querySelectorAll('.hotbar-slot').forEach(d => d.classList.remove('selected'));
                    div.classList.add('selected');
                };
                hotbar.appendChild(div);
            });
        }
        
        function setupMouse() {
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                mouseY = e.clientY - rect.top;
                draw();
            });
            
            canvas.addEventListener('mousedown', e => {
                const rect = canvas.getBoundingClientRect();
                const gx = Math.floor((e.clientX - rect.left) / BLOCK_SIZE);
                const gy = Math.floor((e.clientY - rect.top) / BLOCK_SIZE);
                if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return;
                
                if (e.button === 0 && world[gy][gx] > 0) {
                    world[gy][gx] = 0;
                    draw();
                }
                if (e.button === 2 && world[gy][gx] === 0) {
                    world[gy][gx] = currentBlock;
                    draw();
                }
            });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }
        
        function setupKeyboard() {
            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') movePlayer(0, -1);
                if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') movePlayer(0, 1);
                if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') movePlayer(-1, 0);
                if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') movePlayer(1, 0);
                if (e.key.toLowerCase() === 'g') { generateWorld(); draw(); }
                if (e.key >= '1' && e.key <= '5') {
                    currentBlock = parseInt(e.key);
                    document.querySelectorAll('.hotbar-slot').forEach((d,i) => d.classList.toggle('selected', i+1 === currentBlock));
                }
            });
            
            // Auto movement while holding
            let keys = {};
            document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            
            setInterval(() => {
                if (keys['w'] || keys['arrowup']) movePlayer(0, -1);
                if (keys['s'] || keys['arrowdown']) movePlayer(0, 1);
                if (keys['a'] || keys['arrowleft']) movePlayer(-1, 0);
                if (keys['d'] || keys['arrowright']) movePlayer(1, 0);
            }, 110);
        }
        
        function saveWorld() {
            try {
                localStorage.setItem('miniManecraft2DPlayer', JSON.stringify({world, player}));
                alert('✅ Mundo salvo!');
            } catch(e){}
        }
        
        function loadWorld() {
            try {
                const data = JSON.parse(localStorage.getItem('miniManecraft2DPlayer'));
                if (data) {
                    world = data.world;
                    if (data.player) player = data.player;
                    draw();
                    alert('✅ Mundo carregado!');
                }
            } catch(e){}
        }
        
        function initGame() {
            initWorld();
            generateWorld();
            createHotbar();
            setupMouse();
            setupKeyboard();
            draw();
            
            setTimeout(() => {
                const msg = document.createElement('div');
                msg.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#166534;color:#86efac;padding:8px 16px;border-radius:6px;font-size:0.75rem;';
                msg.textContent = 'Use WASD ou setas para mover o personagem!';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2800);
            }, 1200);
        }
        
        window.onload = initGame;
    </script>
</body>
</html>
