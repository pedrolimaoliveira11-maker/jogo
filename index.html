<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Guerra 6DoF</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }
        #controles {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>Painel de Controle</h2>
        <p>Unidade Atual: <strong id="unidade-ativa" style="color: #00ff00;">Soldado</strong></p>
        <hr>
        <div id="controles">
            <strong>Mudar de Unidade:</strong><br>
            [1] Soldado | [2] Tanque | [3] Avião<br><br>
            <strong>Movimentação:</strong><br>
            W, A, S, D - Mover / Rotacionar<br>
            Espaço / Shift - Subir / Descer (Avião - 6DoF)
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO INICIAL DO CENÁRIO ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x334422); // Cor de fundo (campo)
        scene.fog = new THREE.FogExp2(0x334422, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Iluminação
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Chão (Campo de Batalha)
        const floorGeo = new THREE.PlaneGeometry(500, 500);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x556b2f });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- VARIÁVEIS DE JOGO ---
        let tipoUnidade = 'soldado'; // soldado, tanque, aviao
        const teclado = {};
        const unidadesAliadas = {};
        const unidadesInimigas = [];

        // --- CRIAÇÃO MODELOS 3D BÁSICOS (GEOMETRIAS) ---

        // 1. Soldado (Cápsula/Cilindro)
        function criarSoldado(cor) {
            const grupo = new THREE.Group();
            const corpo = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.8), new THREE.MeshStandardMaterial({ color: cor }));
            corpo.position.y = 0.9;
            corpo.castShadow = true;
            grupo.add(corpo);
            
            // Indicador de direção (arma)
            const arma = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({ color: 0x111 }));
            arma.position.set(0, 1.2, 0.5);
            grupo.add(arma);
            return grupo;
        }

        // 2. Tanque (Caixas e Cilindro)
        function criarTanque(cor) {
            const grupo = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 3), new THREE.MeshStandardMaterial({ color: cor }));
            base.position.y = 0.5;
            base.castShadow = true;
            grupo.add(base);

            const torre = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 1.5), new THREE.MeshStandardMaterial({ color: cor - 0x111111 }));
            torre.position.set(0, 1.3, -0.2);
            grupo.add(torre);

            const canhao = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 2), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            canhao.rotation.x = Math.PI / 2;
            canhao.position.set(0, 1.3, 1);
            grupo.add(canhao);
            return grupo;
        }

        // 3. Avião (Cruz/Asas)
        function criarAviao(cor) {
            const grupo = new THREE.Group();
            const corpo = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.2, 3), new THREE.MeshStandardMaterial({ color: cor }));
            corpo.rotation.x = Math.PI / 2;
            grupo.add(corpo);

            const asas = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 1), new THREE.MeshStandardMaterial({ color: cor }));
            asas.position.set(0, 0, 0.2);
            grupo.add(asas);

            const cauda = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 0.1), new THREE.MeshStandardMaterial({ color: cor }));
            cauda.position.set(0, 0.3, -1.3);
            grupo.add(cauda);
            return grupo;
        }

        // --- INICIALIZAR UNIDADES NO MAPA ---

        // Aliados Jogáveis
        unidadesAliadas.soldado = criarSoldado(0x2e8b57); // Verde Marinho
        unidadesAliadas.tanque = criarTanque(0x556b2f);   // Verde Oliva
        unidadesAliadas.aviao = criarAviao(0x4682b4);     // Azul Aço

        // Posicionamento inicial dos aliados
        unidadesAliadas.soldado.position.set(-10, 0, 0);
        unidadesAliadas.tanque.position.set(0, 0, 0);
        unidadesAliadas.aviao.position.set(10, 15, 0);

        scene.add(unidadesAliadas.soldado);
        scene.add(unidadesAliadas.tanque);
        scene.add(unidadesAliadas.aviao);

        // Criar Inimigos (Vermelhos)
        const configsInimigos = [
            { tipo: 'soldado', pos: [-15, 0, -30] },
            { tipo: 'soldado', pos: [15, 0, -35] },
            { tipo: 'tanque', pos: [0, 0, -50] },
            { tipo: 'aviao', pos: [0, 20, -60] }
        ];

        configsInimigos.forEach(cfg => {
            let inimigo;
            if (cfg.tipo === 'soldado') inimigo = criarSoldado(0x8b0000);
            if (cfg.tipo === 'tanque') inimigo = criarTanque(0x5c0000);
            if (cfg.tipo === 'aviao') inimigo = criarAviao(0x800000);
            
            inimigo.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
            // Girar inimigos de frente para o jogador
            inimigo.rotation.y = Math.PI;
            scene.add(inimigo);
            unidadesInimigas.push(inimigo);
        });

        // --- SISTEMA DE ENTRADA (TECLADO) ---
        window.addEventListener('keydown', (e) => {
            teclado[e.key.toLowerCase()] = true;
            
            // Troca de personagens pelas teclas 1, 2 e 3
            if (e.key === '1') { tipoUnidade = 'soldado'; atualizarUI('Soldado'); }
            if (e.key === '2') { tipoUnidade = 'tanque'; atualizarUI('Tanque'); }
            if (e.key === '3') { tipoUnidade = 'aviao'; atualizarUI('Avião (6DoF)'); }
        });
        window.addEventListener('keyup', (e) => { teclado[e.key.toLowerCase()] = false; });

        function atualizarUI(nome) {
            document.getElementById('unidade-ativa').innerText = nome;
        }

        // --- LÓGICA DE MOVIMENTAÇÃO E FÍSICA (6DoF) ---
        const clock = new THREE.Clock();

        function atualizarMovimento(delta) {
            const atual = unidadesAliadas[tipoUnidade];

            if (tipoUnidade === 'soldado') {
                // Controle padrão terrestre (3D clássico)
                const vel = 8 * delta;
                const rotVel = 3 * delta;
                if (teclado['w']) atual.translateZ(vel);
                if (teclado['s']) atual.translateZ(-vel);
                if (teclado['a']) atual.rotation.y += rotVel;
                if (teclado['d']) atual.rotation.y -= rotVel;
                // Prender no chão
                atual.position.y = 0;
            } 
            
            else if (tipoUnidade === 'tanque') {
                // Controle de tanque pesado
                const vel = 5 * delta;
                const rotVel = 1.5 * delta;
                if (teclado['w']) atual.translateZ(vel);
                if (teclado['s']) atual.translateZ(-vel);
                if (teclado['a']) atual.rotation.y += rotVel;
                if (teclado['d']) node = atual.rotation.y -= rotVel;
                atual.position.y = 0;
            } 
            
            else if (tipoUnidade === 'aviao') {
                // Mecânica Simulada de 6 Graus de Liberdade (6DoF)
                const velVoo = 15 * delta;
                const velRot = 2 * delta;

                // Propulsão constante para frente
                atual.translateZ(velVoo);

                // Controles de Arfagem (Pitch - Inclinar para cima/baixo)
                if (teclado['w']) atual.rotateX(velRot);
                if (teclado['s']) atual.rotateX(-velRot);

                // Controles de Rolamento (Roll - Inclinar asas)
                if (teclado['a']) atual.rotateZ(velRot);
                if (teclado['d']) atual.rotateZ(-velRot);

                // Controles de Guinada / Altitude extra (Yaw/Heave)
                if (teclado[' ']) atual.position.y += velVoo * 0.5; // Espaço sobre
                if (teclado['shift']) atual.position.y -= velVoo * 0.5; // Shift desce

                // Evitar que o avião atravesse o chão
                if (atual.position.y < 1) atual.position.y = 1;
            }

            // --- CÂMERA SEGUINDO A UNIDADE ATIVA ---
            const offset = new THREE.Vector3(0, 5, -12); // Posição atrás e acima do veículo
            offset.applyQuaternion(atual.quaternion);
            camera.position.copy(atual.position).add(offset);
            camera.lookAt(atual.position.clone().add(new THREE.Vector3(0, 1, 0)));
        }

        // --- Loop Principal de Renderização ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            atualizarMovimento(delta);

            // Pequena animação de flutuação para os inimigos aéreos
            unidadesInimigas.forEach((inimigo, index) => {
                if(index === 3) { // O avião inimigo
                    inimigo.position.y = 20 + Math.sin(clock.getElapsedTime() + index) * 2;
                }
            });

            renderer.render(scene, camera);
        }

        // Ajustar tela caso mude o tamanho do navegador
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Iniciar o jogo
        animate();
    </script>
</body>
</html>
