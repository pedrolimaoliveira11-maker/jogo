<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Paulo Obstacle Runner - Direto para o Jogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Impede que o clique duplo selecione textos na tela */
            user-select: none; 
        }

        /* ÁREA PRINCIPAL DO JOGO */
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            /* Foto de fundo do São Paulo FC (Estádio do MorumBIS) */
            background-image: url('https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?q=80&w=800&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            cursor: pointer; /* Transforma o mouse em uma mãozinha indicando clique */
        }

        /* ELEMENTOS DO JOGO */
        #player {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 50px;
            height: 60px;
            background-color: #FF0000; /* Cor Inicial: Vermelho */
            border: 3px solid #FFF;
            border-radius: 5px;
        }

        #obstacle {
            position: absolute;
            bottom: 0;
            right: -40px;
            width: 30px;
            height: 50px;
            background-color: #000000;
            border: 2px solid #FFF;
            border-radius: 3px;
        }
