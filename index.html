<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Paulo Obstacle Runner - Completo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Impede que o clique duplo selecione textos na tela */
            user-select: none; 
        }

        /* ÁREA PRINCIPAL DO JOGO */
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            /* Foto de fundo do São Paulo FC (Estádio do MorumBIS) */
            background-image: url('https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?q=80&w=800&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            cursor: pointer; /* Transforma o mouse em uma mãozinha indicando clique */
        }

        /* TELA DE LOGIN (Fica por cima de tudo no início) */
        #login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            transition: all 0.5s ease;
            cursor: default;
        }

        .login-box {
            background: white;
            color: black;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            border-top: 6px solid #FF0000;
            border-bottom: 6px solid #000000;
            max-width: 350px;
            width: 90%;
        }

        .login-box h1 {
            margin-bottom: 10px;
            font-size: 26px;
            font-weight: bold;
        }

        .login-box p {
            color: #555;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* BOTÃO DO GOOGLE CORRIGIDO */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #4285F4;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .google-btn:hover {
            background: #357AE8;
        }

        .google-icon {
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4285F4;
            font-size: 15px;
        }

        /* ELEMENTOS DO JOGO */
        #player {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 50px;
            height: 60px;
            background-color: #FF0000; /* Cor Inicial: Vermelho */
            border: 3px solid #FFF;
            border-radius: 5px;
        }

        #obstacle {
            position: absolute;
            bottom: 0;
            right: -40px;
            width: 30px;
            height: 50px;
            background-color: #000000;
            border: 2px solid #FFF;
            border-radius: 3px;
        }

        /* PLACAR E ALERTAS */
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }

        #power-status {
            background: rgba(255, 0, 0, 0.85);
            padding: 6px 18px;
            border-radius: 20px;
            border: 2px solid #fff;
            font-size: 16px;
            display: none;
            animation: piscar 0.5s infinite alternate;
        }

        @keyframes piscar {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        /* TELA DE GAME OVER */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
            z-index: 50;
            cursor: default;
        }

        #game-over h2 {
            font-size: 45px;
            color: #FF0000;
            margin-bottom: 10px;
            text-shadow: 2px 2px 5px #000;
        }

        #game-over p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        #game-over button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: #FF0000;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            transition: 0.2s;
        }

        #game-over button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="login-screen">
            <div class="login-box">
                <h1>São Paulo Runner</h1>
                <p>Faça login com sua conta Google para entrar no jogo</p>
                <button class="google-btn" id="btn-login">
                    <div class="google-icon">G</div>
                    Entrar com o Google
                </button>
            </div>
        </div>

        <div id="ui-layer">
            <div id="score-display">Pontos: 0</div>
            <div id="power-status">⚡ SUPER PODER ATIVADO!</div>
        </div>
        
        <div id="player" style="bottom: 0px;"></div>
        <div id="obstacle"></div>
