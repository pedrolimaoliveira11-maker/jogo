<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Luta 2D - 2 Jogadores</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 800px;
            height: 450px;
        }
        canvas {
            background: linear-gradient(to bottom, #2c3e50, #000);
            border: 4px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .interface {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .barra-vida-container {
            width: 300px;
            height: 25px;
            background-color: #555;
            border: 2px solid #fff;
            border-radius: 5px;
            overflow: hidden;
        }
        .vida {
            height: 100%;
            background-color: #00ff00;
            width: 100%;
            transition: width 0.1s ease;
        }
        #vida-p2 {
            float: right;
        }
        .nome-player {
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }
        #p2-info {
            text-align: right;
        }
        #tela-fim {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            border-radius: 4px;
        }
        #btn-reiniciar {
            margin-top: 20px;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #btn-reiniciar:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="interface">
            <div id="p1-info">
                <div class="nome-player">JOGADOR 1 (A,D,W + Espaço)</div>
                <div class="barra-vida-container">
                    <div id="vida-p1" class="vida"></div>
                </div>
            </div>
            <div id="p2-info">
                <div class="nome-player">JOGADOR 2 (Setas + Enter)</div>
                <div class="barra-vida-container">
                    <div id="vida-p2" class="vida"></div>
                </div>
            </div>
        </div>

        <div id="tela-fim">
            <span id="texto-vencedor">JOGADOR X VENCEU!</span>
            <button id="btn-reiniciar" onclick="reiniciarJogo()">Jogar Novamente</button>
        </div>

        <canvas id="jogoCanvas" width="800" height="450"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('jogoCanvas');
        const ctx = canvas.getContext('2d');

        // Configurações Globais
        const gravidade = 0.6;
        const chaoY = canvas.height - 40;
        let jogoAtivo = true;

        // Registro de Teclas pressionadas
        const teclas = {};

        // Classe que gerencia os Lutadores
        class Lutador {
            constructor({ x, y, cor, lado }) {
                this.x = x;
                this.y = y;
                this.width = 50;
                this.height = 100;
                this.cor = cor;
                this.lado = lado; // 'esquerda' ou 'direita'
                
                this.velocidadeX = 0;
                this.velocidadeY = 0;
                this.estaNoChao = false;
                this.vida = 100;

                // Caixa de Ataque (Soco)
                this.estaAtacando = false;
                this.tempoAtaque = 0;
                this.caixaAtaque = {
                    width: 60,
                    height: 40
                };
            }

            desenhar() {
                // Desenhar Personagem Principal
                ctx.fillStyle = this.cor;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // Desenhar Cabeça/Olhos para dar direção
                ctx.fillStyle = '#fff';
                let olhoX = this.lado === 'direita' ? this.x + 35 : this.x + 5;
                ctx.fillRect(olhoX, this.y + 15, 10, 10);

                // Desenhar soco se estiver atacando
                if (this.estaAtacando) {
                    ctx.fillStyle = '#f39c12';
                    let ataqueX = this.lado === 'direita' ? this.x + this.width : this.x - this.caixaAtaque.width;
                    ctx.fillRect(ataqueX, this.y + 20, this.caixaAtaque.width, this.caixaAtaque.height);
                }
            }

            atualizar() {
                // Aplicar Gravidade
                this.velocidadeY += gravidade;
                this.y += this.velocidadeY;
                this.x += this.velocidadeX;

                // Colisão com o Chão
                if (this.y + this.height >= chaoY) {
                    this.y = chaoY - this.height;
                    this.velocidadeY = 0;
                    this.estaNoChao = true;
                } else {
                    this.estaNoChao = false;
                }

                // Limites das Paredes Laterais
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

                // Gerenciar tempo de duração do golpe
                if (this.estaAtacando) {
                    this.tempoAtaque--;
                    if (this.tempoAtaque <= 0) {
                        this.estaAtacando = false;
                    }
                }
            }

            atacar() {
                if (!this.estaAtacando) {
                    this.estaAtacando = true;
                    this.tempoAtaque = 10; // Duração do golpe em frames
                    return true;
                }
                return false;
            }
        }

        // Criando instâncias dos jogadores
        const p1 = new Lutador({ x: 150, y: 200, cor: '#3498db', lado: 'direita' });
        const p2 = new Lutador({ x: 600, y: 200, cor: '#e74c3c', lado: 'esquerda' });

        // Ouvintes do teclado
        window.addEventListener('keydown', (e) => {
            teclas[e.code] = true;
            
            // Eventos de clique único (Ataque e Pulo)
            if (e.code === 'Space' && jogoAtivo) {
                if(p1.atacar()) checarAcerto(p1, p2);
            }
            if (e.code === 'Enter' && jogoAtivo) {
                if(p2.atacar()) checarAcerto(p2, p1);
            }
            if (e.code === 'KeyW' && p1.estaNoChao && jogoAtivo) {
                p1.velocidadeY = -14;
            }
            if (e.code === 'ArrowUp' && p2.estaNoChao && jogoAtivo) {
                p2.velocidadeY = -14;
            }
        });

        window.addEventListener('keyup', (e) => {
            teclas[e.code] = false;
        });

        // Processar movimentação contínua
        function processarEntradas() {
            if (!jogoAtivo) return;

            // Movimento Jogador 1
            p1.velocidadeX = 0;
            if (teclas['KeyA']) { p1.velocidadeX = -6; p1.lado = 'esquerda'; }
            if (teclas['KeyD']) { p1.velocidadeX = 6; p1.lado = 'direita'; }

            // Movimento Jogador 2
            p2.velocidadeX = 0;
            if (teclas['ArrowLeft']) { p2.velocidadeX = -6; p2.lado = 'esquerda'; }
            if (teclas['ArrowRight']) { p2.velocidadeX = 6; p2.lado = 'direita'; }
        }
