<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Pichador - Estilo Subway Surfers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #0a1628, #162033);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        h1 {
            color: #00e5ff;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.7);
            margin-bottom: 4px;
            font-size: 2em;
        }
        
        .instructions {
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 14px;
            border-radius: 10px;
            margin-bottom: 4px;
            color: #b0bec5;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        
        #game {
            width: 90vw;
            max-width: 1280px;
            height: auto;
            border: 10px solid #00e5ff;
            border-radius: 16px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8);
            background: #fff;
            cursor: pointer;
            display: block;
        }
        
        .stage-info {
            margin-top: 4px;
            font-size: 1em;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
        }
        
        .footer {
            margin-top: 4px;
            color: #78909c;
            font-size: 0.78em;
        }
    </style>
</head>
<body>
    <h1>🎨 Pichador - Estilo Subway Surfers</h1>
    
    <div class="instructions">
        <strong>← →</strong> mudar de faixa &nbsp;&nbsp; <strong>ESPAÇO</strong> pular<br>
        <span style="color:#ffeb3b;">+ rápido a cada 200 pontos</span> • 
        <span style="color:#4fc3f7;">Nova rua a cada 1000 pontos</span>
    </div>
    
    <canvas id="game" width="1200" height="640"></canvas>
    
    <div class="stage-info" id="stageText">Fase 1 - Rua do Centro</div>
    
    <div class="footer">
        Estilo Subway Surfers • Vista de frente • Gráficos realistas
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });

        let currentLane = 1;
        let playerY = 505;
        let playerVY = 0;
        let isJumping = false;
        let laneChangeAnim = 0;

        let obstacles = [];
        let particles = [];
        let rainParticles = [];
        let score = 0;
        let highScore = 0;
        let gameSpeed = 5.0;
        let gravity = 0.9;
        let jumpForce = -17;
        let gameOver = false;
        let frame = 0;
        let currentStage = 0;
        let groundY = 570;

        function loadHighScore() {
            const saved = localStorage.getItem('pichadorSubwayHighScore');
            if (saved) highScore = parseInt(saved);
        }
        loadHighScore();

        function resetGame() {
            currentLane = 1;
            playerY = 505;
            playerVY = 0;
            isJumping = false;
            laneChangeAnim = 0;
            obstacles = [];
            particles = [];
            rainParticles = [];
            score = 0;
            gameSpeed = 5.0;
            gameOver = false;
            frame = 0;
            currentStage = 0;
            updateStageDisplay();
        }

        function updateStageDisplay() {
            const names = [
                "Fase 1 - Rua do Centro",
                "Fase 2 - Avenida Neon",
                "Fase 3 - Rua Chuvosa",
                "Fase 4 - Beco dos Telhados"
            ];
            const el = document.getElementById('stageText');
            if (el) {
                el.textContent = names[Math.min(currentStage, 3)];
                el.style.color = currentStage === 3 ? '#ff7043' : 
                                currentStage === 2 ? '#4fc3f7' : 
                                currentStage === 1 ? '#ce93d8' : '#00e5ff';
            }
        }

        function getCurrentStage() {
            return Math.floor(score / 1000);
        }

        function updateStage() {
            const newStage = getCurrentStage();
            if (newStage !== currentStage && newStage <= 3) {
                currentStage = newStage;
                updateStageDisplay();
                gameSpeed = Math.min(gameSpeed + 0.75, 14.5);
            }
        }

        function updateSpeed() {
            const level = Math.floor(score / 200);
            const newSpeed = Math.min(5.0 + level * 0.45, 14.5);
            if (newSpeed > gameSpeed) gameSpeed = newSpeed;
        }

        function getLaneX(lane) {
            const centerX = canvas.width / 2;
            const spacing = 195;
            return centerX + (lane - 1) * spacing;
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            let type = 'sedan';
            const rand = Math.random();
            if (rand > 0.75) type = 'truck';
            else if (rand > 0.45) type = 'van';

            obstacles.push({
                lane: lane,
                y: -90,
                width: type === 'truck' ? 100 : 85,
                height: type === 'truck' ? 72 : 60,
                type: type,
                color: ['#c62828', '#1565c0', '#27ae60', '#e67e22', '#8e44ad', '#2c3e50'][Math.floor(Math.random()*6)]
            });
        }

        function updateGame() {
            if (isJumping) {
                playerVY += gravity;
                playerY += playerVY;
                if (playerY >= 505) {
                    playerY = 505;
                    playerVY = 0;
                    isJumping = false;
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += gameSpeed;
                if (obstacles[i].y > canvas.height + 60) {
                    obstacles.splice(i, 1);
                }
            }

            if (obstacles.length < 5 && Math.random() < 0.032) {
                spawnObstacle();
            }

            for (let o of obstacles) {
                if (o.lane === currentLane) {
                    const playerTop = playerY - 55;
                    const playerBottom = playerY + 15;
                    if (o.y + o.height > playerTop && o.y < playerBottom) {
                        gameOver = true;
                        break;
                    }
                }
            }

            if (laneChangeAnim > 0) laneChangeAnim -= 0.15;

            score += 0.3;
            updateStage();
            updateSpeed();
        }

        function drawBackground() {
            const stage = currentStage;

            if (stage === 0) {
                const g = ctx.createLinearGradient(0, 0, 0, groundY);
                g.addColorStop(0, '#3498db');
                g.addColorStop(0.45, '#5dade2');
                g.addColorStop(1, '#d6eaf8');
                ctx.fillStyle = g;
            } else if (stage === 1) {
                ctx.fillStyle = '#0c1a2e';
            } else if (stage === 2) {
                ctx.fillStyle = '#1f2a44';
            } else {
                ctx.fillStyle = '#0f1c2e';
            }
            ctx.fillRect(0, 0, canvas.width, groundY);

            ctx.fillStyle = stage === 0 ? '#5d6d7e' : '#2c3e50';
            
            ctx.fillRect(0, 70, 145, groundY - 70);
            ctx.fillRect(0, 50, 95, groundY - 50);
            
            ctx.fillRect(canvas.width - 145, 70, 145, groundY - 70);
            ctx.fillRect(canvas.width - 95, 50, 95, groundY - 50);

            ctx.fillStyle = stage === 0 ? '#f7dc6f' : '#00e5ff';
            for (let y = 90; y < groundY - 50; y += 42) {
                ctx.fillRect(18, y, 20, 22);
                ctx.fillRect(55, y + 12, 20, 22);
                ctx.fillRect(canvas.width - 40, y, 20, 22);
                ctx.fillRect(canvas.width - 77, y + 12, 20, 22);
            }

            if (stage === 0) {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(1080, 65, 32, 0, Math.PI * 2);
                ctx.fill();
            } else if (stage === 1 || stage === 3) {
                ctx.fillStyle = '#ecf0f1';
                ctx.beginPath();
                ctx.arc(1080, 60, 26, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawRoad() {
            const cx = canvas.width / 2;

            ctx.fillStyle = '#4a5568';
            ctx.beginPath();
            ctx.moveTo(cx - 260, groundY);
            ctx.lineTo(cx + 260, groundY);
            ctx.lineTo(cx + 155, 95);
            ctx.lineTo(cx - 155, 95);
            ctx.fill();

            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 9;
            ctx.beginPath();
            ctx.moveTo(cx - 260, groundY);
            ctx.lineTo(cx - 155, 95);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx + 260, groundY);
            ctx.lineTo(cx + 155, 95);
            ctx.stroke();

            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 5;

            const positions = [-85, 0, 85];
            for (let p of positions) {
                for (let y = 115; y < groundY - 25; y += 48) {
                    const s = (y - 95) / (groundY - 95);
                    const xoff = p * (1 - s * 0.55);
                    ctx.beginPath();
                    ctx.moveTo(cx + xoff - 22, y);
                    ctx.lineTo(cx + xoff + 22, y);
                    ctx.stroke();
                }
            }
        }

        function drawPlayer() {
            const x = getLaneX(currentLane) + (laneChangeAnim * 18);
            const y = playerY;

            ctx.save();
            ctx.translate(x, y);

            ctx.fillStyle = 'rgba(0,0,0,0.38)';
            ctx.beginPath();
            ctx.ellipse(0, 22, 36, 11, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(-16, 2, 13, 26);
            ctx.fillRect(3, 2, 13, 26);

            ctx.fillStyle = '#1c2833';
            ctx.fillRect(-18, 26, 17, 7);
            ctx.fillRect(1, 26, 17, 7);

            ctx.fillStyle = currentStage === 1 ? '#6c3483' : '#117a65';
            ctx.fillRect(-20, -28, 40, 33);

            ctx.fillStyle = currentStage === 1 ? '#5b2c6f' : '#0e6655';
            ctx.beginPath();
            ctx.ellipse(0, -23, 18, 15, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#f5b041';
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.moveTo(-12, -18);
            ctx.lineTo(-8, -10);
            ctx.moveTo(12, -18);
            ctx.lineTo(8, -10);
            ctx.stroke();

            ctx.fillStyle = '#f5cba7';
            ctx.beginPath();
            ctx.arc(0, -30, 14, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1c2833';
            ctx.beginPath();
            ctx.ellipse(0, -37, 15, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-5, -30, 4.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(5, -30, 4.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1c2833';
            ctx.beginPath();
            ctx.arc(-5, -30, 2.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(5, -30, 2.2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1c2833';
            ctx.fillRect(-24, -22, 8, 20);
            ctx.fillRect(16, -22, 8, 20);

            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(19, -8, 8, 15);
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(19, -8, 3, 15);

            ctx.restore();
        }

        function drawObstacles() {
            for (let o of obstacles) {
                const x = getLaneX(o.lane);
                const scale = 0.55 + (o.y / 680) * 0.75;
                const w = o.width * scale;
                const h = o.height * scale;

                ctx.save();
                ctx.translate(x, o.y);

                ctx.fillStyle = 'rgba(0,0,0,0.32)';
                ctx.beginPath();
                ctx.ellipse(0, h * 0.72, w * 0.58, 7, 0, 0, Math.PI * 2);
                ctx.fill();

                if (o.type === 'sedan') {
                    ctx.fillStyle = o.color;
                    ctx.fillRect(-w/2, 0, w, h * 0.78);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-w * 0.33, h * 0.08, w * 0.66, h * 0.32);
                    
                    ctx.fillStyle = '#5dade2';
                    ctx.fillRect(-w * 0.3, h * 0.12, w * 0.6, h * 0.24);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-w * 0.4, h * 0.68, w * 0.18, h * 0.22);
                    ctx.fillRect(w * 0.22, h * 0.68, w * 0.18, h * 0.22);
                    
                    ctx.fillStyle = '#f7dc6f';
                    ctx.fillRect(-w * 0.43, h * 0.32, w * 0.12, h * 0.11);
                    ctx.fillRect(w * 0.31, h * 0.32, w * 0.12, h * 0.11);

                } else if (o.type === 'van') {
                    ctx.fillStyle = o.color;
                    ctx.fillRect(-w/2, 0, w, h * 0.82);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-w * 0.3, h * 0.06, w * 0.6, h * 0.32);
                    
                    ctx.fillStyle = '#5dade2';
                    ctx.fillRect(-w * 0.26, h * 0.1, w * 0.52, h * 0.26);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-w * 0.42, h * 0.72, w * 0.2, h * 0.2);
                    ctx.fillRect(w * 0.22, h * 0.72, w * 0.2, h * 0.2);

                } else if (o.type === 'truck') {
                    ctx.fillStyle = '#455a64';
                    ctx.fillRect(-w/2, h * 0.12, w, h * 0.78);
                    
                    ctx.fillStyle = o.color;
                    ctx.fillRect(-w * 0.5, 0, w * 0.5, h * 0.88);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-w * 0.45, h * 0.18, w * 0.38, h * 0.52);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-w * 0.47, h * 0.78, w * 0.22, h * 0.18);
                    ctx.fillRect(w * 0.25, h * 0.78, w * 0.22, h * 0.18);
                }

                ctx.restore();
            }
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 27px "Segoe UI", Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Pontos: ' + Math.floor(score), 22, 40);

            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 19px "Segoe UI", Arial';
            ctx.fillText('🏆 Recorde: ' + highScore, 22, 64);

            ctx.fillStyle = '#00e5ff';
            ctx.font = '15px Arial';
            ctx.fillText('Velocidade: ' + gameSpeed.toFixed(1), 22, 82);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.76)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(270, 125, 660, 265);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 8;
            ctx.strokeRect(270, 125, 660, 265);

            ctx.fillStyle = '#c0392b';
            ctx.font = 'bold 50px "Segoe UI", Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 600, 190);

            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 27px "Segoe UI", Arial';
            ctx.fillText('Sua pontuação: ' + Math.floor(score), 600, 240);

            const final = Math.floor(score);
            if (final > highScore) {
                highScore = final;
                localStorage.setItem('pichadorSubwayHighScore', highScore);
                ctx.fillStyle = '#e67e22';
                ctx.font = 'bold 23px "Segoe UI", Arial';
                ctx.fillText('🎉 NOVO RECORDE! 🎉', 600, 278);
            } else {
                ctx.fillStyle = '#e67e22';
                ctx.font = 'bold 21px "Segoe UI", Arial';
                ctx.fillText('Recorde atual: ' + highScore, 600, 278);
            }

            ctx.fillStyle = '#1e8449';
            ctx.font = 'bold 19px "Segoe UI", Arial';
            ctx.fillText('Pressione ESPAÇO para jogar novamente', 600, 318);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawRoad();
            drawObstacles();
            drawPlayer();
            drawHUD();

            if (!gameOver) {
                updateGame();
            }

            if (gameOver) {
                drawGameOver();
            }

            if (!gameOver) frame++;
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (gameOver) {
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    resetGame();
                }
                return;
            }

            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
                e.preventDefault();
                if (currentLane > 0) {
                    currentLane--;
                    laneChangeAnim = 1;
                }
            }
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
                e.preventDefault();
                if (currentLane < 2) {
                    currentLane++;
                    laneChangeAnim = -1;
                }
            }
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (!isJumping) {
                    isJumping = true;
                    playerVY = jumpForce;
                }
            }
        });

        function handleJump() {
            if (gameOver) {
                resetGame();
            } else if (!isJumping) {
                isJumping = true;
                playerVY = jumpForce;
            }
        }

        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleJump();
        });

        function startGame() {
            resetGame();
            setTimeout(() => { if (!gameOver) spawnObstacle(); }, 700);
            setTimeout(() => { if (!gameOver) spawnObstacle(); }, 1500);
            gameLoop();
        }

        startGame();
        canvas.setAttribute('tabindex', '1');
        canvas.focus();
    </script>
</body>
</html>
