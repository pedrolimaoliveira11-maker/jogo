<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Paulo 4D - Hyper Run</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
        }
        /* Tela de Login */
        #login-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1543269664-76bc3997d9ea?q=80&w=1200') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            border-top: 5px solid #e11a22;
        }
        .login-box h1 { font-size: 24px; margin-bottom: 10px; color: #333; }
        .login-box p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #757575;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
        }
        .google-btn img { width: 22px; height: 22px; margin-right: 15px; }

        /* Interface do Jogo */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 5;
            display: none;
        }
        #powerup-notice {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(255, 0, 128, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 18px;
            color: #fff;
            display: none;
            border-left: 5px solid #fff;
            box-shadow: 0 0 15px #ff0080;
        }

        /* Efeito de Distorção de Tela (Dano ou Hiper-Velocidade) */
        #screen-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
            box-shadow: inset 0 0 0px rgba(255, 0, 128, 0);
            transition: box-shadow 0.2s ease;
        }

        /* Tela de Game Over */
        #game-over {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 8;
            display: none;
        }
        #game-over h2 { font-size: 48px; color: #ff3333; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        #game-over button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #e11a22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Fundo de São Paulo */
        #bg-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: url('https://images.unsplash.com/photo-1543269664-76bc3997d9ea?q=80&w=1600') no-repeat center center/cover;
            opacity: 0.3;
        }
        #three-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
    </style>
</head>
<body class="4d-experience">

    <div id="bg-canvas"></div>
    <div id="screen-effect"></div>

    <div id="login-screen">
        <div class="login-box">
            <h1>São Paulo 4D Run</h1>
            <p>Entre na quarta dimensão correndo pelas ruas de SP!</p>
            <button class="google-btn" onclick="startGame()">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google">
                Entrar com o Google
            </button>
        </div>
    </div>

    <div id="game-ui">
        Pontos: <span id="score-val">0</span> | Dimensão: <span id="dim-val">3D</span>
    </div>
    <div id="powerup-notice">
        🌀 QUARTA DIMENSÃO ATIVADA: Pulo Quântico + Hiper-Velocidade!
    </div>

    <div id="game-over">
        <h2>LINHA DO TEMPO ROMPIDA</h2>
        <p>Você colidiu com um obstáculo temporal!</p>
        <p>Pontuação Máxima: <span id="final-score">0</span></p>
        <button onclick="restartGame()">Reiniciar Dimensão</button>
    </div>

    <canvas id="three-canvas"></canvas>

    <script>
        let scene, camera, renderer;
        let player, obstacles = [], timeTrails = [];
        let score = 0;
        let gameActive = false;
        
        // Atributos Mecânicos
        let speed = 0.18;
        let jumpVelocity = 0.24;
        let gravity = 0.01;
        let playerVelocityY = 0;
        let isJumping = false;
        let currentStage = 0;
        
        // Variáveis da 4ª Dimensão (Efeitos de Tempo e Espaço)
        let timeDimensionFactor = 0; 
        let clock = new THREE.Clock();

        let playerMaterial, trackMaterial, obstacleMaterial;

        function init3D() {
            const canvas = document.getElementById('three-canvas');
            scene = new THREE.Scene();
            
            // Nevoeiro para aumentar a sensação de profundidade e distorção quântica
            scene.fog = new THREE.FogExp2(0x050505, 0.015);
            
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 1.5, -2);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const light4D = new THREE.PointLight(0xff0080, 2, 50);
            light4D.position.set(0, 5, -5);
            scene.add(light4D);

            // Materiais Neon/Espaciais
            playerMaterial = new THREE.MeshStandardMaterial({ color: 0xe11a22, roughness: 0.2, metalness: 0.5 });
            trackMaterial = new THREE.MeshStandardMaterial({ color: 0x111111 });
            obstacleMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00aa99 });

            // Pista Modular
            const trackGeo = new THREE.BoxGeometry(7, 0.2, 200);
            const track = new THREE.Mesh(trackGeo, trackMaterial);
            track.position.set(0, -0.1, -80);
            scene.add(track);

            // Jogador
            const playerGeo = new THREE.BoxGeometry(0.8, 1.6, 0.8);
            player = new THREE.Mesh(playerGeo, playerMaterial);
            player.position.set(0, 0.8, 2);
            scene.add(player);

            // Criar rastros de tempo vazios (Clones 4D)
            for(let i=0; i<3; i++) {
                let trailGeo = new THREE.BoxGeometry(0.8, 1.6, 0.8);
                let trailMat = new THREE.MeshBasicMaterial({ color: 0xff0080, transparent: true, opacity: 0.3 - (i*0.1) });
                let trailMesh = new THREE.Mesh(trailGeo, trailMat);
                trailMesh.position.set(0, -10, 0); // Escondidos inicialmente
                scene.add(trailMesh);
                timeTrails.push(trailMesh);
            }

            // Obstáculos
            spawnObstacle(-20);
            spawnObstacle(-45);
            spawnObstacle(-70);
        }

        function spawnObstacle(zPos) {
            const width = Math.random() > 0.5 ? 3 : 4.5;
            const obstacleGeo = new THREE.BoxGeometry(width, 1.3, 0.7);
            const obstacle = new THREE.Mesh(obstacleGeo, obstacleMaterial);
            const posX = (Math.random() - 0.5) * (7 - width);
            obstacle.position.set(posX, 0.65, zPos);
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function startGame() {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                init3D();
                gameActive = true;
                clock.getDelta(); // Iniciar relógio do tempo
                animate();
            }, 500);
        }

        function triggerVibration(duration) {
            if (navigator.vibrate) {
                navigator.vibrate(duration);
            }
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            let elapsedTime = clock.getElapsedTime();

            // 4D EFECT: Distorção da Câmera baseada no Tempo e na Pontuação
            // Conforme os pontos sobem, a câmera oscila simulando dobras no espaço-tempo
            if (score >= 200) {
                camera.position.x = Math.sin(elapsedTime * 2) * timeDimensionFactor;
                camera.position.y = 4 + Math.cos(elapsedTime * 1.5) * (timeDimensionFactor * 0.5);
                camera.rotation.z = Math.sin(elapsedTime) * (timeDimensionFactor * 0.05); // Inclinação quântica
            }

            // Lógica física do pulo
            if (isJumping) {
                player.position.y += playerVelocityY;
                playerVelocityY -= gravity;

                if (player.position.y <= 0.8) {
                    player.position.y = 0.8;
                    isJumping = false;
                    playerVelocityY = 0;
                }
            }

            // Atualizar os Rastros Temporais (4D Echo Effect)
            // Os clones seguem a posição passada do jogador com um atraso físico
            for(let i = timeTrails.length - 1; i > 0; i--) {
                timeTrails[i].position.copy(timeTrails[i-1].position);
            }
            if(timeTrails.length > 0) {
                timeTrails[0].position.set(player.position.x, player.position.y, player.position.z + 0.5);
            }

            // Movimentação dos obstáculos
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].position.z += speed;

                // Colisão Física 
                let pBox = new THREE.Box3().setFromObject(player);
                let oBox = new THREE.Box3().setFromObject(obstacles[i]);

                if (pBox.intersectsBox(oBox)) {
                    triggerVibration([300, 100, 300]); // Vibração de impacto forte
                    gameOver();
                    return;
                }

                // Reset do obstáculo ao final da pista
                if (obstacles[i].position.z > 6) {
                    obstacles[i].position.z = -70;
                    obstacles[i].position.x = (Math.random() - 0.5) * (7 - obstacles[i].geometry.parameters.width);
                    
                    score += 50;
                    document.getElementById('score-val').innerText = score;
                    check4DMilestones();
                }
            }

            renderer.render(scene, camera);
        }

        // Lógica de Dobra Dimensional a cada 200 pontos
        function check4DMilestones() {
            let stage = Math.floor(score / 200);
            
            if (stage > currentStage) {
                currentStage = stage;
                
                // Evolução dos atributos físicos (Velocidade e Gravidade Quântica)
                speed += 0.05;
                jumpVelocity += 0.04;
                timeDimensionFactor = Math.min(stage * 0.4, 2.0); // Aumenta a distorção visual da 4ª dimensão

                document.getElementById('dim-val').innerText = "4D - Nível " + stage;
                
                // Feedback Tátil/Físico 4D
                triggerVibration(150);
                
                // Feedback Visual de Flash na Tela
                const fx = document.getElementById('screen-effect');
                fx.style.boxShadow = "inset 0 0 50px rgba(255, 0, 128, 1)";
                setTimeout(() => { fx.style.boxShadow = "inset 0 0 0px rgba(255, 0, 128, 0)"; }, 300);

                // Exibir aviso do superpoder
                const notice = document.getElementById('powerup-notice');
                notice.style.display = 'block';
                setTimeout(() => { notice.style.display = 'none'; }, 2500);

                // Mudança Hiperbólica de Cores (Cores Psodélicas/Neon)
                let rColor = Math.random() * 0xffffff;
                let rObColor = Math.random() * 0xffffff;
                playerMaterial.color.setHex(rColor);
                obstacleMaterial.color.setHex(rObColor);
                
                // Ilumina os rastros do tempo com a cor antiga
                timeTrails.forEach(t => t.material.color.setHex(rColor));
            }
        }

        // Evento de Pulo
        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'ArrowUp') && !isJumping && gameActive) {
                isJumping = true;
                playerVelocityY = jumpVelocity;
                triggerVibration(40); // Pequeno clique físico ao pular
            }
        });

        function gameOver() {
            gameActive = false;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        function restartGame() {
            score = 0;
            speed = 0.18;
            jumpVelocity = 0.24;
            currentStage = 0;
            timeDimensionFactor = 0;
            
            document.getElementById('score-val').innerText = score;
            document.getElementById('dim-val').innerText = "3D";
            document.getElementById('game-over').style.display = 'none';

            playerMaterial.color.setHex(0xe11a22);
            obstacleMaterial.color.setHex(0x00ffcc);

            player.position.set(0, 0.8, 2);
            camera.position.set(0, 4, 8);
            camera.rotation.set(0,0,0);
            camera.lookAt(0, 1.5, -2);
            isJumping = false;
            playerVelocityY = 0;

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].position.z = -20 - (i * 25);
            }

            gameActive = true;
            clock.getDelta();
            animate();
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
