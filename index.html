<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Pichador de Frente - Pulando Carros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #0a1628, #162033);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        h1 {
            color: #00e5ff;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.7);
            margin-bottom: 5px;
            font-size: 2.1em;
        }
        
        .instructions {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 16px;
            border-radius: 12px;
            margin-bottom: 5px;
            color: #b0bec5;
            font-size: 0.92em;
            text-align: center;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        
        #game {
            width: 90vw;
            max-width: 1300px;
            height: auto;
            border: 10px solid #00e5ff;
            border-radius: 18px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            background: #fff;
            cursor: pointer;
            display: block;
        }
        
        .stage-info {
            margin-top: 5px;
            font-size: 1.05em;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }
        
        .footer {
            margin-top: 5px;
            color: #78909c;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <h1>🎨 Pichador de Frente</h1>
    
    <div class="instructions">
        <strong>← →</strong> para mudar de faixa &nbsp;&nbsp; <strong>ESPAÇO</strong> para pular<br>
        <span style="color:#ffeb3b;">Fica mais rápido a cada 200 pontos</span> • 
        <span style="color:#4fc3f7;">Muda a cidade a cada 1000 pontos</span>
    </div>
    
    <canvas id="game" width="1200" height="650"></canvas>
    
    <div class="stage-info" id="stageText">Fase 1 - Centro da Cidade</div>
    
    <div class="footer">
        Vista de frente • Gráficos realistas • Pichador pulando carros
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });

        const LANES = 3;
        let currentLane = 1;
        let playerY = 520;
        let playerVY = 0;
        let isJumping = false;

        let obstacles = [];
        let particles = [];
        let rainParticles = [];
        let score = 0;
        let highScore = 0;
        let gameSpeed = 4.8;
        let gravity = 0.85;
        let jumpForce = -16;
        let gameOver = false;
        let frame = 0;
        let currentStage = 0;
        let groundY = 580;

        function loadHighScore() {
            const saved = localStorage.getItem('pichadorDeFrenteHighScore');
            if (saved) highScore = parseInt(saved);
        }
        loadHighScore();

        function resetGame() {
            currentLane = 1;
            playerY = 520;
            playerVY = 0;
            isJumping = false;
            obstacles = [];
            particles = [];
            rainParticles = [];
            score = 0;
            gameSpeed = 4.8;
            gameOver = false;
            frame = 0;
            currentStage = 0;
            updateStageDisplay();
        }

        function updateStageDisplay() {
            const names = [
                "Fase 1 - Centro da Cidade",
                "Fase 2 - Noite Neon",
                "Fase 3 - Chuva na Cidade",
                "Fase 4 - Telhados"
            ];
            const el = document.getElementById('stageText');
            if (el) {
                el.textContent = names[Math.min(currentStage, 3)];
                el.style.color = currentStage === 3 ? '#ff7043' : 
                                currentStage === 2 ? '#4fc3f7' : 
                                currentStage === 1 ? '#ce93d8' : '#00e5ff';
            }
        }

        function getCurrentStage() {
            return Math.floor(score / 1000);
        }

        function updateStage() {
            const newStage = getCurrentStage();
            if (newStage !== currentStage && newStage <= 3) {
                currentStage = newStage;
                updateStageDisplay();
                gameSpeed = Math.min(gameSpeed + 0.7, 14);
            }
        }

        function updateSpeed() {
            const level = Math.floor(score / 200);
            const newSpeed = Math.min(4.8 + level * 0.42, 14);
            if (newSpeed > gameSpeed) gameSpeed = newSpeed;
        }

        function getLaneX(lane) {
            const centerX = canvas.width / 2;
            const laneWidth = 220;
            return centerX + (lane - 1) * laneWidth;
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const type = Math.random() > 0.6 ? 'sedan' : (Math.random() > 0.5 ? 'van' : 'truck');
            
            obstacles.push({
                lane: lane,
                y: -80,
                width: type === 'truck' ? 95 : 82,
                height: type === 'truck' ? 70 : 58,
                type: type,
                color: ['#c62828', '#1565c0', '#2e7d32', '#ef6c00', '#6a1b9a'][Math.floor(Math.random()*5)]
            });
        }

        function updateGame() {
            if (isJumping) {
                playerVY += gravity;
                playerY += playerVY;
                
                if (playerY >= 520) {
                    playerY = 520;
                    playerVY = 0;
                    isJumping = false;
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += gameSpeed;
                if (obstacles[i].y > canvas.height + 50) {
                    obstacles.splice(i, 1);
                }
            }

            if (obstacles.length < 4 && Math.random() < 0.035) {
                spawnObstacle();
            }

            const playerX = getLaneX(currentLane);
            for (let o of obstacles) {
                if (o.lane === currentLane) {
                    const obstacleTop = o.y;
                    const obstacleBottom = o.y + o.height;
                    const playerTop = playerY - 60;
                    const playerBottom = playerY + 10;

                    if (obstacleBottom > playerTop && obstacleTop < playerBottom) {
                        gameOver = true;
                        break;
                    }
                }
            }

            score += 0.28;
            updateStage();
            updateSpeed();
        }

        function drawBackground() {
            const stage = currentStage;
            const centerX = canvas.width / 2;

            if (stage === 0) {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, '#3498db');
                grad.addColorStop(0.5, '#5dade2');
                grad.addColorStop(1, '#d6eaf8');
                ctx.fillStyle = grad;
            } else if (stage === 1) {
                ctx.fillStyle = '#0c1a2e';
            } else if (stage === 2) {
                ctx.fillStyle = '#1f2a44';
            } else {
                ctx.fillStyle = '#0f1c2e';
            }
            ctx.fillRect(0, 0, canvas.width, groundY);

            ctx.fillStyle = stage === 0 ? '#5d6d7e' : (stage === 1 ? '#2c3e50' : '#34495e');
            
            ctx.fillRect(0, 80, 180, groundY - 80);
            ctx.fillRect(0, 60, 120, groundY - 60);
            
            ctx.fillRect(canvas.width - 180, 80, 180, groundY - 80);
            ctx.fillRect(canvas.width - 120, 60, 120, groundY - 60);

            ctx.fillStyle = stage === 0 ? '#f7dc6f' : '#00e5ff';
            for (let y = 100; y < groundY - 40; y += 38) {
                ctx.fillRect(25, y, 22, 24);
                ctx.fillRect(70, y + 10, 22, 24);
                ctx.fillRect(canvas.width - 50, y, 22, 24);
                ctx.fillRect(canvas.width - 95, y + 10, 22, 24);
            }

            if (stage === 0) {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(1050, 70, 35, 0, Math.PI * 2);
                ctx.fill();
            } else if (stage === 1 || stage === 3) {
                ctx.fillStyle = '#ecf0f1';
                ctx.beginPath();
                ctx.arc(1050, 65, 28, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawRoad() {
            const centerX = canvas.width / 2;
            
            ctx.fillStyle = '#4a5568';
            ctx.beginPath();
            ctx.moveTo(centerX - 280, groundY);
            ctx.lineTo(centerX + 280, groundY);
            ctx.lineTo(centerX + 180, 120);
            ctx.lineTo(centerX - 180, 120);
            ctx.fill();

            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(centerX - 280, groundY);
            ctx.lineTo(centerX - 180, 120);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(centerX + 280, groundY);
            ctx.lineTo(centerX + 180, 120);
            ctx.stroke();

            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 4;
            
            const lanePositions = [-90, 0, 90];
            for (let pos of lanePositions) {
                for (let y = 140; y < groundY - 30; y += 55) {
                    const scale = (y - 120) / (groundY - 120);
                    const xOffset = pos * (1 - scale * 0.6);
                    ctx.beginPath();
                    ctx.moveTo(centerX + xOffset - 25, y);
                    ctx.lineTo(centerX + xOffset + 25, y);
                    ctx.stroke();
                }
            }
        }

        function drawPlayer() {
            const x = getLaneX(currentLane);
            const y = playerY;

            ctx.save();
            ctx.translate(x, y);

            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(0, 25, 38, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(-18, 5, 14, 28);
            ctx.fillRect(4, 5, 14, 28);

            ctx.fillStyle = '#1c2833';
            ctx.fillRect(-20, 30, 18, 8);
            ctx.fillRect(2, 30, 18, 8);

            ctx.fillStyle = currentStage === 1 ? '#6c3483' : '#117a65';
            ctx.fillRect(-22, -25, 44, 35);

            ctx.fillStyle = currentStage === 1 ? '#5b2c6f' : '#0e6655';
            ctx.beginPath();
            ctx.ellipse(0, -20, 20, 16, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f5cba7';
            ctx.beginPath();
            ctx.arc(0, -28, 15, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1c2833';
            ctx.beginPath();
            ctx.ellipse(0, -35, 16, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-6, -28, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6, -28, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1c2833';
            ctx.beginPath();
            ctx.arc(-6, -28, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6, -28, 2.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1c2833';
            ctx.fillRect(-26, -20, 8, 22);
            ctx.fillRect(18, -20, 8, 22);

            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(22, -5, 8, 16);
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(22, -5, 3, 16);

            ctx.restore();
        }

        function drawObstacles() {
            for (let o of obstacles) {
                const x = getLaneX(o.lane);
                const scale = 0.6 + (o.y / 700) * 0.7;
                const drawY = o.y;
                const drawW = o.width * scale;
                const drawH = o.height * scale;

                ctx.save();
                ctx.translate(x, drawY);

                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.beginPath();
                ctx.ellipse(0, drawH * 0.7, drawW * 0.6, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                if (o.type === 'sedan') {
                    ctx.fillStyle = o.color;
                    ctx.fillRect(-drawW/2, 0, drawW, drawH * 0.75);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-drawW * 0.35, drawH * 0.1, drawW * 0.7, drawH * 0.35);
                    
                    ctx.fillStyle = '#5dade2';
                    ctx.fillRect(-drawW * 0.32, drawH * 0.15, drawW * 0.64, drawH * 0.25);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-drawW * 0.38, drawH * 0.65, drawW * 0.18, drawH * 0.25);
                    ctx.fillRect(drawW * 0.2, drawH * 0.65, drawW * 0.18, drawH * 0.25);
                    
                    ctx.fillStyle = '#f7dc6f';
                    ctx.fillRect(-drawW * 0.42, drawH * 0.35, drawW * 0.12, drawH * 0.12);
                    ctx.fillRect(drawW * 0.3, drawH * 0.35, drawW * 0.12, drawH * 0.12);

                } else if (o.type === 'van') {
                    ctx.fillStyle = o.color;
                    ctx.fillRect(-drawW/2, 0, drawW, drawH * 0.8);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-drawW * 0.32, drawH * 0.08, drawW * 0.64, drawH * 0.35);
                    
                    ctx.fillStyle = '#5dade2';
                    ctx.fillRect(-drawW * 0.28, drawH * 0.12, drawW * 0.56, drawH * 0.28);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-drawW * 0.4, drawH * 0.7, drawW * 0.2, drawH * 0.22);
                    ctx.fillRect(drawW * 0.2, drawH * 0.7, drawW * 0.2, drawH * 0.22);

                } else if (o.type === 'truck') {
                    ctx.fillStyle = '#455a64';
                    ctx.fillRect(-drawW/2, drawH * 0.15, drawW, drawH * 0.75);
                    
                    ctx.fillStyle = o.color;
                    ctx.fillRect(-drawW * 0.48, 0, drawW * 0.48, drawH * 0.85);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-drawW * 0.42, drawH * 0.2, drawW * 0.36, drawH * 0.55);
                    
                    ctx.fillStyle = '#1c2833';
                    ctx.fillRect(-drawW * 0.45, drawH * 0.75, drawW * 0.22, drawH * 0.2);
                    ctx.fillRect(drawW * 0.23, drawH * 0.75, drawW * 0.22, drawH * 0.2);
                }

                ctx.restore();
            }
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px "Segoe UI", Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Pontos: ' + Math.floor(score), 25, 42);

            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 20px "Segoe UI", Arial';
            ctx.fillText('🏆 Recorde: ' + highScore, 25, 68);

            ctx.fillStyle = '#00e5ff';
            ctx.font = '16px Arial';
            ctx.fillText('Velocidade: ' + gameSpeed.toFixed(1), 25, 88);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(280, 130, 640, 270);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 8;
            ctx.strokeRect(280, 130, 640, 270);

            ctx.fillStyle = '#c0392b';
            ctx.font = 'bold 52px "Segoe UI", Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 600, 195);

            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 28px "Segoe UI", Arial';
            ctx.fillText('Sua pontuação: ' + Math.floor(score), 600, 245);

            const final = Math.floor(score);
            if (final > highScore) {
                highScore = final;
                localStorage.setItem('pichadorDeFrenteHighScore', highScore);
                ctx.fillStyle = '#e67e22';
                ctx.font = 'bold 24px "Segoe UI", Arial';
                ctx.fillText('🎉 NOVO RECORDE! 🎉', 600, 285);
            } else {
                ctx.fillStyle = '#e67e22';
                ctx.font = 'bold 22px "Segoe UI", Arial';
                ctx.fillText('Recorde atual: ' + highScore, 600, 285);
            }

            ctx.fillStyle = '#1e8449';
            ctx.font = 'bold 20px "Segoe UI", Arial';
            ctx.fillText('Pressione ESPAÇO para jogar novamente', 600, 325);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawRoad();
            drawObstacles();
            drawPlayer();
            drawHUD();

            if (!gameOver) {
                updateGame();
            }

            if (gameOver) {
                drawGameOver();
            }

            if (!gameOver) frame++;
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (gameOver) {
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    resetGame();
                }
                return;
            }

            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
                e.preventDefault();
                if (currentLane > 0) currentLane--;
            }
            
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
                e.preventDefault();
                if (currentLane < 2) currentLane++;
            }
            
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (!isJumping) {
                    isJumping = true;
                    playerVY = jumpForce;
                }
            }
        });

        function handleJump() {
            if (gameOver) {
                resetGame();
            } else if (!isJumping) {
                isJumping = true;
                playerVY = jumpForce;
            }
        }

        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleJump();
        });

        function startGame() {
            resetGame();
            
            setTimeout(() => {
                if (!gameOver) spawnObstacle();
            }, 800);
            
            setTimeout(() => {
                if (!gameOver) spawnObstacle();
            }, 1600);

            gameLoop();
        }

        startGame();
        canvas.setAttribute('tabindex', '1');
        canvas.focus();
    </script>
</body>
</html>
