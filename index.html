<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Paulo Run 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
        }
        /* Tela de Login */
        #login-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1543269664-76bc3997d9ea?q=80&w=1200') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            border-top: 5px solid #e11a22; /* Cor SPFC */
        }
        .login-box h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }
        .login-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #757575;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
            width: 100%;
        }
        .google-btn:hover {
            background: #f7f7f7;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .google-btn img {
            width: 22px;
            height: 22px;
            margin-right: 15px;
        }
        /* Interface do Jogo */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 5;
            display: none;
            pointer-events: none;
        }
        #powerup-notice {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            color: #00ffcc;
            display: none;
            border-left: 5px solid #00ffcc;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
        /* Tela de Game Over */
        #game-over {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 8;
            display: none;
        }
        #game-over h2 { font-size: 48px; color: #ff3333; margin-bottom: 20px; }
        #game-over button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #e11a22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        #game-over button:hover { background: #b8141a; }
        /* Canvas do fundo de SP */
        #bg-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: url('https://images.unsplash.com/photo-1543269664-76bc3997d9ea?q=80&w=1600') no-repeat center center/cover;
            opacity: 0.4; /* Fundo suave atrás do 3D */
        }
        #three-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div id="login-screen">
        <div class="login-box">
            <h1>São Paulo Obstacle Run 3D</h1>
            <p>Faça login para salvar seu recorde e correr pelas ruas de SP!</p>
            <button class="google-btn" onclick="startGame()">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google">
                Entrar com o Google
            </button>
        </div>
    </div>

    <div id="game-ui">
        Pontos: <span id="score-val">0</span>
    </div>
    <div id="powerup-notice" class="powerup-hud">
        ⚡ PODERES ATIVADOS: Correr Mais Rápido + Pulo Super Alto!
    </div>

    <div id="game-over">
        <h2>FIM DE JOGO</h2>
        <p>Você bateu na barreira!</p>
        <p>Pontuação Final: <span id="final-score">0</span></p>
        <button onclick="restartGame()">Jogar Novamente</button>
    </div>

    <canvas id="three-canvas"></canvas>

    <script>
        // --- VARIÁVEIS GLOBAIS DO JOGO ---
        let scene, camera, renderer;
        let player, obstacles = [];
        let score = 0;
        let gameActive = false;
        
        // Atributos de movimentação e poderes
        let speed = 0.15;
        let jumpVelocity = 0.22;
        let gravity = 0.01;
        
        let playerVelocityY = 0;
        let isJumping = false;
        let currentColorStage = 0;

        // Materiais para troca de cores (Cores dos blocos mudam)
        let playerMaterial, trackMaterial, obstacleMaterial;

        // Inicialização do ambiente 3D
        function init3D() {
            const canvas = document.getElementById('three-canvas');
            scene = new THREE.Scene();
            
            // Câmera posicionada atrás e acima do jogador
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 1, -2);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Iluminação
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // Criar Materiais Iniciais
            playerMaterial = new THREE.MeshStandardMaterial({ color: 0xe11a22 }); // Vermelho SPFC inicial
            trackMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });  // Pista escura
            obstacleMaterial = new THREE.MeshStandardMaterial({ color: 0xffcc00 }); // Barreiras amarelas

            // Criar a pista de corrida (rua)
            const trackGeo = new THREE.BoxGeometry(6, 0.2, 100);
            const track = new THREE.Mesh(trackGeo, trackMaterial);
            track.position.set(0, -0.1, -40);
            scene.add(track);

            // Criar o Jogador (Um bloco/personagem 3D)
            const playerGeo = new THREE.BoxGeometry(0.8, 1.5, 0.8);
            player = new THREE.Mesh(playerGeo, playerMaterial);
            player.position.set(0, 0.75, 2);
            scene.add(player);

            // Gerar primeiros obstáculos
            spawnObstacle(-15);
            spawnObstacle(-35);
            spawnObstacle(-55);
        }

        // Função para criar uma barreira na pista
        function spawnObstacle(zPos) {
            const width = Math.random() > 0.5 ? 2.5 : 4; // Larguras variadas
            const obstacleGeo = new THREE.BoxGeometry(width, 1.2, 0.6);
            const obstacle = new THREE.Mesh(obstacleGeo, obstacleMaterial);
            
            // Define uma posição X aleatória na pista
            const posX = (Math.random() - 0.5) * (6 - width);
            obstacle.position.set(posX, 0.6, zPos);
            
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        // Ação ao clicar em "Entrar com o Google"
        function startGame() {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                init3D();
                gameActive = true;
                animate();
            }, 500);
        }

        // Loop principal de animação e lógica
        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // Lógica do Pulo (Gravidade)
            if (isJumping) {
                player.position.y += playerVelocityY;
                playerVelocityY -= gravity;

                // Se tocou o chão novamente
                if (player.position.y <= 0.75) {
                    player.position.y = 0.75;
                    isJumping = false;
                    playerVelocityY = 0;
                }
            }

            // Movimentação dos obstáculos em direção ao jogador
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].position.z += speed;

                // Checagem de Colisão simples (Caixas delimitadoras)
                let pBox = new THREE.Box3().setFromObject(player);
                let oBox = new THREE.Box3().setFromObject(obstacles[i]);

                if (pBox.intersectsBox(oBox)) {
                    gameOver();
                    return;
                }

                // Se o obstáculo passou do jogador, reseta ele lá na frente e ganha pontos
                if (obstacles[i].position.z > 5) {
                    obstacles[i].position.z = -55;
                    obstacles[i].position.x = (Math.random() - 0.5) * (6 - obstacles[i].geometry.parameters.width);
                    
                    // Somar pontos
                    score += 50;
                    document.getElementById('score-val').innerText = score;

                    // Checa evolução de poderes e cores a cada 200 pontos
                    checkMilestones();
                }
            }

            renderer.render(scene, camera);
        }

        // Gerencia a troca de cores e poderes a cada 200 pontos
        function checkMilestones() {
            let stage = Math.floor(score / 200);
            
            if (stage > currentColorStage) {
                currentColorStage = stage;
                
                // 1. ATIVAR PODERES (Aumenta velocidade e capacidade de pulo)
                speed += 0.04;
                jumpVelocity += 0.03; // Pula mais alto
                
                // Mostrar aviso na tela
                const notice = document.getElementById('powerup-notice');
                notice.style.display = 'block';
                setTimeout(() => { notice.style.display = 'none'; }, 3000);

                // 2. TROCAR AS CORES DO AMBIENTE (Muda dinamicamente)
                const randomColorPlayer = Math.random() * 0xffffff;
                const randomColorObstacle = Math.random() * 0xffffff;
                
                playerMaterial.color.setHex(randomColorPlayer);
                obstacleMaterial.color.setHex(randomColorObstacle);
            }
        }

        // Comandos de controle (Espaço ou Seta para Cima para pular)
        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'ArrowUp') && !isJumping && gameActive) {
                isJumping = true;
                playerVelocityY = jumpVelocity;
            }
        });

        // Fim de jogo
        function gameOver() {
            gameActive = false;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        // Reiniciar Partida
        function restartGame() {
            // Resetar variáveis
            score = 0;
            speed = 0.15;
            jumpVelocity = 0.22;
            currentColorStage = 0;
            document.getElementById('score-val').innerText = score;
            document.getElementById('game-over').style.display = 'none';

            // Resetar materiais
            playerMaterial.color.setHex(0xe11a22);
            obstacleMaterial.color.setHex(0xffcc00);

            // Resetar posições
            player.position.set(0, 0.75, 2);
            isJumping = false;
            playerVelocityY = 0;

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].position.z = -15 - (i * 20);
            }

            gameActive = true;
            animate();
        }

        // Ajustar tela caso o usuário mude o tamanho da janela
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
